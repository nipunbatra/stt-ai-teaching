<h1 id="the-journey--data-side">The Journey — Data Side</h1>
<p>In January, you could write a Python script. Now you can:</p>
<ul>
<li><strong>Collect</strong> data from APIs, web pages, sensors</li>
<li><strong>Validate</strong> it with schemas before it poisons your model</li>
<li><strong>Label</strong> it efficiently (manual, active, weak, LLM-assisted)</li>
<li><strong>Augment</strong> it when you don't have enough</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="3" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="the-journey--models--production">The Journey — Models &amp; Production</h1>
<ul>
<li><strong>Call LLMs</strong> with structured outputs, multimodal inputs</li>
<li><strong>Evaluate</strong> properly — not just accuracy</li>
<li><strong>Tune &amp; track</strong> hyperparameters</li>
<li><strong>Reproduce</strong> runs across machines (Docker, seeds)</li>
<li><strong>Monitor</strong> drift in production</li>
<li><strong>Profile &amp; quantize</strong> for real-world constraints</li>
<li><strong>Build agents</strong> that use tools to take actions</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="4" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="6" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="one-liner-per-lecture--production">One-Liner Per Lecture — Production</h1>
<table>
<thead>
<tr>
<th style="text-align:center">#</th>
<th style="text-align:center">Week</th>
<th style="text-align:left">Takeaway</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">9</td>
<td style="text-align:center">Reproducibility</td>
<td style="text-align:left"><em>Fix the machine, the math, and the memory — all three.</em></td>
</tr>
<tr>
<td style="text-align:center">10</td>
<td style="text-align:center">Data Drift</td>
<td style="text-align:left"><em>Monitor distributions, not just metrics.</em></td>
</tr>
<tr>
<td style="text-align:center">11</td>
<td style="text-align:center">Profiling + Quantization</td>
<td style="text-align:left"><em>Profile first; INT8 is ~4× free compression.</em></td>
</tr>
<tr>
<td style="text-align:center">12</td>
<td style="text-align:center">AI Agents</td>
<td style="text-align:left"><em>LLM + tools + while-loop = Claude Code, Cursor, Devin.</em></td>
</tr>
<tr>
<td style="text-align:center">—</td>
<td style="text-align:center">Web Apps / CI/CD / APIs</td>
<td style="text-align:left"><em>If it doesn't run in 5 minutes, it doesn't exist.</em></td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="7" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="the-full-stack">The Full Stack</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Raw Data
  │
  ├── Collect    (APIs, scraping)             ← Week 1-2
  ├── Validate   (schemas, types, ranges)     ← Week 2
  ├── Label      (manual, active, weak, LLM)  ← Week 3-4
  ├── Augment    (transforms, synthetic)      ← Week 5
  ├── LLM APIs   (Gemini, prompts)            ← Week 6
  ├── Evaluate   (CV, bias-variance)          ← Week 7
  ├── Tune/Track (Optuna, TrackIO)            ← Week 8
  ├── Reproduce  (Docker, seeds)              ← Week 9
  ├── Monitor    (drift detection)            ← Week 10
  ├── Profile    (INT8, ONNX, pruning)        ← Week 11
  └── Agent      (tools, loops)               ← Week 12
</code></pre>
<p>Each layer depends on the ones above. Skip one, ship a bug.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-class="lead" data-theme="iitgn-modern" lang="en-IN" class="lead" style="--class:lead;--theme:iitgn-modern;">
<h1 id="part-i--data-weeks-1%E2%80%935">Part I — Data (Weeks 1–5)</h1>
<p><em>&quot;80% of ML is data work.&quot;</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="9" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="data-collection--apis">Data Collection — APIs</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">r = requests.get(<span class="hljs-string">&quot;https://api.example.com/data&quot;</span>, timeout=<span class="hljs-number">5</span>)
r.raise_for_status()     <span class="hljs-comment"># crash loudly, don&#x27;t silently corrupt</span>
data = r.json()
</code></pre>
<p><strong>Key insight:</strong> the data you collect sets your model's <em>ceiling</em>.<br />
No algorithm fixes bad data.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="10" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="data-collection--scraping--gotchas">Data Collection — Scraping &amp; Gotchas</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> bs4 <span class="hljs-keyword">import</span> BeautifulSoup
soup = BeautifulSoup(html, <span class="hljs-string">&quot;html.parser&quot;</span>)
titles = [h.get_text().strip() <span class="hljs-keyword">for</span> h <span class="hljs-keyword">in</span> soup.find_all(<span class="hljs-string">&quot;h2&quot;</span>)]
</code></pre>
<p><strong>Gotchas you met this semester:</strong></p>
<ul>
<li>Rate limits &amp; backoff</li>
<li>Pagination cursors</li>
<li>JS-rendered pages (needs Playwright/Selenium)</li>
<li>Character encoding (<code>utf-8</code> vs <code>latin-1</code>)</li>
<li>Time-zone bugs</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="11" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="data-validation--pydantic">Data Validation — Pydantic</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">SensorReading</span>(<span class="hljs-title class_ inherited__">BaseModel</span>):
    temperature: <span class="hljs-built_in">float</span> = Field(ge=-<span class="hljs-number">50</span>, le=<span class="hljs-number">60</span>)
    humidity:    <span class="hljs-built_in">float</span> = Field(ge=<span class="hljs-number">0</span>, le=<span class="hljs-number">100</span>)
    timestamp:   datetime
</code></pre>
<p><strong>Key insight:</strong> validate at the <strong>boundary</strong>. Catch bad data before<br />
it enters your pipeline — not after your model produces garbage.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="12" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="labeling--strategies">Labeling — Strategies</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Strategy</th>
<th style="text-align:left">When to use</th>
<th style="text-align:left">Cost / sample</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Manual</strong></td>
<td style="text-align:left">Small, high-stakes</td>
<td style="text-align:left">Highest</td>
</tr>
<tr>
<td style="text-align:left"><strong>Active learning</strong></td>
<td style="text-align:left">Large unlabeled pool</td>
<td style="text-align:left">Medium</td>
</tr>
<tr>
<td style="text-align:left"><strong>Weak supervision</strong></td>
<td style="text-align:left">Domain heuristics</td>
<td style="text-align:left">Low</td>
</tr>
<tr>
<td style="text-align:left"><strong>LLM-assisted</strong></td>
<td style="text-align:left">Text tasks, budget for API</td>
<td style="text-align:left">Low but ≠ free</td>
</tr>
</tbody>
</table>
<p>Labeling is usually the <strong>most expensive part of ML</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="13" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">

"><g data-mml-node="mo" transform="translate(0 -0.5)"><path data-c="29" d="M305 251Q305 -145 69 -349H56Q43 -349 39 -347T35 -338Q37 -333 60 -307T108 -239T160 -136T204 27T221 250T204 473T160 636T108 740T60 807T35 839Q35 850 50 850H56H69Q197 743 256 566Q305 425 305 251Z"></path></g></g></g></g></svg></mjx-container></p><p>Pick the <strong>most uncertain</strong> unlabeled example.</p>
<ul>
<li>Ties the model's own confidence to the labeling budget</li>
<li>Typically 5–10× fewer labels for the same accuracy</li>
<li>Entropy is the standard uncertainty measure; margin / disagreement also work</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="14" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="weak-supervision-in-10-lines">Weak Supervision in 10 Lines</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">lf_positive</span>(<span class="hljs-params">text</span>):
    <span class="hljs-keyword">return</span> <span class="hljs-number">1</span> <span class="hljs-keyword">if</span> <span class="hljs-built_in">any</span>(w <span class="hljs-keyword">in</span> text <span class="hljs-keyword">for</span> w <span class="hljs-keyword">in</span> [<span class="hljs-string">&quot;great&quot;</span>, <span class="hljs-string">&quot;excellent&quot;</span>]) <span class="hljs-keyword">else</span> -<span class="hljs-number">1</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">lf_negative</span>(<span class="hljs-params">text</span>):
    <span class="hljs-keyword">return</span> <span class="hljs-number">0</span> <span class="hljs-keyword">if</span> <span class="hljs-built_in">any</span>(w <span class="hljs-keyword">in</span> text <span class="hljs-keyword">for</span> w <span class="hljs-keyword">in</span> [<span class="hljs-string">&quot;bad&quot;</span>, <span class="hljs-string">&quot;terrible&quot;</span>]) <span class="hljs-keyword">else</span> -<span class="hljs-number">1</span>

labels = [lf_positive(t), lf_negative(t)]
noisy_label = Counter(l <span class="hljs-keyword">for</span> l <span class="hljs-keyword">in</span> labels <span class="hljs-keyword">if</span> l != -<span class="hljs-number">1</span>).most_common(<span class="hljs-number">1</span>)[<span class="hljs-number">0</span>][<span class="hljs-number">0</span>]
</code></pre>
<p><strong>Key insight:</strong> 70–90% of manual-labeling accuracy from hand-written<br />
rules + a denoiser. That's the Snorkel playbook.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="15" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="augmentation--free-data-if-label-preserving">Augmentation — Free Data <em>(if label-preserving)</em></h1>
<table>
<thead>
<tr>
<th style="text-align:left">Domain</th>
<th style="text-align:left">Techniques</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Images</td>
<td style="text-align:left">flip, rotate, crop, color jitter, RandAugment</td>
</tr>
<tr>
<td style="text-align:left">Text</td>
<td style="text-align:left">synonym replacement, back-translation</td>
</tr>
<tr>
<td style="text-align:left">Audio</td>
<td style="text-align:left">time shift, pitch shift, noise injection</td>
</tr>
<tr>
<td style="text-align:left">Tabular</td>
<td style="text-align:left">SMOTE, noise injection, mixup</td>
</tr>
</tbody>
</table>
<p><img class="emoji" draggable="false" alt="⚠" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Canonical mistake:</strong> flipping a handwritten <code>6</code> into a <code>9</code>.<br />
Always ask: <em>does this transform preserve the label?</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-class="lead" data-theme="iitgn-modern" lang="en-IN" class="lead" style="--class:lead;--theme:iitgn-modern;">
<h1 id="part-ii--models-weeks-6%E2%80%938">Part II — Models (Weeks 6–8)</h1>
<p><em>&quot;A simple model you can trust beats a complex one you can't.&quot;</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="17" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="llm-apis">LLM APIs</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> google <span class="hljs-keyword">import</span> genai
client = genai.Client()

response = client.models.generate_content(
    model=<span class="hljs-string">&quot;gemini-2.0-flash&quot;</span>,
    contents=prompt,
    config={<span class="hljs-string">&quot;response_mime_type&quot;</span>: <span class="hljs-string">&quot;application/json&quot;</span>,
            <span class="hljs-string">&quot;response_schema&quot;</span>: ReviewSentiment},
)
</code></pre>
<p><strong>Four skills:</strong> structured outputs · multimodal · streaming · prompt versioning.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="18" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="when-not-to-use-an-llm">When <em>Not</em> to Use an LLM</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Task</th>
<th style="text-align:left">Better choice</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Exact arithmetic</td>
<td style="text-align:left">A calculator</td>
</tr>
<tr>
<td style="text-align:left">Date parsing</td>
<td style="text-align:left"><code>datetime.strptime</code></td>
</tr>
<tr>
<td style="text-align:left">Structured extraction</td>
<td style="text-align:left">regex / small fine-tuned model</td>
</tr>
<tr>
<td style="text-align:left">Classification with lots of labels</td>
<td style="text-align:left">logistic regression / BERT</td>
</tr>
<tr>
<td style="text-align:left">Anything that must be deterministic</td>
<td style="text-align:left">Pretty much anything else</td>
</tr>
</tbody>
</table>
<p><em>LLMs are a tool, not a default.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="19" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="evaluation--beyond-accuracy">Evaluation — Beyond Accuracy</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Concept</th>
<th style="text-align:left">Why it matters</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Cross-validation</strong></td>
<td style="text-align:left">Single split is a coin flip</td>
</tr>
<tr>
<td style="text-align:left"><strong>Stratified K-Fold</strong></td>
<td style="text-align:left">Preserves class balance</td>
</tr>
<tr>
<td style="text-align:left"><strong>Nested CV</strong></td>
<td style="text-align:left">Needed when you tune hyperparameters</td>
</tr>
<tr>
<td style="text-align:left"><strong>TimeSeriesSplit</strong></td>
<td style="text-align:left">Time-ordered data needs time-ordered folds</td>
</tr>
<tr>
<td style="text-align:left"><strong>GroupKFold</strong></td>
<td style="text-align:left">Patients / users must not span folds</td>
</tr>
</tbody>
</table>
<p>Minimum viable evaluation: <strong>5-fold stratified CV</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="20" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">

<h1 id="data-leakage--the-1-killer">Data Leakage — The #1 Killer</h1>
<p>Test-time information sneaking into training:</p>
<ul>
<li><strong>Scaling on the full dataset before splitting</strong></li>
<li>Using a target-derived feature (<code>log_of_price</code> to predict <code>price</code>)</li>
<li>Time-series data split randomly instead of chronologically</li>
<li>Duplicated rows across train / test</li>
<li>Test set peeking during hyperparameter tuning</li>
</ul>
<p><strong>Rule of thumb:</strong> 99% where everyone else is at 85% → you have a leak.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="22" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="tuning--dont-waste-time">Tuning — Don't Waste Time</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Method</th>
<th style="text-align:left">Tries</th>
<th style="text-align:left">When</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Grid Search</strong></td>
<td style="text-align:left">all combos</td>
<td style="text-align:left">&lt; 3 hyperparams</td>
</tr>
<tr>
<td style="text-align:left"><strong>Random Search</strong></td>
<td style="text-align:left">random subset</td>
<td style="text-align:left">3+ hyperparams</td>
</tr>
<tr>
<td style="text-align:left"><strong>Bayesian (Optuna)</strong></td>
<td style="text-align:left">adaptive</td>
<td style="text-align:left">expensive evals</td>
</tr>
<tr>
<td style="text-align:left"><strong>Hyperband / ASHA</strong></td>
<td style="text-align:left">early stopping</td>
<td style="text-align:left">deep learning</td>
</tr>
</tbody>
</table>
<p>Bergstra &amp; Bengio 2012: only ~2 of your 5 hyperparams matter,<br />
and random explores those coordinates more densely than grid.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="23" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="experiment-tracking-in-4-lines">Experiment Tracking in 4 Lines</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> trackio
run = trackio.init(project=<span class="hljs-string">&quot;moons&quot;</span>, config={<span class="hljs-string">&quot;lr&quot;</span>: <span class="hljs-number">1e-3</span>, <span class="hljs-string">&quot;hidden&quot;</span>: <span class="hljs-number">16</span>})
<span class="hljs-keyword">for</span> epoch <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">100</span>):
    trackio.log({<span class="hljs-string">&quot;loss&quot;</span>: loss.item(), <span class="hljs-string">&quot;acc&quot;</span>: acc.item()})
run.finish()
</code></pre>
<p>Answers <em>&quot;which run was the good one?&quot;</em> — without this you're<br />
re-running experiments by hand.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-class="lead" data-theme="iitgn-modern" lang="en-IN" class="lead" style="--class:lead;--theme:iitgn-modern;">
<h1 id="part-iii--production-weeks-9%E2%80%9311">Part III — Production (Weeks 9–11)</h1>
<p><em>&quot;A model in a notebook is not a model.&quot;</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="25" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="reproducibility--three-layers">Reproducibility — Three Layers</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Layer</th>
<th style="text-align:left">Symptom</th>
<th style="text-align:left">Cure</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">The Math</td>
<td style="text-align:left">Different results each run</td>
<td style="text-align:left">seeds everywhere</td>
</tr>
<tr>
<td style="text-align:left">The Memory</td>
<td style="text-align:left">Lost the best hyperparams</td>
<td style="text-align:left">experiment tracking</td>
</tr>
<tr>
<td style="text-align:left">The Machine</td>
<td style="text-align:left">&quot;Works on my laptop&quot;</td>
<td style="text-align:left">Docker / <code>pyproject.toml</code></td>
</tr>
</tbody>
</table>
<p>All three matter. Missing one is a reproducibility bug.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="26" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="docker--the-30-second-explanation">Docker — The 30-Second Explanation</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dockerfile"><span class="hljs-keyword">FROM</span> python:<span class="hljs-number">3.11</span>-slim
<span class="hljs-keyword">WORKDIR</span><span class="language-bash"> /app</span>
<span class="hljs-keyword">COPY</span><span class="language-bash"> requirements.txt .</span>
<span class="hljs-keyword">RUN</span><span class="language-bash"> pip install -r requirements.txt</span>
<span class="hljs-keyword">COPY</span><span class="language-bash"> . .</span>
<span class="hljs-keyword">CMD</span><span class="language-bash"> [<span class="hljs-string">&quot;python&quot;</span>, <span class="hljs-string">&quot;app.py&quot;</span>]</span>
</code></pre>
<ul>
<li><code>docker build</code> turns your code into a portable image</li>
<li><code>docker run -p 7860:7860</code> ships to any Linux / Mac / CI server</li>
<li>No more <em>&quot;install these 14 things first&quot;</em></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="27" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">

    s = x.<span class="hljs-built_in">abs</span>().<span class="hljs-built_in">max</span>().item() / <span class="hljs-number">127.0</span>
    q = torch.<span class="hljs-built_in">round</span>(x / s).clamp(-<span class="hljs-number">127</span>, <span class="hljs-number">127</span>).to(torch.int8)
    <span class="hljs-keyword">return</span> q, s
</code></pre>

<h1 id="quantization-scales--toy-to-05b-llm">Quantization Scales — Toy to 0.5B LLM</h1>
<p>Same 3-line routine applied to progressively bigger models:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Notebook</th>
<th style="text-align:left">Model</th>
<th style="text-align:right">Params</th>
<th style="text-align:center">INT8 vs FP32</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><code>09-…from-scratch</code></td>
<td style="text-align:left">MLP · <code>make_moons</code></td>
<td style="text-align:right">~400</td>
<td style="text-align:center">≈ 0</td>
</tr>
<tr>
<td style="text-align:left"><code>11-…llm-from-scratch</code></td>
<td style="text-align:left">2-layer Transformer · Hamlet</td>
<td style="text-align:right">~60K</td>
<td style="text-align:center">Δ loss ≈ 0.005</td>
</tr>
<tr>
<td style="text-align:left"><code>12-…real-llm</code></td>
<td style="text-align:left"><strong>Qwen 2.5 0.5B</strong> (HF)</td>
<td style="text-align:right"><strong>494M</strong></td>
<td style="text-align:center">&lt; 1% CE</td>
</tr>
</tbody>
</table>
<p>The math doesn't care about model size.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="32" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="beyond-quantization--compression-toolbox">Beyond Quantization — Compression Toolbox</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Technique</th>
<th style="text-align:left">Idea</th>
<th style="text-align:left">Typical gain</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Quantization</strong></td>
<td style="text-align:left">Fewer bits per weight</td>
<td style="text-align:left">4× (INT8), 8× (INT4)</td>
</tr>
<tr>
<td style="text-align:left"><strong>Pruning</strong></td>
<td style="text-align:left">Zero out small weights</td>
<td style="text-align:left">50–90% sparsity</td>
</tr>
<tr>
<td style="text-align:left"><strong>Distillation</strong></td>
<td style="text-align:left">Small &quot;student&quot; mimics big &quot;teacher&quot;</td>
<td style="text-align:left">5–10× smaller model</td>
</tr>
<tr>
<td style="text-align:left"><strong>ONNX export</strong></td>
<td style="text-align:left">Portable graph format</td>
<td style="text-align:left">Runs anywhere (mobile, browser, edge)</td>
</tr>
</tbody>
</table>
<p>Real deployments stack these: distill → prune → quantize → ONNX.</p>
</section>

<h1 id="ship-it--demo-apps">Ship It — Demo Apps</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Gradio</span>
<span class="hljs-keyword">import</span> gradio <span class="hljs-keyword">as</span> gr
gr.Interface(predict, <span class="hljs-string">&quot;text&quot;</span>, <span class="hljs-string">&quot;label&quot;</span>).launch()

<span class="hljs-comment"># Streamlit</span>
<span class="hljs-keyword">import</span> streamlit <span class="hljs-keyword">as</span> st
x = st.text_input(<span class="hljs-string">&quot;Prompt&quot;</span>); st.write(model(x))

<span class="hljs-comment"># FastAPI</span>
<span class="hljs-meta">@app.post(<span class="hljs-params"><span class="hljs-string">&quot;/predict&quot;</span></span>)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">predict</span>(<span class="hljs-params">body: Input</span>) -&gt; Output: ...
</code></pre>
<p><strong>Gradio</strong> for quick ML demos · <strong>Streamlit</strong> for dashboards ·<br />
<strong>FastAPI</strong> for production APIs.</p>
</section>

<h1 id="ci--cd-in-one-slide">CI / CD in One Slide</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-comment"># .github/workflows/ci.yml</span>
<span class="hljs-attr">on:</span> [<span class="hljs-string">push</span>]
<span class="hljs-attr">jobs:</span>
  <span class="hljs-attr">test:</span>
    <span class="hljs-attr">runs-on:</span> <span class="hljs-string">ubuntu-latest</span>
    <span class="hljs-attr">steps:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">uses:</span> <span class="hljs-string">actions/checkout@v4</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">pip</span> <span class="hljs-string">install</span> <span class="hljs-string">-r</span> <span class="hljs-string">requirements.txt</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">pytest</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">run:</span> <span class="hljs-string">docker</span> <span class="hljs-string">build</span> <span class="hljs-string">-t</span> <span class="hljs-string">app</span> <span class="hljs-string">.</span>
</code></pre>
<p>Every commit: install, test, build a Docker image. <strong>If it breaks,<br />
you find out in 30 seconds, not two weeks later.</strong></p>
</section>

<h1 id="tool-calling--minimum-viable-loop">Tool Calling — Minimum Viable Loop</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">TOOLS = [{<span class="hljs-string">&quot;type&quot;</span>: <span class="hljs-string">&quot;function&quot;</span>,
          <span class="hljs-string">&quot;function&quot;</span>: {<span class="hljs-string">&quot;name&quot;</span>: <span class="hljs-string">&quot;calculate&quot;</span>,
                       <span class="hljs-string">&quot;description&quot;</span>: <span class="hljs-string">&quot;Do math&quot;</span>,
                       <span class="hljs-string">&quot;parameters&quot;</span>: {...}}}]

<span class="hljs-keyword">while</span> <span class="hljs-keyword">not</span> done:
    response = llm(messages, tools=TOOLS)
    <span class="hljs-keyword">for</span> call <span class="hljs-keyword">in</span> response.tool_calls:
        result = dispatch(call)
        messages.append({<span class="hljs-string">&quot;role&quot;</span>: <span class="hljs-string">&quot;tool&quot;</span>, <span class="hljs-string">&quot;content&quot;</span>: result})
</code></pre>
<p>Bigger tools, same architecture. Claude Code, Cursor, Devin, Perplexity — all follow this shape.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="38" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="advanced-calculator--why-its-not-a-toy">Advanced Calculator — Why It's Not a Toy</h1>
<p>The lab exercise: upgrade <code>calculate</code> to handle <code>sqrt, sin, log, factorial, np.mean, np.dot, matmul</code>, and keep <code>eval()</code> safe.</p>
<ul>
<li><strong>Exposes</strong> that &quot;tool = Python function&quot; scales to arbitrary math</li>
<li><strong>Teaches</strong> sandboxing (<code>{&quot;__builtins__&quot;: {}}</code>, AST walking)</li>
<li><strong>Shows</strong> that an LLM + numpy tool beats any LLM doing arithmetic alone</li>
</ul>
<p><em>This is the real-world recipe:</em> LLM + expert tool &gt;&gt; LLM alone.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-class="lead" data-theme="iitgn-modern" lang="en-IN" class="lead" style="--class:lead;--theme:iitgn-modern;">
<h1 id="common-mistakes--lessons">Common Mistakes &amp; Lessons</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="40" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="top-10-mistakes-i-saw--part-1">Top 10 Mistakes I Saw — Part 1</h1>
<ol>
<li><strong>Scaling before splitting</strong> → data leakage → fake accuracy</li>
<li><strong>No seed set</strong> → &quot;my model worked yesterday&quot;</li>
<li><strong>One train/test split</strong> reported as final → coin flip</li>
<li><strong>Pickled the model without <code>requirements.txt</code></strong> → unreproducible</li>
<li><strong>Hardcoded paths</strong> (<code>/home/student/...</code>) → breaks for the next person</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="41" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="50">
<h1 id="top-10-mistakes-i-saw--part-2">Top 10 Mistakes I Saw — Part 2</h1>
<ol start="6">
<li><strong>No README</strong> → nobody can run it</li>
<li><strong>Test set peeking</strong> during tuning → optimistic bias</li>
<li><strong>Committed API keys / secrets</strong> → please read <code>.gitignore</code> docs</li>
<li><strong>Caught every exception broadly</strong> → silent failures</li>
<li><strong>Optimized the wrong bottleneck</strong> — profiling would have shown the fix in 30 s</li>
</ol>
<p>Avoid these 10 → you're ahead of most production codebases.</p>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">my-project/
├── data/                  <span class="hljs-comment"># raw + processed (gitignored)</span>
├── notebooks/             <span class="hljs-comment"># exploration only</span>
├── src/
│   ├── train.py          <span class="hljs-comment"># training with seeds + tracking</span>
│   ├── evaluate.py       <span class="hljs-comment"># reproducible metrics</span>
│   └── app.py            <span class="hljs-comment"># Gradio / Streamlit / FastAPI</span>

├── requirements.txt       <span class="hljs-comment"># pinned versions</span>
├── Dockerfile             <span class="hljs-comment"># recipes that always work</span>
└── README.md              <span class="hljs-comment"># runnable in &lt; 5 min</span>

<h1 id="advice-for-future-projects">Advice for Future Projects</h1>
<ol>
<li><strong>Data before model.</strong> 80% of ML is data work.</li>
<li><strong>Simple first.</strong> Logistic regression before transformers.</li>
<li><strong>Automate day 1.</strong> Seeds, tracking, Docker, <code>requirements.txt</code>.</li>
<li><strong>Make it runnable.</strong> 5-minute clone → run, or it doesn't exist.</li>
<li><strong>Read the traceback</strong> before asking ChatGPT.</li>
<li><strong>Version everything</strong> — code, data, models, prompts.</li>
<li><strong>Ship early.</strong> 70% demo today &gt; 95% plan next month.</li>
</ol>
</section>

<h1 id="monday-morning-at-a-new-ml-job">Monday Morning at a New ML Job</h1>
<ol>
<li>Find the <code>train.py</code>. Run it. Does it reproduce?</li>
<li>Ask: where is the source of truth for training data?</li>
<li>Add seeds if missing.</li>
<li>Add experiment tracking if missing.</li>
<li>Write a Dockerfile. Ship it even if imperfect.</li>
</ol>
<p>You now know enough to be <strong>the person</strong> who does these things.</p>
</section>
