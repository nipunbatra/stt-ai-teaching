<h2 id="week-9-cs-203---software-tools-and-techniques-for-ai">Week 9: CS 203 - Software Tools and Techniques for AI</h2>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="2" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="the-friday-night-nightmare">The Friday Night Nightmare</h1>
<p><strong>11:30 PM — You (on WhatsApp):</strong></p>
<blockquote>
<p><em>&quot;Done! Model hit 94% accuracy. Just pushed <code>model_final_v2.py</code>. We are going to ace this.&quot;</em></p>
</blockquote>
<p><strong>11:45 PM — Your partner:</strong></p>
<blockquote>
<p><em>&quot;I pulled it. I'm only getting 81%.&quot;</em></p>
</blockquote>
<p><strong>11:47 PM — You:</strong></p>
<blockquote>
<p><em>&quot;Wait, let me run it again... I'm getting 86% now?! What hyperparameters did I use an hour ago?&quot;</em></p>
</blockquote>
<p><strong>11:55 PM — Your partner:</strong></p>
<blockquote>
<p><em>&quot;I tried to fix it. Now I get <code>ModuleNotFoundError: No module named 'xgboost'</code>. I'm on a Mac, are you on Windows?&quot;</em></p>
</blockquote>
<p><strong>12:30 AM:</strong> 17 Stack Overflow tabs. Still broken. <strong>0 marks.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="3" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="three-problems-three-solutions">Three Problems, Three Solutions</h1>
<p>Every reproducibility failure comes from losing control of one of three things:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Problem</th>
<th style="text-align:left">Symptom</th>
<th style="text-align:left">Solution</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>The Machine</strong></td>
<td style="text-align:left">&quot;It works on my laptop but not yours&quot;</td>
<td style="text-align:left">Docker</td>
</tr>
<tr>
<td style="text-align:left"><strong>The Math</strong></td>
<td style="text-align:left">&quot;I get different results every run&quot;</td>
<td style="text-align:left">Seeds &amp; determinism</td>
</tr>
<tr>
<td style="text-align:left"><strong>The Memory</strong></td>
<td style="text-align:left">&quot;Which of my 50 runs was the good one?&quot;</td>
<td style="text-align:left">Experiment tracking (TrackIO)</td>
</tr>
</tbody>
</table>
<p>Today we fix all three — starting with the biggest headache.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-class="lead" data-theme="iitgn-modern" lang="en-IN" class="lead" style="--class:lead;--theme:iitgn-modern;">
<h1 id="the-machine">The Machine</h1>
<p><em>Docker: Ship the Whole Computer</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="5" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="works-on-my-machine--the-most-famous-lie-in-cs">&quot;Works on My Machine&quot; — The Most Famous Lie in CS</h1>
<p>You shared your code AND <code>requirements.txt</code>. Your friend installs everything.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>$ python train.py
OSError: libgomp.so.1: cannot open shared object file
</code></pre>
<p><strong>What happened?</strong> Your code depends on a system library on your Mac that doesn't exist on their Windows laptop.</p>
<p>Virtual environments isolate <strong>Python packages</strong>. They <strong>don't</strong> isolate:</p>
<ul>
<li>Operating system (Mac vs Windows vs Linux)</li>
<li>System libraries (C compilers, CUDA)</li>
<li>Python version itself</li>
</ul>
<p><strong>We need to ship the entire computer, not just the package list.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="6" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="the-shipping-container-analogy">The Shipping Container Analogy</h1>
<p><img src="images/week09/shipping_container_analogy.png" alt="" style="width:900px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="7" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="the-shipping-container-analogy-1">The Shipping Container Analogy</h1>
<p>Before shipping containers, every port loaded cargo differently — different cranes, different sizes, breakage everywhere. Then someone said: <em>&quot;What if we put everything in one standard box?&quot;</em></p>
<p><strong>Docker is that box for software.</strong></p>
<p>You pack your code, Python, libraries, and OS into one standard container. It runs identically on any machine — your laptop, your friend's laptop, a cloud server.</p>
<table>
<thead>
<tr>
<th style="text-align:left">Without Docker</th>
<th style="text-align:left">With Docker</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">45 mins of <code>pip install</code> errors</td>
<td style="text-align:left"><code>docker run spam-app</code> (2 min)</td>
</tr>
<tr>
<td style="text-align:left">&quot;Which sklearn version?&quot;</td>
<td style="text-align:left">Frozen inside the container</td>
</tr>
<tr>
<td style="text-align:left">&quot;Are you on Windows?&quot;</td>
<td style="text-align:left">Doesn't matter</td>
</tr>
</tbody>
</table>
<p>That's literally why the logo is a whale carrying containers!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="8" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="why-docker-four-scenarios">Why Docker? Four Scenarios</h1>
<p><strong>1. The Assignment Defense</strong><br />
You submit your ML assignment. TA runs it on Windows → crash.<br />
With Docker: TA runs <code>docker run your-project</code> → guaranteed identical results.</p>
<p><strong>2. The Dependency Minefield</strong><br />
Cool GitHub repo needs Python 3.7 + old PyTorch. Installing it breaks your other projects.<br />
Docker: isolated bubble, no damage.</p>
<p><strong>3. The Group Project Peacemaker</strong><br />
4 teammates: Windows, Mac Intel, Mac Silicon, Linux.<br />
Docker gives everyone the exact same environment.</p>
<p><strong>4. The Portfolio Builder</strong><br />
You built a Gradio demo. Cloud providers want a Docker image, not your laptop.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="9" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="six-concepts--thats-all">Six Concepts — That's All</h1>
<table>
<thead>
<tr>
<th>Concept</th>
<th>What It Is</th>
<th>Analogy</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Image</strong></td>
<td>Blueprint — OS + libraries + code (read-only)</td>
<td>Recipe card</td>
</tr>
<tr>
<td><strong>Container</strong></td>
<td>Running instance of an image</td>
<td>Dish being cooked</td>
</tr>
<tr>
<td><strong>Dockerfile</strong></td>
<td>Instructions to build an image</td>
<td>The recipe</td>
</tr>
<tr>
<td><strong>Docker Hub</strong></td>
<td>Registry of pre-built images</td>
<td>GitHub for images</td>
</tr>
<tr>
<td><strong>Volumes</strong></td>
<td>Shared folder between container and laptop</td>
<td>USB drive</td>
</tr>
<tr>
<td><strong>Ports</strong></td>
<td>How you access container's web apps</td>
<td>Window into the kitchen</td>
</tr>
</tbody>
</table>
<p>If Image is a <strong>class</strong>, Container is an <strong>object</strong> (instance).</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="10" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="image-vs-container">Image vs Container</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Image (read-only blueprint)          Container (running instance)
┌─────────────────────┐              ┌─────────────────────┐
│  Python 3.10        │    docker    │  Python 3.10        │
│  sklearn 1.7.2      │ ──────────→ │  sklearn 1.7.2      │
│  your app.py        │    run      │  your app.py        │
│  (frozen, on disk)  │              │  (alive, in memory) │
└─────────────────────┘              └─────────────────────┘
                                     Can read/write files
                                     Can use network
                                     Dies when process exits
</code></pre>
<ul>
<li>One image → many containers (like one class → many objects)</li>
<li><code>docker build</code> creates images • <code>docker run</code> creates containers</li>
<li>Containers are <strong>disposable</strong> — delete and recreate anytime</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="11" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="dockerfile-image-container--the-flow">Dockerfile, Image, Container — The Flow</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Dockerfile          docker build         docker run
(text file)  ─────────────────→  Image  ─────────────→  Container
                                  │                       │
 FROM python:3.10-slim            │  stored on disk       │ running process
 WORKDIR /app                     │  shareable            │ isolated
 COPY app.py .                    │  versioned            │ temporary
 RUN pip install ...              │                       │
 CMD [&quot;python&quot;, &quot;app.py&quot;]         │                       │
</code></pre>
<p><strong>Docker Hub</strong> is where you download pre-built images (<code>python:3.10-slim</code>, <code>ubuntu:22.04</code>).</p>
<p><strong>Volumes</strong> (<code>-v</code>) let containers share a folder with your laptop so files survive.</p>
<p><strong>Ports</strong> (<code>-p</code>) let your browser reach a web app inside the container.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="12" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="docker-vs-virtual-machines">Docker vs Virtual Machines</h1>
<p>&quot;Isn't Docker just a VM?&quot;</p>
<p><img src="images/week09/docker_vs_vm.svg" alt="Docker vs VM" /></p>
<p>VMs run a <strong>full guest OS</strong> (Windows inside Mac). Docker shares the host kernel — no guest OS needed.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="13" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="docker-vs-vms-the-numbers">Docker vs VMs: The Numbers</h1>
<table>
<thead>
<tr>
<th style="text-align:left"></th>
<th style="text-align:left">VM</th>
<th style="text-align:left">Docker Container</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Size</strong></td>
<td style="text-align:left">GBs (full OS)</td>
<td style="text-align:left">MBs (just your app)</td>
</tr>
<tr>
<td style="text-align:left"><strong>Startup</strong></td>
<td style="text-align:left">Minutes</td>
<td style="text-align:left">Seconds</td>
</tr>
<tr>
<td style="text-align:left"><strong>Isolation</strong></td>
<td style="text-align:left">Complete (own kernel)</td>
<td style="text-align:left">Process-level (shared kernel)</td>
</tr>
<tr>
<td style="text-align:left"><strong>Use case</strong></td>
<td style="text-align:left">Run a different OS</td>
<td style="text-align:left">Package an app with dependencies</td>
</tr>
<tr>
<td style="text-align:left"><strong>RAM</strong></td>
<td style="text-align:left">Each VM needs GBs</td>
<td style="text-align:left">Containers share host memory</td>
</tr>
</tbody>
</table>
<p><strong>Bottom line:</strong> VMs are heavy but fully isolated. Docker is lightweight and fast — perfect for shipping apps.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="14" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="wait--if-docker-shares-the-host-kernel-why-do-i-see-linux">&quot;Wait — If Docker Shares the Host Kernel, Why Do I See Linux?&quot;</h1>
<p>Great question! On Mac/Windows, Docker Desktop runs a <strong>tiny Linux VM</strong> behind the scenes.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Your Mac (macOS kernel)
  └── Docker Desktop runs a lightweight Linux VM (invisible)
        └── All containers share THIS Linux kernel
              ├── Container A (python:3.10-slim → Debian)
              ├── Container B (ubuntu:22.04)
              └── Container C (alpine:3.18)
</code></pre>
<ul>
<li>The containers see <strong>Linux</strong> because they share the VM's Linux kernel</li>
<li><code>cat /etc/os-release</code> inside shows Debian/Ubuntu/Alpine — that's the <strong>userspace</strong> (files, tools, package manager), not a full separate kernel</li>
<li>On a Linux laptop, there's no VM — containers share the host kernel directly</li>
</ul>
<p><strong>Think of it this way:</strong> The kernel is the engine. The image provides the dashboard, seats, and paint job. Different images = different interiors, same engine underneath.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="15" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="docker-hub-the-app-store-for-images">Docker Hub: The App Store for Images</h1>
<p><code>FROM python:3.10-slim</code> — where does this come from?</p>
<p><strong>Docker Hub</strong> (hub.docker.com) — a public registry of pre-built images.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">docker pull python:3.10-slim    <span class="hljs-comment"># download an image</span>
docker images                    <span class="hljs-comment"># list images on your machine</span>
</code></pre>
<p>Anyone can publish images. Official ones (Python, Ubuntu, nginx) are verified.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="16" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="docker-hub-choosing-the-right-image">Docker Hub: Choosing the Right Image</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Image</th>
<th style="text-align:left">What's Inside</th>
<th style="text-align:left">Size</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><code>python:3.10</code></td>
<td style="text-align:left">Full Debian + Python + compilers</td>
<td style="text-align:left">~1 GB</td>
</tr>
<tr>
<td style="text-align:left"><code>python:3.10-slim</code></td>
<td style="text-align:left">Minimal Debian + Python</td>
<td style="text-align:left">~150 MB</td>
</tr>
<tr>
<td style="text-align:left"><code>python:3.10-alpine</code></td>
<td style="text-align:left">Alpine Linux + Python</td>
<td style="text-align:left">~50 MB</td>
</tr>
<tr>
<td style="text-align:left"><code>ubuntu:22.04</code></td>
<td style="text-align:left">Just Ubuntu, no Python</td>
<td style="text-align:left">~77 MB</td>
</tr>
</tbody>
</table>
<p><strong>Always use <code>-slim</code></strong> unless you need C compilers.</p>
<p><code>-alpine</code> is smallest but can break packages that need <code>glibc</code>. Stick with <code>-slim</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="17" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="the-dockerfile-line-by-line">The Dockerfile: Line by Line</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dockerfile"><span class="hljs-keyword">FROM</span> python:<span class="hljs-number">3.10</span>-slim              <span class="hljs-comment"># 1. Start with Python + Linux</span>

<span class="hljs-keyword">WORKDIR</span><span class="language-bash"> /app                       <span class="hljs-comment"># 2. Create a workspace folder</span></span>

<span class="hljs-keyword">COPY</span><span class="language-bash"> requirements.txt .            <span class="hljs-comment"># 3. Bring the ingredient list</span></span>
<span class="hljs-keyword">RUN</span><span class="language-bash"> pip install -r requirements.txt <span class="hljs-comment"># 4. Install packages</span></span>

<span class="hljs-keyword">COPY</span><span class="language-bash"> app.py spam_model.pkl ./      <span class="hljs-comment"># 5. Bring our code + model</span></span>

<span class="hljs-keyword">ENV</span> GRADIO_SERVER_NAME=<span class="hljs-string">&quot;0.0.0.0&quot;</span>   <span class="hljs-comment"># 6. Let the outside world connect</span>

<span class="hljs-keyword">EXPOSE</span> <span class="hljs-number">7860</span>                        <span class="hljs-comment"># 7. Document the port</span>

<span class="hljs-keyword">CMD</span><span class="language-bash"> [<span class="hljs-string">&quot;python&quot;</span>, <span class="hljs-string">&quot;app.py&quot;</span>]           <span class="hljs-comment"># 8. What runs when container starts</span></span>
</code></pre>
<p><strong>Line 6 is critical:</strong> Gradio defaults to <code>127.0.0.1</code> (container talks to itself only). <code>0.0.0.0</code> says &quot;accept connections from outside.&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="18" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="layer-caching-why-second-build-is-fast">Layer Caching: Why Second Build is Fast</h1>
<p>Docker caches each step. If nothing changed, it reuses the cache:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">$ docker build -t spam-app .
=&gt; CACHED [1/5] FROM python:3.10-slim      <span class="hljs-comment"># already downloaded</span>
=&gt; CACHED [2/5] WORKDIR /app               <span class="hljs-comment"># nothing changed</span>
=&gt; CACHED [3/5] COPY requirements.txt .    <span class="hljs-comment"># file unchanged</span>
=&gt; CACHED [4/5] RUN pip install ...        <span class="hljs-comment"># packages cached!</span>
=&gt; [5/5] COPY app.py spam_model.pkl ./     <span class="hljs-comment"># code changed -&gt; rebuilds</span>
</code></pre>
<p><strong>First build:</strong> 2 minutes (downloads everything).<br />
<strong>Second build:</strong> 5 seconds (only re-copies your code).</p>
<p><strong>Pro tip:</strong> <code>COPY requirements.txt</code> before <code>COPY . .</code> — if only your code changed, Docker skips the slow <code>pip install</code>!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-class="lead" data-theme="iitgn-modern" lang="en-IN" class="lead" style="--class:lead;--theme:iitgn-modern;">
<h1 id="live-demos">Live Demos</h1>
<p><em>Clone and follow along:</em><br />
<code>git clone https://github.com/nipunbatra/docker-ml-demos</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="20" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="demo-1-hello-docker">Demo 1: Hello Docker</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> docker-ml-demos/1-hello
docker build -t hello-docker .
docker run hello-docker
</code></pre>
<p><strong>What you see:</strong> Python version and OS are different from your laptop. It says &quot;Linux&quot; even on a Mac!</p>
<p><strong>Try the interactive mode:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">docker run -it hello-docker bash       <span class="hljs-comment"># shell into the container</span>
docker run -it hello-docker python     <span class="hljs-comment"># Python REPL inside container</span>
</code></pre>
<p><code>-it</code> connects your keyboard + terminal. Without it, Docker runs headless.</p>
<blockquote>
<p>See <code>WALKTHROUGH.md</code> in the repo for the full guided script.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="21" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="demo-2-reproducible-dependencies">Demo 2: Reproducible Dependencies</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ../2-dependencies
docker build -t train-model .
docker run train-model          <span class="hljs-comment"># always the same accuracy!</span>
docker run train-model          <span class="hljs-comment"># same again!</span>
</code></pre>
<p>Pinned <code>scikit-learn==1.7.2</code> + <code>random_state=42</code> = identical results every time.</p>
<p>Compare with your laptop:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">python -c <span class="hljs-string">&quot;import sklearn; print(sklearn.__version__)&quot;</span>
<span class="hljs-comment"># → probably different!</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="22" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="demo-3-web-app--port-mapping">Demo 3: Web App + Port Mapping</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ../3-web-app
docker build -t spam-app .
docker run -p 7861:7860 spam-app
</code></pre>
<p>Open <strong><a href="http://localhost:7861">http://localhost:7861</a></strong> — a spam classifier is live!</p>
<p><img src="images/week09/docker_port_mapping.svg" alt="Port Mapping" /></p>
<p><code>-p 7861:7860</code> = your laptop's port 7861 → container's port 7860.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="23" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="demo-4-volumes--containers-have-amnesia">Demo 4: Volumes — Containers Have Amnesia</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ../4-volumes
docker build -t train-save .
docker run train-save               <span class="hljs-comment"># model saved... inside container</span>
<span class="hljs-built_in">ls</span> outputs/                          <span class="hljs-comment"># → No such file! Gone forever.</span>

docker run -v $(<span class="hljs-built_in">pwd</span>)/outputs:/app/outputs train-save
<span class="hljs-built_in">ls</span> outputs/                          <span class="hljs-comment"># → model.pkl, training_log.txt!</span>
</code></pre>
<p><code>-v</code> mounts a folder from your laptop into the container — like plugging in a USB drive.</p>
<p>Without <code>-v</code>, files created inside the container vanish when it stops. <strong>By design.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="24" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="demo-5-environment-variables">Demo 5: Environment Variables</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">cd</span> ../5-environment
docker build -t env-demo .

<span class="hljs-comment"># Default: RandomForest, 100 trees</span>
docker run -p 7861:7860 env-demo

<span class="hljs-comment"># Switch to SVM — no rebuild!</span>
docker run -p 7861:7860 -e MODEL_TYPE=svm env-demo

<span class="hljs-comment"># 500 trees — no rebuild!</span>
docker run -p 7861:7860 -e N_ESTIMATORS=500 env-demo
</code></pre>
<p>Same image, three different behaviors. <code>-e</code> injects config at runtime.</p>
<p>In Python: <code>os.environ.get(&quot;MODEL_TYPE&quot;, &quot;rf&quot;)</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="25" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="common-docker-errors">Common Docker Errors</h1>
<p><strong>1. <code>docker: command not found</code></strong><br />
→ Docker Desktop isn't running. Open the app first!</p>
<p><strong>2. <code>port is already allocated</code></strong><br />
→ Something else is using that port. Pick a different one: <code>-p 7862:7860</code></p>
<p><strong>3. <code>COPY failed: file not found</code></strong><br />
→ The file isn't in the same folder as your Dockerfile. Check with <code>ls</code>.</p>
<p><strong>4. Image is 3GB!</strong><br />
→ Use <code>FROM python:3.10-slim</code> instead of <code>python:3.10</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">docker system prune   <span class="hljs-comment"># clean up old images eating your disk</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="26" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="the-6-docker-commands-you-need">The 6 Docker Commands You Need</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">docker build -t my-app .              <span class="hljs-comment"># Build image from Dockerfile</span>
docker run my-app                      <span class="hljs-comment"># Run (foreground)</span>
docker run -d -p 7861:7860 my-app     <span class="hljs-comment"># Run (background + port)</span>
docker ps                              <span class="hljs-comment"># List running containers</span>
docker stop &lt;<span class="hljs-built_in">id</span>&gt;                       <span class="hljs-comment"># Stop a container</span>
docker <span class="hljs-built_in">exec</span> -it &lt;<span class="hljs-built_in">id</span>&gt; bash             <span class="hljs-comment"># Shell into running container</span>
</code></pre>
<p>That's it. Docker solves the machine.</p>
<p>But even inside the same Docker container, you can still get different results every run...</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-class="lead" data-theme="iitgn-modern" lang="en-IN" class="lead" style="--class:lead;--theme:iitgn-modern;">
<h1 id="the-math">The Math</h1>
<p><em>Seeds &amp; Determinism</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="28" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="yesterday-92-today-85-same-code">&quot;Yesterday 92%, Today 85%, Same Code?!&quot;</h1>
<p>Run your model training twice — exact same code:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">X_train, X_test, y_train, y_test = train_test_split(X, y)
model = RandomForestClassifier()
model.fit(X_train, y_train)
<span class="hljs-built_in">print</span>(model.score(X_test, y_test))
</code></pre>
<p><strong>Run 1:</strong> 0.92    <strong>Run 2:</strong> 0.85    <strong>Run 3:</strong> 0.88</p>
<p><strong>Which result do you report?</strong> The problem: <strong>uncontrolled randomness.</strong></p>
<p>Sources of randomness in ML:</p>
<ul>
<li><strong>Train/test split</strong> — which samples go where</li>
<li><strong>Model initialization</strong> — starting weights (neural nets)</li>
<li><strong>Data shuffling</strong> — order during training</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="29" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="the-minecraft-seed">The Minecraft Seed</h1>
<p><img src="images/week09/minecraft_seed_concept.png" alt="" style="width:900px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="30" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="the-minecraft-seed-1">The Minecraft Seed</h1>
<p>In Minecraft, the world is randomly generated. But enter the <strong>same seed</strong> → get the <strong>exact same world</strong> every time.</p>
<table>
<thead>
<tr>
<th style="text-align:left">Minecraft</th>
<th style="text-align:left">Machine Learning</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Seed number</td>
<td style="text-align:left"><code>random_state=42</code></td>
</tr>
<tr>
<td style="text-align:left">Same seed → same world</td>
<td style="text-align:left">Same seed → same split, same model</td>
</tr>
<tr>
<td style="text-align:left">Share seed with friend → same map</td>
<td style="text-align:left">Share seed with TA → same results</td>
</tr>
</tbody>
</table>
<p><strong>A random seed locks the universe into one specific timeline.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="31" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="how-to-lock-the-universe">How to Lock the Universe</h1>
<p><strong>In sklearn:</strong> set <code>random_state</code> everywhere</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">X_train, X_test, y_train, y_test = train_test_split(
    X, y, test_size=<span class="hljs-number">0.2</span>, random_state=<span class="hljs-number">42</span>)

model = RandomForestClassifier(n_estimators=<span class="hljs-number">100</span>, random_state=<span class="hljs-number">42</span>)

kf = KFold(n_splits=<span class="hljs-number">5</span>, shuffle=<span class="hljs-literal">True</span>, random_state=<span class="hljs-number">42</span>)
</code></pre>
<p><strong>Global seed</strong> (for larger projects):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> random, numpy <span class="hljs-keyword">as</span> np

<span class="hljs-keyword">def</span> <span class="hljs-title function_">set_seed</span>(<span class="hljs-params">seed=<span class="hljs-number">42</span></span>):
    random.seed(seed)
    np.random.seed(seed)

set_seed(<span class="hljs-number">42</span>)  <span class="hljs-comment"># call once at the top of your script</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="32" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="seeds-the-limits">Seeds: The Limits</h1>
<p>Setting seeds makes YOUR code deterministic. But results can still differ across machines:</p>
<ul>
<li><strong>Different OS</strong> → different BLAS/LAPACK math libraries under the hood</li>
<li><strong>Different library versions</strong> → sklearn 1.2 vs 1.4 may split data differently</li>
<li><strong>GPU non-determinism</strong> → CUDA operations are not always reproducible</li>
</ul>
<p>That's why we need Docker (same OS + same libraries) <strong>and</strong> seeds (same randomness).</p>
<p>Seeds + Docker solve the math and the machine. But you still need to remember what you did...</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-class="lead" data-theme="iitgn-modern" lang="en-IN" class="lead" style="--class:lead;--theme:iitgn-modern;">
<h1 id="the-memory">The Memory</h1>
<p><em>Experiment Tracking with TrackIO</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="34" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="the-spreadsheet-graveyard">The Spreadsheet Graveyard</h1>
<p>You've been tuning hyperparameters all week:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>run_lr001_depth5_est100.py     → 87.2%
run_lr01_depth10_est200.py     → 91.4%  ← wait, was this the one?
run_lr01_depth10_est200_v2.py  → 89.1%  ← or this?
run_FINAL.py                   → ???
run_FINAL_FINAL.py             → ???
run_FINAL_USE_THIS.py          → definitely not this
</code></pre>
<p>You had <strong>the</strong> best model last Tuesday. Now you can't find it.</p>
<p><strong>Seeds made results reproducible. But you didn't record what you did.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="35" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="trackio-three-calls-is-all-you-need">TrackIO: Three Calls Is All You Need</h1>
<p><strong>TrackIO</strong> (by Hugging Face) — free, local-first experiment tracking.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> trackio

<span class="hljs-comment"># 1. Start a run</span>
trackio.init(project=<span class="hljs-string">&quot;cs203-week08-demo&quot;</span>, name=<span class="hljs-string">&quot;RandomForest&quot;</span>,
             config={<span class="hljs-string">&quot;model&quot;</span>: <span class="hljs-string">&quot;RF&quot;</span>, <span class="hljs-string">&quot;n_estimators&quot;</span>: <span class="hljs-number">100</span>, <span class="hljs-string">&quot;max_depth&quot;</span>: <span class="hljs-number">10</span>})

<span class="hljs-comment"># 2. Log metrics</span>
trackio.log({<span class="hljs-string">&quot;train_accuracy&quot;</span>: <span class="hljs-number">0.95</span>, <span class="hljs-string">&quot;test_accuracy&quot;</span>: <span class="hljs-number">0.845</span>})

<span class="hljs-comment"># 3. Finish</span>
trackio.finish()
</code></pre>
<p>Everything stored locally in SQLite — no account, no cloud, no cost.</p>
<blockquote>
<p><strong>Demo</strong>: <code>python trackio_1_training_curves.py</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="36" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="trackio-training-curves">TrackIO: Training Curves</h1>
<p>Log metrics at each step → dashboard shows curves:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">trackio.init(project=<span class="hljs-string">&quot;cs203-week08-demo&quot;</span>, name=<span class="hljs-string">&quot;gb-training&quot;</span>,
             config={<span class="hljs-string">&quot;model&quot;</span>: <span class="hljs-string">&quot;GradientBoosting&quot;</span>, <span class="hljs-string">&quot;lr&quot;</span>: <span class="hljs-number">0.1</span>})

<span class="hljs-keyword">for</span> n_est <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">10</span>, <span class="hljs-number">310</span>, <span class="hljs-number">10</span>):
    gb = GradientBoostingClassifier(n_estimators=n_est, learning_rate=<span class="hljs-number">0.1</span>,
                                    max_depth=<span class="hljs-number">3</span>, random_state=<span class="hljs-number">42</span>)
    gb.fit(X_train, y_train)
    trackio.log({
        <span class="hljs-string">&quot;n_estimators&quot;</span>: n_est,
        <span class="hljs-string">&quot;train_accuracy&quot;</span>: <span class="hljs-built_in">float</span>(<span class="hljs-built_in">round</span>(gb.score(X_train, y_train), <span class="hljs-number">4</span>)),
        <span class="hljs-string">&quot;test_accuracy&quot;</span>: <span class="hljs-built_in">float</span>(<span class="hljs-built_in">round</span>(gb.score(X_test, y_test), <span class="hljs-number">4</span>)),
    })

trackio.finish()
</code></pre>
<p>Watch accuracy climb and plateau — just like TensorBoard, but simpler.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="37" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="trackio-comparing-runs">TrackIO: Comparing Runs</h1>
<p>Run the same model with 3 learning rates → dashboard <strong>overlays</strong> them:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> lr <span class="hljs-keyword">in</span> [<span class="hljs-number">0.01</span>, <span class="hljs-number">0.1</span>, <span class="hljs-number">0.5</span>]:
    trackio.init(project=<span class="hljs-string">&quot;cs203-week08-demo&quot;</span>, name=<span class="hljs-string">f&quot;lr-<span class="hljs-subst">{lr}</span>&quot;</span>,
                 config={<span class="hljs-string">&quot;learning_rate&quot;</span>: lr})

    <span class="hljs-keyword">for</span> n_est <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">10</span>, <span class="hljs-number">210</span>, <span class="hljs-number">10</span>):
        gb = GradientBoostingClassifier(n_estimators=n_est, learning_rate=lr,
                                        random_state=<span class="hljs-number">42</span>)
        gb.fit(X_train, y_train)
        trackio.log({
            <span class="hljs-string">&quot;n_estimators&quot;</span>: n_est,
            <span class="hljs-string">&quot;train_accuracy&quot;</span>: <span class="hljs-built_in">float</span>(<span class="hljs-built_in">round</span>(gb.score(X_train, y_train), <span class="hljs-number">4</span>)),
            <span class="hljs-string">&quot;test_accuracy&quot;</span>: <span class="hljs-built_in">float</span>(<span class="hljs-built_in">round</span>(gb.score(X_test, y_test), <span class="hljs-number">4</span>)),
        })

    trackio.finish()
</code></pre>
<blockquote>
<p><strong>Demo</strong>: <code>python trackio_3_compare_hyperparams.py</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="38" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="trackio-images--tables">TrackIO: Images &amp; Tables</h1>
<p><strong>Log images</strong> to see what went wrong:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">trackio.log({
    <span class="hljs-string">&quot;misclassified&quot;</span>: trackio.Image(<span class="hljs-string">&quot;errors.png&quot;</span>,
        caption=<span class="hljs-string">&quot;All misclassified digits&quot;</span>),
})
</code></pre>
<p><strong>Log tables</strong> for structured analysis:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">trackio.log({<span class="hljs-string">&quot;per_class_metrics&quot;</span>: trackio.Table(
    dataframe=pd.DataFrame(table_data,
        columns=[<span class="hljs-string">&quot;Digit&quot;</span>, <span class="hljs-string">&quot;Precision&quot;</span>, <span class="hljs-string">&quot;Recall&quot;</span>, <span class="hljs-string">&quot;F1&quot;</span>]),
)})
</code></pre>
<blockquote>
<p><strong>Demo</strong>: <code>python trackio_2_misclassified.py</code> and <code>trackio_4_per_class_table.py</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="39" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="trackio-alerts-for-overfitting">TrackIO: Alerts for Overfitting</h1>
<p>Get notified when something goes wrong:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> depth <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>, <span class="hljs-number">30</span>):
    dt = DecisionTreeClassifier(max_depth=depth, random_state=<span class="hljs-number">42</span>)
    dt.fit(X_train, y_train)
    gap = dt.score(X_train, y_train) - dt.score(X_test, y_test)

    trackio.log({<span class="hljs-string">&quot;max_depth&quot;</span>: depth, <span class="hljs-string">&quot;overfit_gap&quot;</span>: gap})

    <span class="hljs-keyword">if</span> gap &gt; <span class="hljs-number">0.08</span>:
        trackio.alert(title=<span class="hljs-string">&quot;Overfitting detected!&quot;</span>,
                      text=<span class="hljs-string">f&quot;Gap=<span class="hljs-subst">{gap:<span class="hljs-number">.1</span>%}</span> at depth=<span class="hljs-subst">{depth}</span>&quot;</span>,
                      level=trackio.AlertLevel.ERROR)
</code></pre>
<blockquote>
<p><strong>Demo</strong>: <code>python trackio_5_overfitting_alert.py</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="40" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">

<h1 id="the-complete-reproducibility-stack">The Complete Reproducibility Stack</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Layer</th>
<th style="text-align:left">Tool</th>
<th style="text-align:left">What It Controls</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>The Machine</strong></td>
<td style="text-align:left">Docker</td>
<td style="text-align:left">OS + system libs + everything</td>
</tr>
<tr>
<td style="text-align:left"><strong>The Packages</strong></td>
<td style="text-align:left"><code>venv</code> + <code>requirements.txt</code></td>
<td style="text-align:left">Library versions</td>
</tr>
<tr>
<td style="text-align:left"><strong>The Math</strong></td>
<td style="text-align:left"><code>random_state=42</code></td>
<td style="text-align:left">Algorithmic randomness</td>
</tr>
<tr>
<td style="text-align:left"><strong>The Memory</strong></td>
<td style="text-align:left">TrackIO</td>
<td style="text-align:left">What you tried &amp; what worked</td>
</tr>
</tbody>
</table>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Docker + Venv + Seeds + TrackIO = Time Capsule
</code></pre>
<p><strong>You don't always need all layers.</strong> For course projects: seeds + TrackIO + venv is enough. Add Docker when shipping to production or sharing across OS.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="iitgn-modern" lang="en-IN" data-marpit-pagination="42" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="42">
<h1 id="key-takeaways">Key Takeaways</h1>
<ol>
<li><strong>Docker ships the machine</strong> — OS + libraries + Python + your code, frozen together</li>
<li><strong>Set seeds everywhere</strong> — <code>random_state=42</code> in every sklearn call</li>
<li><strong>Track experiments</strong> — <code>trackio.init()</code> / <code>log()</code> / <code>finish()</code> — never lose a good run</li>
<li><strong>Pin dependencies</strong> — <code>pip freeze &gt; requirements.txt</code> with exact versions</li>
<li><strong>Volumes for persistence</strong> — containers have amnesia; use <code>-v</code> to save data</li>
<li><strong>Reproducibility is a gift to your future self</strong> — if no one else can run it, it might as well not exist</li>
</ol>
