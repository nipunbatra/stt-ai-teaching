</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="81" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="psi-step-1-compare-the-bin-percentages">PSI Step 1: Compare the Bin Percentages</h1>
<p><img src="images/week10/psi_bins_only.png" alt="" style="width:850px;" /></p>
<p>Read this gently:</p>
<ol>
<li>put the feature into bins</li>
<li>ask what percentage of records falls in each bin</li>
<li>compare training and production bin by bin</li>
</ol>
<p>If many bins change a lot, drift is larger.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="82" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="psi-step-2-add-the-mismatches-into-one-score">PSI Step 2: Add the Mismatches into One Score</h1>
<p><img src="images/week10/psi_step_by_step.png" alt="" style="width:760px;" /></p>
<p>Think of PSI like this:</p>
<ul>
<li>each bin gives one mismatch number</li>
<li>bins with bigger percentage changes contribute more</li>
<li>add those bin contributions to get the final PSI</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="83" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="psi-formula-only-if-you-want-it">PSI Formula: Only If You Want It</h1>
<p>You do <strong>not</strong> need to memorize this.</p>
<p>Read it like a recipe:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">For each bin:
contribution = (prod_pct - train_pct) * ln(prod_pct / train_pct)

Then:
PSI = sum of all bin contributions
</code></pre>
<p>How to read it:</p>
<ul>
<li>if train and production percentages are similar, contribution stays small</li>
<li>if they differ a lot, contribution becomes larger</li>
</ul>
<p>Gentle intuition:</p>
<ul>
<li><code>(prod_pct - train_pct)</code> measures <strong>how much the percentage moved</strong></li>
<li><code>ln(prod_pct / train_pct)</code> measures <strong>how large that move is relatively</strong></li>
<li>multiplying them gives a bigger score only when the shift is meaningfully large</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="84" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="psi-worked-example-put-the-numbers-in">PSI Worked Example: Put the Numbers In</h1>
<p>Using the same age-bin example:</p>
<ul>
<li><code>18-25</code>: <code>(0.15 - 0.30) * ln(0.15 / 0.30) = 0.104</code></li>
<li><code>25-32</code>: <code>(0.20 - 0.25) * ln(0.20 / 0.25) = 0.011</code></li>
<li><code>32-40</code>: <code>(0.25 - 0.20) * ln(0.25 / 0.20) = 0.011</code></li>
</ul>
<p>Each bin gives one contribution.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="85" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="psi-worked-example-finish-the-sum">PSI Worked Example: Finish the Sum</h1>
<ul>
<li><code>40-50</code>: <code>(0.25 - 0.15) * ln(0.25 / 0.15) = 0.051</code></li>
<li><code>50+</code>: <code>(0.15 - 0.10) * ln(0.15 / 0.10) = 0.020</code></li>
</ul>
<p>Now add everything:</p>
<p><code>PSI = 0.104 + 0.011 + 0.011 + 0.051 + 0.020 = 0.198</code></p>
<p>So this would count as <strong>moderate drift</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="86" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="psi-gentle-reading-guide">PSI: Gentle Reading Guide</h1>
<p>Common rule of thumb:</p>
<table>
<thead>
<tr>
<th style="text-align:left">PSI</th>
<th style="text-align:left">Interpretation</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><code>&lt; 0.10</code></td>
<td style="text-align:left">little or no drift</td>
</tr>
<tr>
<td style="text-align:left"><code>0.10 - 0.25</code></td>
<td style="text-align:left">moderate drift</td>
</tr>
<tr>
<td style="text-align:left"><code>&gt; 0.25</code></td>
<td style="text-align:left">significant drift</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="87" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="psi-example-a-almost-no-drift">PSI Example A: Almost No Drift</h1>
<p>Suppose:</p>
<ul>
<li>train = <code>[0.50, 0.30, 0.20]</code></li>
<li>prod = <code>[0.48, 0.31, 0.21]</code></li>
</ul>
<p>Then:</p>
<ul>
<li><code>(0.48 - 0.50) * ln(0.48 / 0.50) = 0.001</code></li>
<li><code>(0.31 - 0.30) * ln(0.31 / 0.30) = 0.000</code></li>
<li><code>(0.21 - 0.20) * ln(0.21 / 0.20) = 0.001</code></li>
</ul>
<p>So:</p>
<p><code>PSI ≈ 0.001 + 0.000 + 0.001 = 0.002</code></p>
<p>This is <strong>little or no drift</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="88" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="psi-example-b-clear-drift">PSI Example B: Clear Drift</h1>
<p>Suppose:</p>
<ul>
<li>train = <code>[0.50, 0.30, 0.20]</code></li>
<li>prod = <code>[0.25, 0.35, 0.40]</code></li>
</ul>
<p>Then:</p>
<ul>
<li><code>(0.25 - 0.50) * ln(0.25 / 0.50) = 0.173</code></li>
<li><code>(0.35 - 0.30) * ln(0.35 / 0.30) = 0.008</code></li>
<li><code>(0.40 - 0.20) * ln(0.40 / 0.20) = 0.139</code></li>
</ul>
<p>So:</p>
<p><code>PSI ≈ 0.173 + 0.008 + 0.139 = 0.320</code></p>
<p>This is <strong>significant drift</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="89" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="why-people-like-psi">Why People Like PSI</h1>
<ul>
<li>easy to explain on dashboards</li>
<li>works naturally with bins</li>
<li>gives one score per feature</li>
</ul>
<p>Companion notebook:<br />
<code>lecture-demos/week10/psi_tiny_companion.ipynb</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="90" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="90" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="evidently-same-idea-one-report">Evidently: Same Idea, One Report</h1>
<p>When the table has many features, doing everything manually becomes tedious.</p>
<p>Evidently helps by:</p>
<ul>
<li>checking many features at once</li>
<li>using suitable checks for numeric and categorical columns</li>
<li>generating an HTML report that is easy to share</li>
</ul>
<p>So the mental model stays the same.<br />
You are just automating the checks.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="91" data-paginate="true" data-class="code-heavy" data-theme="iitgn-modern" lang="C" class="code-heavy" data-marpit-pagination="91" style="--paginate:true;--class:code-heavy;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="evidently-minimal-demo">Evidently: Minimal Demo</h1>

report = Report(metrics=[DataDriftPreset()])
report.run(reference_data=df_train, current_data=df_prod)
report.save_html(<span class="hljs-string">&quot;drift_report.html&quot;</span>)

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="92" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="92" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="detection-what-are-you-looking-at">Detection: What Are You Looking At?</h1>
<p>Before picking a test, ask:</p>
<p><strong>which part of the ML system am I checking?</strong></p>
<table>
<thead>
<tr>
<th style="text-align:left">Drift type</th>
<th style="text-align:left">Mostly watch</th>
<th style="text-align:left">Need fresh labels?</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Data drift</td>
<td style="text-align:left"><strong>inputs <code>X</code></strong></td>
<td style="text-align:left">No</td>
</tr>
<tr>
<td style="text-align:left">Concept drift</td>
<td style="text-align:left"><strong>prediction vs true label</strong></td>
<td style="text-align:left"><strong>Yes, usually delayed</strong></td>
</tr>
<tr>
<td style="text-align:left">Label drift</td>
<td style="text-align:left"><strong>outcomes <code>Y</code></strong></td>
<td style="text-align:left"><strong>Yes, usually delayed</strong></td>
</tr>
</tbody>
</table>
<p>So the first split is simple:</p>
<ul>
<li><strong>data drift</strong> -&gt; look at the inputs</li>
<li><strong>concept drift</strong> -&gt; look at labeled performance</li>
<li><strong>label drift</strong> -&gt; look at class balance</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="93" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="93" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="detection-cheat-sheet">Detection Cheat Sheet</h1>
<table>
<thead>
<tr>
<th style="text-align:left">If this changed</th>
<th style="text-align:left">Look here first</th>
<th style="text-align:left">Good first tool</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">one numeric input feature</td>
<td style="text-align:left">input <code>X</code></td>
<td style="text-align:left">Kolmogorov-Smirnov (KS) or PSI</td>
</tr>
<tr>
<td style="text-align:left">one categorical input feature</td>
<td style="text-align:left">input <code>X</code></td>
<td style="text-align:left">chi-squared (<code>chi^2</code>) test</td>
</tr>
<tr>
<td style="text-align:left">many input features together</td>
<td style="text-align:left">input <code>X</code></td>
<td style="text-align:left">Evidently</td>
</tr>
<tr>
<td style="text-align:left">rule from <code>X -&gt; Y</code></td>
<td style="text-align:left">labeled production predictions</td>
<td style="text-align:left">accuracy / precision / recall over time</td>
</tr>
<tr>
<td style="text-align:left">label frequencies <code>Y</code></td>
<td style="text-align:left">production labels</td>
<td style="text-align:left">class proportions or chi-squared (<code>chi^2</code>)</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="94" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="94" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="but-do-we-have-y-in-production">But Do We Have <code>Y</code> in Production?</h1>
<p>Often <strong>not immediately</strong>.</p>
<p>In many real systems:</p>
<ul>
<li>true labels arrive days or weeks later</li>
<li>some labels need manual review</li>
<li>some tasks never get perfect labels at all</li>
</ul>
<p>So:</p>
<ul>
<li><strong>data drift</strong> can usually be checked right away from <code>X</code></li>
<li><strong>concept drift</strong> and <strong>label drift</strong> are often checked later, when labels arrive</li>
<li>before labels arrive, teams may only use proxies such as predicted class ratios or manual audits</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="95" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="95" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="accuracy-alone-can-mislead">Accuracy Alone Can Mislead</h1>
<p>Loan approval after a recession:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Scenario</th>
<th style="text-align:left">Accuracy</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Clean data</td>
<td style="text-align:left"><code>81.5%</code></td>
</tr>
<tr>
<td style="text-align:left">One feature drifted</td>
<td style="text-align:left"><code>74.5%</code></td>
</tr>
<tr>
<td style="text-align:left">All three important features drifted</td>
<td style="text-align:left"><code>83.5%</code></td>
</tr>
</tbody>
</table>
<p>How can accuracy increase?</p>
<p>Suppose <code>95%</code> of applicants now truly deserve a reject.</p>
<p>Then a bad model that simply predicts:</p>
<blockquote>
<p>&quot;reject everyone&quot;</p>
</blockquote>
<p>would already get about <code>95%</code> accuracy.</p>
<p>Accuracy only asks:</p>
<p><strong>&quot;How many final labels did we get right?&quot;</strong></p>
<p>It does <strong>not</strong> ask:</p>
<ul>
<li>are the inputs still similar to training data?</li>
<li>are we treating rare but important cases correctly?</li>
<li>are our predictions still well calibrated?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="96" data-paginate="true" data-class="summary-slide" data-theme="iitgn-modern" lang="C" class="summary-slide" data-marpit-pagination="96" style="--paginate:true;--class:summary-slide;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="one-slide-summary">One-Slide Summary</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Type</th>
<th style="text-align:left">What changed?</th>
<th style="text-align:left">How to detect it</th>
<th style="text-align:left">Typical action</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Data drift</td>
<td style="text-align:left"><code>X</code> changed</td>
<td style="text-align:left">KS / PSI / chi-squared / Evidently</td>
<td style="text-align:left">retrain with recent inputs</td>
</tr>
<tr>
<td style="text-align:left">Concept drift</td>
<td style="text-align:left"><code>X -&gt; Y</code> changed</td>
<td style="text-align:left">labeled production metrics</td>
<td style="text-align:left">relearn the rule</td>
</tr>
<tr>
<td style="text-align:left">Label drift</td>
<td style="text-align:left"><code>Y</code> frequencies changed</td>
<td style="text-align:left">class proportion tracking</td>
<td style="text-align:left">recalibrate thresholds</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="97" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="97" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">

<h1 id="small-terminology-note">Small Terminology Note</h1>
<p>For this course, keep the simple idea:</p>
<ul>
<li><strong>data drift</strong> = the inputs changed</li>
</ul>
<p>Two extra phrases sometimes appear outside class:</p>
<ul>
<li><strong>covariate shift</strong>: a more technical name for the same case</li>
<li><strong>domain shift</strong>: train and deployment came from different environments</li>
</ul>
<p>Examples of domain shift:</p>
<ul>
<li>scanned forms -&gt; phone photos</li>
<li>office email -&gt; chat messages</li>
</ul>
<p>Do <strong>not</strong> learn a new mental model for these.<br />
Just ask the same three questions:</p>
<ol>
<li>Did <code>X</code> change?</li>
<li>Did <code>X -&gt; Y</code> change?</li>
<li>Did <code>Y</code> balance change?</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="99" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="99" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
