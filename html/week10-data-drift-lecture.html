<h1 id="your-model-is-rotting">Your Model is Rotting</h1>
<h2 id="data-drift--model-monitoring">Data Drift &amp; Model Monitoring</h2>
<p><strong>Week 10: CS 203 - Software Tools and Techniques for AI</strong></p>
<p><strong>Prof. Nipun Batra</strong><br />
<em>IIT Gandhinagar</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" lang="en-IN" data-marpit-pagination="2" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="a-story">A Story</h1>
<p>You build a spam filter in January. It's <strong>95% accurate.</strong> You deploy it. High five.</p>
<p>Six months later, users complain: <em>&quot;Why am I getting so much spam?&quot;</em></p>
<p>You check: accuracy is now <strong>72%.</strong></p>
<p>Same code. Same model. Same server. <strong>What happened?</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" lang="en-IN" data-marpit-pagination="3" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="what-happened-the-world-changed">What Happened: The World Changed</h1>
<p><img src="images/week10/model_accuracy_decay.png" alt="" style="width:800px;" /></p>
<p><strong>Your model didn't change. The data did.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" lang="en-IN" data-marpit-pagination="4" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="ml-models-are-not-like-regular-software">ML Models Are Not Like Regular Software</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Regular software</th>
<th style="text-align:left">ML models</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Sorting algorithm from 2010 still works</td>
<td style="text-align:left">Spam filter from 2020 is broken</td>
</tr>
<tr>
<td style="text-align:left"><code>2 + 2 = 4</code> forever</td>
<td style="text-align:left">&quot;Buy crypto now!&quot; wasn't spam in 2020, is spam in 2026</td>
</tr>
<tr>
<td style="text-align:left">Bugs are in your <strong>code</strong></td>
<td style="text-align:left">Problems are in the <strong>data</strong></td>
</tr>
</tbody>
</table>
<p>A model is a <strong>snapshot</strong> of the world at training time. When the world moves on, the snapshot gets stale.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-class="lead" lang="en-IN" class="lead" data-marpit-pagination="5" style="--paginate:true;--class:lead;" data-marpit-pagination-total="64">
<h1 id="part-1-what-is-drift">Part 1: What is Drift?</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" lang="en-IN" data-marpit-pagination="6" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="three-types-of-drift">Three Types of Drift</h1>
<p><img src="images/week10/three_types_of_drift.png" alt="" style="width:850px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" lang="en-IN" data-marpit-pagination="7" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="type-1-data-drift-input-shift">Type 1: Data Drift (Input Shift)</h1>
<p><strong>The inputs your model sees in production look different from training.</strong></p>
<p>Example: You train a house price model on 2022 data.</p>
<table>
<thead>
<tr>
<th style="text-align:left">Feature</th>
<th style="text-align:left">Training (2022)</th>
<th style="text-align:left">Production (2026)</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Avg. house size</td>
<td style="text-align:left">1500 sq ft</td>
<td style="text-align:left">1200 sq ft (smaller homes trending)</td>
</tr>
<tr>
<td style="text-align:left">Avg. income</td>
<td style="text-align:left">8 LPA</td>
<td style="text-align:left">12 LPA (inflation)</td>
</tr>
<tr>
<td style="text-align:left">% remote workers</td>
<td style="text-align:left">15%</td>
<td style="text-align:left">45% (post-COVID)</td>
</tr>
</tbody>
</table>
<p>The model was trained on a world that no longer exists.</p>
<p><strong>Technically:</strong> P(X) changed, but P(Y|X) stayed the same.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" lang="en-IN" data-marpit-pagination="8" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="type-2-concept-drift-rules-changed">Type 2: Concept Drift (Rules Changed)</h1>
<p><strong>The relationship between inputs and outputs changed.</strong></p>
<p>Example: You train a food delivery demand predictor.</p>
<table>
<thead>
<tr>
<th style="text-align:left">Situation</th>
<th style="text-align:left">Before Zomato Gold</th>
<th style="text-align:left">After Zomato Gold</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">User orders 3x/week</td>
<td style="text-align:left">High-value customer</td>
<td style="text-align:left">Normal (everyone orders 3x/week now)</td>
</tr>
<tr>
<td style="text-align:left">Same input features</td>
<td style="text-align:left">→ predict &quot;premium&quot;</td>
<td style="text-align:left">→ predict &quot;regular&quot;</td>
</tr>
</tbody>
</table>
<p>Same X, <strong>different correct Y.</strong> The <em>meaning</em> of the data changed.</p>
<p><strong>Technically:</strong> P(Y|X) changed. This is the hardest to detect and fix.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" lang="en-IN" data-marpit-pagination="9" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="concept-drift-the-decision-boundary-moved">Concept Drift: The Decision Boundary Moved</h1>
<p><img src="images/week10/concept_drift_boundary.png" alt="" style="width:800px;" /></p>
<p>The <strong>same data points</strong> now belong to <strong>different classes.</strong> Your old decision boundary is wrong.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" lang="en-IN" data-marpit-pagination="10" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="type-3-label-drift-outcome-mix-changed">Type 3: Label Drift (Outcome Mix Changed)</h1>
<p><strong>The proportion of outcomes shifted.</strong></p>
<p>Example: Fraud detection</p>
<table>
<thead>
<tr>
<th style="text-align:left"></th>
<th style="text-align:left">Training data</th>
<th style="text-align:left">Production (2026)</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Fraud rate</td>
<td style="text-align:left">1%</td>
<td style="text-align:left">5% (UPI fraud increased)</td>
</tr>
<tr>
<td style="text-align:left">Model expects</td>
<td style="text-align:left">1 fraud per 100</td>
<td style="text-align:left">Still expects 1 per 100</td>
</tr>
</tbody>
</table>
<p>Model's threshold is calibrated for 1%. At 5%, it misses most fraud.</p>
<p><strong>Technically:</strong> P(Y) changed.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" lang="en-IN" data-marpit-pagination="11" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="quick-check-which-type">Quick Check: Which Type?</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Scenario</th>
<th style="text-align:left">Type</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Your e-commerce model sees more users from tier-2 cities than before</td>
<td style="text-align:left">Data drift</td>
</tr>
<tr>
<td style="text-align:left">&quot;Work from home&quot; used to predict low productivity, now predicts high</td>
<td style="text-align:left">Concept drift</td>
</tr>
<tr>
<td style="text-align:left">Positive reviews went from 70% to 90% after a product redesign</td>
<td style="text-align:left">Label drift</td>
</tr>
<tr>
<td style="text-align:left">Average user age shifted from 25 to 40</td>
<td style="text-align:left">Data drift</td>
</tr>
<tr>
<td style="text-align:left">Same symptom now indicates a different disease (COVID)</td>
<td style="text-align:left">Concept drift</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="lead" lang="en-IN" class="lead" data-marpit-pagination="12" style="--paginate:true;--class:lead;" data-marpit-pagination-total="64">
<h1 id="part-2-how-to-see-drift">Part 2: How to See Drift</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" lang="en-IN" data-marpit-pagination="13" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="the-simplest-test-just-look">The Simplest Test: Just Look</h1>
<p>Plot the <strong>same feature</strong> from training data and production data.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt

plt.hist(train[<span class="hljs-string">&quot;age&quot;</span>], bins=<span class="hljs-number">30</span>, alpha=<span class="hljs-number">0.5</span>, label=<span class="hljs-string">&quot;Training&quot;</span>, color=<span class="hljs-string">&quot;steelblue&quot;</span>)
plt.hist(prod[<span class="hljs-string">&quot;age&quot;</span>], bins=<span class="hljs-number">30</span>, alpha=<span class="hljs-number">0.5</span>, label=<span class="hljs-string">&quot;Production&quot;</span>, color=<span class="hljs-string">&quot;coral&quot;</span>)
plt.legend()
plt.title(<span class="hljs-string">&quot;Age Distribution: Training vs Production&quot;</span>)
plt.show()
</code></pre>
<p>If the shapes look different, you probably have drift.</p>
<p><strong>Problem:</strong> &quot;Look different&quot; is subjective. We need a number.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" lang="en-IN" data-marpit-pagination="14" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="the-histogram-test-do-these-look-the-same">The Histogram Test: Do These Look the Same?</h1>
<p>Two scenarios:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Scenario A</th>
<th style="text-align:left">Scenario B</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Training: ages 20-40, peak at 28</td>
<td style="text-align:left">Training: ages 20-40, peak at 28</td>
</tr>
<tr>
<td style="text-align:left">Production: ages 20-40, peak at 29</td>
<td style="text-align:left">Production: ages 35-60, peak at 48</td>
</tr>
<tr>
<td style="text-align:left"><strong>Verdict:</strong> Similar. No drift.</td>
<td style="text-align:left"><strong>Verdict:</strong> Very different. Drift!</td>
</tr>
</tbody>
</table>
<p>But where's the line? We need a <strong>statistical test</strong> to give us a yes/no answer.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" lang="en-IN" data-marpit-pagination="15" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="first-what-is-a-cdf">First: What is a CDF?</h1>
<p>Before the KS test, let's understand <strong>Cumulative Distribution Functions.</strong></p>
<p><img src="images/week10/cdf_intuition.png" alt="" style="width:800px;" /></p>
<p><strong>CDF(x) = &quot;What fraction of values are ≤ x?&quot;</strong></p>
<p>Example: If CDF(25) = 0.40, then <strong>40% of people are age 25 or younger.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" lang="en-IN" data-marpit-pagination="16" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="cdf-a-concrete-example">CDF: A Concrete Example</h1>
<table>
<thead>
<tr>
<th style="text-align:center">Age</th>
<th style="text-align:center">Count</th>
<th style="text-align:center">Cumulative</th>
<th style="text-align:center">CDF</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">20</td>
<td style="text-align:center">10</td>
<td style="text-align:center">10</td>
<td style="text-align:center">10/50 = 0.20</td>
</tr>
<tr>
<td style="text-align:center">25</td>
<td style="text-align:center">10</td>
<td style="text-align:center">20</td>
<td style="text-align:center">20/50 = 0.40</td>
</tr>
<tr>
<td style="text-align:center">30</td>
<td style="text-align:center">15</td>
<td style="text-align:center">35</td>
<td style="text-align:center">35/50 = 0.70</td>
</tr>
<tr>
<td style="text-align:center">35</td>
<td style="text-align:center">10</td>
<td style="text-align:center">45</td>
<td style="text-align:center">45/50 = 0.90</td>
</tr>
<tr>
<td style="text-align:center">40</td>
<td style="text-align:center">5</td>
<td style="text-align:center">50</td>
<td style="text-align:center">50/50 = 1.00</td>
</tr>
</tbody>
</table>
<p>CDF always starts near 0 and ends at 1. <strong>The shape tells you the distribution.</strong></p>
<ul>
<li>Steep jump → lots of values concentrated there</li>
<li>Flat region → few values in that range</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" lang="en-IN" data-marpit-pagination="17" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="why-cdfs-two-cdfs--one-picture-of-drift">Why CDFs? Two CDFs = One Picture of Drift</h1>
<p>If two datasets have the <strong>same distribution</strong>, their CDFs will overlap perfectly.</p>
<p>If the distributions are <strong>different</strong>, the CDFs will separate.</p>
<p><strong>The question becomes:</strong> <em>How far apart are the two curves?</em></p>
<p>This is exactly what the KS test measures.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" lang="en-IN" data-marpit-pagination="18" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="the-ks-test-intuition">The KS Test: Intuition</h1>
<p><img src="images/week10/ks_test_intuition.png" alt="" style="width:750px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" lang="en-IN" data-marpit-pagination="19" style="--paginate:true;" data-marpit-pagination-total="64">

<h1 id="ks-test-step-by-step-intuition">KS Test: Step-by-Step Intuition</h1>
<p><strong>Think of it like this:</strong></p>
<ol>
<li>Line up both datasets on a number line</li>
<li>Walk from left to right</li>
<li>At each point, ask: &quot;What % of training data is below here? What % of production data?&quot;</li>
<li>The <strong>biggest difference</strong> you find is D</li>
</ol>

</tr>

<tbody>
<tr>
<td style="text-align:left">0.02</td>
<td style="text-align:left">Almost identical — no drift</td>
</tr>
<tr>
<td style="text-align:left">0.10</td>
<td style="text-align:left">Small difference — probably OK</td>
</tr>
<tr>
<td style="text-align:left">0.25</td>
<td style="text-align:left">Noticeable shift — investigate</td>
</tr>
<tr>
<td style="text-align:left">0.50</td>
<td style="text-align:left">Very different distributions — definite drift</td>
</tr>
</tbody>
</table>
<p><strong>But how do we know if D is &quot;big enough&quot;?</strong> → That's what the p-value tells us.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" lang="en-IN" data-marpit-pagination="21" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="ks-test-the-p-value">KS Test: The p-value</h1>
<p>The <strong>p-value</strong> answers: <em>&quot;If the two distributions were actually identical, what's the probability of seeing a gap this large just by chance?&quot;</em></p>
<ul>
<li><strong>p &lt; 0.05</strong> → &quot;Less than 5% chance this is random&quot; → <strong>Drift detected</strong></li>
<li><strong>p ≥ 0.05</strong> → &quot;Could easily be random noise&quot; → <strong>No significant drift</strong></li>
</ul>
<p><strong>Important:</strong> p-value depends on <strong>sample size</strong>!</p>
<ul>
<li>50 samples: need a big D to be significant</li>
<li>10,000 samples: even tiny D can be significant</li>
</ul>
<p><strong>Rule of thumb for this course:</strong> p &lt; 0.05 = drift. Simple.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" lang="en-IN" data-marpit-pagination="22" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="the-ks-test-code">The KS Test: Code</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> scipy.stats <span class="hljs-keyword">import</span> ks_2samp

<span class="hljs-comment"># Compare one feature between training and production</span>
stat, p_value = ks_2samp(train[<span class="hljs-string">&quot;age&quot;</span>], prod[<span class="hljs-string">&quot;age&quot;</span>])

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;KS statistic: <span class="hljs-subst">{stat:<span class="hljs-number">.4</span>f}</span>&quot;</span>)   <span class="hljs-comment"># the maximum gap</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;p-value: <span class="hljs-subst">{p_value:<span class="hljs-number">.4</span>f}</span>&quot;</span>)     <span class="hljs-comment"># is it significant?</span>

<span class="hljs-keyword">if</span> p_value &lt; <span class="hljs-number">0.05</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;DRIFT DETECTED in &#x27;age&#x27; feature&quot;</span>)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;No significant drift in &#x27;age&#x27;&quot;</span>)
</code></pre>
<p>That's it. <strong>One line</strong> to test one feature. Loop over all features to check everything.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" lang="en-IN" data-marpit-pagination="23" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="checking-all-features-at-once">Checking All Features at Once</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> scipy.stats <span class="hljs-keyword">import</span> ks_2samp

features = [<span class="hljs-string">&quot;age&quot;</span>, <span class="hljs-string">&quot;income&quot;</span>, <span class="hljs-string">&quot;city_tier&quot;</span>, <span class="hljs-string">&quot;order_count&quot;</span>]
<span class="hljs-keyword">for</span> feature <span class="hljs-keyword">in</span> features:
    stat, p_value = ks_2samp(train[feature], prod[feature])
    status = <span class="hljs-string">&quot;DRIFT&quot;</span> <span class="hljs-keyword">if</span> p_value &lt; <span class="hljs-number">0.05</span> <span class="hljs-keyword">else</span> <span class="hljs-string">&quot;OK&quot;</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{feature:20s}</span>  KS=<span class="hljs-subst">{stat:<span class="hljs-number">.3</span>f}</span>  p=<span class="hljs-subst">{p_value:<span class="hljs-number">.4</span>f}</span>  [<span class="hljs-subst">{status}</span>]&quot;</span>)
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>age                   KS=0.042  p=0.3812  [OK]
income                KS=0.187  p=0.0001  [DRIFT]
city_tier             KS=0.234  p=0.0000  [DRIFT]
order_count           KS=0.031  p=0.6234  [OK]
</code></pre>
<p><strong>Now you know exactly which features shifted.</strong> Income and city_tier drifted. Age and order_count are fine.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" lang="en-IN" data-marpit-pagination="24" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="another-approach-psi-population-stability-index">Another Approach: PSI (Population Stability Index)</h1>
<p>PSI is popular in finance/banking. No p-value — just a <strong>score</strong>.</p>
<p><strong>Intuition:</strong> Bin the feature into buckets. Compare the % in each bucket between training and production. If the percentages shifted a lot, you have drift.</p>
<table>
<thead>
<tr>
<th style="text-align:left">PSI Score</th>
<th style="text-align:left">Interpretation</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">&lt; 0.1</td>
<td style="text-align:left">No drift. All good.</td>
</tr>
<tr>
<td style="text-align:left">0.1 – 0.25</td>
<td style="text-align:left">Moderate shift. Monitor closely.</td>
</tr>
<tr>
<td style="text-align:left">&gt; 0.25</td>
<td style="text-align:left">Significant drift. Investigate!</td>
</tr>
</tbody>
</table>
<p><strong>Easy to remember:</strong> Green / Yellow / Red traffic light.</p>
</section>

<h1 id="psi-how-to-compute">PSI: How to Compute</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

<span class="hljs-keyword">def</span> <span class="hljs-title function_">compute_psi</span>(<span class="hljs-params">reference, current, bins=<span class="hljs-number">10</span></span>):
    <span class="hljs-string">&quot;&quot;&quot;Population Stability Index between two arrays.&quot;&quot;&quot;</span>
    <span class="hljs-comment"># Bin both datasets the same way</span>
    breakpoints = np.quantile(reference, np.linspace(<span class="hljs-number">0</span>, <span class="hljs-number">1</span>, bins + <span class="hljs-number">1</span>))
    ref_counts = np.histogram(reference, bins=breakpoints)[<span class="hljs-number">0</span>] / <span class="hljs-built_in">len</span>(reference)
    cur_counts = np.histogram(current, bins=breakpoints)[<span class="hljs-number">0</span>] / <span class="hljs-built_in">len</span>(current)

    <span class="hljs-comment"># Avoid division by zero</span>
    ref_counts = np.clip(ref_counts, <span class="hljs-number">0.001</span>, <span class="hljs-literal">None</span>)
    cur_counts = np.clip(cur_counts, <span class="hljs-number">0.001</span>, <span class="hljs-literal">None</span>)

    <span class="hljs-comment"># PSI formula</span>
    psi = np.<span class="hljs-built_in">sum</span>((cur_counts - ref_counts) * np.log(cur_counts / ref_counts))
    <span class="hljs-keyword">return</span> psi
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">psi = compute_psi(train[<span class="hljs-string">&quot;income&quot;</span>], prod[<span class="hljs-string">&quot;income&quot;</span>])
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;PSI = <span class="hljs-subst">{psi:<span class="hljs-number">.3</span>f}</span>&quot;</span>)  <span class="hljs-comment"># → 0.342 → DRIFT!</span>
</code></pre>

 200 79Q206 46 272 46H282Q288 41 289 37T286 19Q282 3 278 1Q274 0 267 0Q265 0 255 0T221 1T157 2Q127 2 95 1T58 0Q43 0 39 2T35 11Q35 13 38 25T43 40Q45 46 65 46Q135 46 154 86Q158 92 223 354T289 629Z"></path></g><g data-mml-node="mo" transform="translate(20869.4,0)"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="mfrac" transform="translate(21925.2,0)"><g data-mml-node="mrow" transform="translate(220,676)"><g data-mml-node="mi"><path data-c="1D443" d="M287 628Q287 635 230 637Q206 637 199 638T192 648Q192 649 194 659Q200 679 203 681T397 683Q587 682 600 680Q664 669 707 631T751 530Q751 453 685 389Q616 321 507 303Q500 302 402 301H307L277 182Q247 66 247 59Q247 55 248 54T255 50T272 48T305 46H336Q342 37 342 35Q342 19 335 5Q330 0 319 0Q316 0 282 1T182 2Q120 2 87 2T51 1Q33 1 33 11Q33 13 36 25Q40 41 44 43T67 46Q94 46 127 49Q141 52 146 61Q149 65 218 339T287 628ZM645 554Q645 567 643 575T634 597T609 619T560 635Q553 636 480 637Q463 637 445 637T416 636T404 636Q391 635 386 627Q384 621 367 550T332 412T314 344Q314 342 395 342H407H430Q542 342 590 392Q617 419 631 471T645 554Z"></path></g><g data-mml-node="mo" transform="translate(973.2,0)"><path data-c="2B" d="M56 237T56 250T70 270H369V420L370 570Q380 583 389 583Q402 583 409 568V270H707Q722 262 722 250T707 230H409V-68Q401 -82 391 -82H389H387Q375 -82 369 -68V230H70Q56 237 56 250Z"></path></g><g data-mml-node="mi" transform="translate(1973.4,0)"><path data-c="1D444" d="M399 -80Q399 -47 400 -30T402 -11V-7L387 -11Q341 -22 303 -22Q208 -22 138 35T51 201Q50 209 50 244Q50 346 98 438T227 601Q351 704 476 704Q514 704 524 703Q621 689 680 617T740 435Q740 255 592 107Q529 47 461 16L444 8V3Q444 2 449 -24T470 -66T516 -82Q551 -82 583 -60T625 -3Q631 11 638 11Q647 11 649 2Q649 -6 639 -34T611 -100T557 -165T481 -194Q399 -194 399 -87V-80ZM636 468Q636 523 621 564T580 625T530 655T477 665Q429 665 379 640Q277 591 215 464T153 216Q153 110 207 59Q231 38 236 38V46Q236 86 269 120T347 155Q372 155 390 144T417 114T429 82T435 55L448 64Q512 108 557 185T619 334T636 468ZM314 18Q362 18 404 39L403 49Q399 104 366 115Q354 117 347 117Q344 117 341 117T337 118Q317 118 296 98T274 52Q274 18 314 18Z"></path></g></g><g data-mml-node="mn" transform="translate(1352.2,-686)"><path data-c="32" d="M109 429Q82 429 66 447T50 491Q50 562 103 614T235 666Q326 666 387 610T449 465Q449 422 429 383T381 315T301 241Q265 210 201 149L142 93L218 92Q375 92 385 97Q392 99 409 186V189H449V186Q448 183 436 95T421 3V0H50V19V31Q50 38 56 46T86 81Q115 113 136 137Q145 147 170 174T204 211T233 244T261 278T284 308T305 340T320 369T333 401T340 431T343 464Q343 527 309 573T212 619Q179 619 154 602T119 569T109 550Q109 549 114 549Q132 549 151 535T170 489Q170 464 154 447T109 429Z"></path></g><rect width="2964.4" height="60" x="120" y="220"></rect></g></g></g></svg></mjx-container></p><p><strong>Why care?</strong> Unlike KL divergence, JSD is:</p>
<ul>
<li>Always <strong>symmetric</strong>: JSD(P‖Q) = JSD(Q‖P)</li>
<li>Always <strong>finite</strong> (between 0 and 1 when using log₂)</li>
<li>Built into scipy!</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> scipy.spatial.distance <span class="hljs-keyword">import</span> jensenshannon

jsd = jensenshannon(train_hist, prod_hist)  <span class="hljs-comment"># Returns sqrt(JSD)</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;JS distance: <span class="hljs-subst">{jsd:<span class="hljs-number">.4</span>f}</span>&quot;</span>)
</code></pre>
<p><strong>When to use:</strong> When you want a single number summarizing how different two distributions are, without needing a p-value.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" lang="en-IN" data-marpit-pagination="31" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="summary-of-drift-detection-methods">Summary of Drift Detection Methods</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Method</th>
<th style="text-align:left">For</th>
<th style="text-align:left">Output</th>
<th style="text-align:left">One-liner</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>KS test</strong></td>
<td style="text-align:left">Continuous</td>
<td style="text-align:left">p-value</td>
<td style="text-align:left"><code>ks_2samp(a, b)</code></td>
</tr>
<tr>
<td style="text-align:left"><strong>Chi-squared</strong></td>
<td style="text-align:left">Categorical</td>
<td style="text-align:left">p-value</td>
<td style="text-align:left"><code>chi2_contingency(table)</code></td>
</tr>
<tr>
<td style="text-align:left"><strong>PSI</strong></td>
<td style="text-align:left">Continuous/binned</td>
<td style="text-align:left">Score (0-∞)</td>
<td style="text-align:left">Custom function</td>
</tr>
<tr>
<td style="text-align:left"><strong>JS divergence</strong></td>
<td style="text-align:left">Any (binned)</td>
<td style="text-align:left">Distance (0-1)</td>
<td style="text-align:left"><code>jensenshannon(p, q)</code></td>
</tr>
<tr>
<td style="text-align:left"><strong>Evidently</strong></td>
<td style="text-align:left">Everything</td>
<td style="text-align:left">Report</td>
<td style="text-align:left"><code>Report(metrics=[...])</code></td>
</tr>
</tbody>
</table>
<p><strong>For this course:</strong> Start with KS test + Evidently. Add PSI if working in fintech.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" lang="en-IN" data-marpit-pagination="32" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="live-demo-visualizing-the-ks-statistic">Live Demo: Visualizing the KS Statistic</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np, matplotlib.pyplot <span class="hljs-keyword">as</span> plt
<span class="hljs-keyword">from</span> scipy.stats <span class="hljs-keyword">import</span> ks_2samp

<span class="hljs-comment"># Two samples — one shifted</span>
np.random.seed(<span class="hljs-number">42</span>)
train = np.random.normal(<span class="hljs-number">50</span>, <span class="hljs-number">10</span>, <span class="hljs-number">500</span>)
prod  = np.random.normal(<span class="hljs-number">55</span>, <span class="hljs-number">12</span>, <span class="hljs-number">500</span>)  <span class="hljs-comment"># shifted mean and wider</span>

<span class="hljs-comment"># Sort and compute CDFs</span>
train_sorted = np.sort(train)
prod_sorted  = np.sort(prod)
cdf_train = np.arange(<span class="hljs-number">1</span>, <span class="hljs-built_in">len</span>(train)+<span class="hljs-number">1</span>) / <span class="hljs-built_in">len</span>(train)
cdf_prod  = np.arange(<span class="hljs-number">1</span>, <span class="hljs-built_in">len</span>(prod)+<span class="hljs-number">1</span>)  / <span class="hljs-built_in">len</span>(prod)

plt.plot(train_sorted, cdf_train, label=<span class="hljs-string">&quot;Training CDF&quot;</span>, color=<span class="hljs-string">&quot;steelblue&quot;</span>)
plt.plot(prod_sorted,  cdf_prod,  label=<span class="hljs-string">&quot;Production CDF&quot;</span>, color=<span class="hljs-string">&quot;coral&quot;</span>)
plt.title(<span class="hljs-string">f&quot;KS stat = <span class="hljs-subst">{ks_2samp(train, prod).statistic:<span class="hljs-number">.3</span>f}</span>&quot;</span>)
plt.legend(); plt.show()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" lang="en-IN" data-marpit-pagination="33" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="for-categorical-features-chi-squared-test">For Categorical Features: Chi-Squared Test</h1>
<p>KS test works on numbers. For categories (city, device, browser), use chi-squared:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> scipy.stats <span class="hljs-keyword">import</span> chi2_contingency
<span class="hljs-keyword">import</span> pandas <span class="hljs-keyword">as</span> pd

<span class="hljs-comment"># Count occurrences in each category</span>
train_counts = train[<span class="hljs-string">&quot;city&quot;</span>].value_counts()
prod_counts = prod[<span class="hljs-string">&quot;city&quot;</span>].value_counts()

<span class="hljs-comment"># Align categories</span>
all_cities = <span class="hljs-built_in">sorted</span>(<span class="hljs-built_in">set</span>(train_counts.index) | <span class="hljs-built_in">set</span>(prod_counts.index))
table = pd.DataFrame({
    <span class="hljs-string">&quot;train&quot;</span>: [train_counts.get(c, <span class="hljs-number">0</span>) <span class="hljs-keyword">for</span> c <span class="hljs-keyword">in</span> all_cities],
    <span class="hljs-string">&quot;prod&quot;</span>:  [prod_counts.get(c, <span class="hljs-number">0</span>) <span class="hljs-keyword">for</span> c <span class="hljs-keyword">in</span> all_cities]
})

chi2, p_value, _, _ = chi2_contingency(table.T)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;p-value: <span class="hljs-subst">{p_value:<span class="hljs-number">.4</span>f}</span>&quot;</span>)  <span class="hljs-comment"># p &lt; 0.05 → drift</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-class="lead" lang="en-IN" class="lead" data-marpit-pagination="34" style="--paginate:true;--class:lead;" data-marpit-pagination-total="64">

<li>Chooses the right test (KS for numbers, chi-squared for categories)</li>
<li>Generates a beautiful interactive <strong>HTML report</strong></li>
<li>Shows histograms, p-values, drift/no-drift badges</li>
</ul>

<h1 id="part-4-hands-on--lets-create-and-detect-drift">Part 4: Hands-On — Let's Create and Detect Drift</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" lang="en-IN" data-marpit-pagination="40" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="setup-the-iris-dataset">Setup: The Iris Dataset</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sklearn.datasets <span class="hljs-keyword">import</span> load_iris
<span class="hljs-keyword">import</span> pandas <span class="hljs-keyword">as</span> pd
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

iris = load_iris()
df = pd.DataFrame(iris.data, columns=iris.feature_names)
df[<span class="hljs-string">&quot;target&quot;</span>] = iris.target

<span class="hljs-comment"># Split: first 100 rows = &quot;training&quot;, last 50 = &quot;production&quot;</span>
df_train = df.iloc[:<span class="hljs-number">100</span>].copy()
df_prod = df.iloc[<span class="hljs-number">100</span>:].copy()
</code></pre>
<p>Right now there's no artificial drift — let's add some.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" lang="en-IN" data-marpit-pagination="41" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="experiment-1-no-drift-baseline">Experiment 1: No Drift (Baseline)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> scipy.stats <span class="hljs-keyword">import</span> ks_2samp

<span class="hljs-keyword">for</span> col <span class="hljs-keyword">in</span> iris.feature_names:
    stat, p = ks_2samp(df_train[col], df_prod[col])
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{col:25s}</span>  p=<span class="hljs-subst">{p:<span class="hljs-number">.4</span>f}</span>  <span class="hljs-subst">{<span class="hljs-string">&#x27;DRIFT&#x27;</span> <span class="hljs-keyword">if</span> p &lt; <span class="hljs-number">0.05</span> <span class="hljs-keyword">else</span> <span class="hljs-string">&#x27;OK&#x27;</span>}</span>&quot;</span>)
</code></pre>
<p>Some features may show drift because the last 50 rows are mostly class 2 (virginica). This is <strong>label drift</strong> — the class mix changed!</p>
<p><strong>Discussion:</strong> &quot;Even a simple train/test split can introduce drift if the classes aren't balanced.&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" lang="en-IN" data-marpit-pagination="42" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="experiment-2-simulate-data-drift">Experiment 2: Simulate Data Drift</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Shift petal_length by +2 cm in &quot;production&quot;</span>
df_prod_shifted = df_prod.copy()
df_prod_shifted[<span class="hljs-string">&quot;petal length (cm)&quot;</span>] += <span class="hljs-number">2.0</span>

<span class="hljs-keyword">for</span> col <span class="hljs-keyword">in</span> iris.feature_names:
    stat, p = ks_2samp(df_train[col], df_prod_shifted[col])
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{col:25s}</span>  p=<span class="hljs-subst">{p:<span class="hljs-number">.4</span>f}</span>  <span class="hljs-subst">{<span class="hljs-string">&#x27;DRIFT&#x27;</span> <span class="hljs-keyword">if</span> p &lt; <span class="hljs-number">0.05</span> <span class="hljs-keyword">else</span> <span class="hljs-string">&#x27;OK&#x27;</span>}</span>&quot;</span>)
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>sepal length (cm)          p=0.0023  DRIFT
sepal width (cm)           p=0.0912  OK
petal length (cm)          p=0.0000  DRIFT  ← we shifted this!
petal width (cm)           p=0.0001  DRIFT
</code></pre>
<p><strong>The KS test caught it.</strong> And petal_length has the smallest p-value — exactly the one we shifted.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" lang="en-IN" data-marpit-pagination="43" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="experiment-3-evidently-report">Experiment 3: Evidently Report</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> evidently.report <span class="hljs-keyword">import</span> Report
<span class="hljs-keyword">from</span> evidently.metric_preset <span class="hljs-keyword">import</span> DataDriftPreset

report = Report(metrics=[DataDriftPreset()])
report.run(reference_data=df_train, current_data=df_prod_shifted)
report
</code></pre>
<p><strong>Walk through the report together:</strong></p>
<ul>
<li>Which features are flagged?</li>
<li>Look at the histograms — can you see the shift?</li>
<li>What test did Evidently choose for each feature?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" lang="en-IN" data-marpit-pagination="44" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="experiment-4-gradual-drift">Experiment 4: Gradual Drift</h1>
<p>Real drift doesn't happen overnight. Let's simulate a gradual shift:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">months = []
<span class="hljs-keyword">for</span> month <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>, <span class="hljs-number">13</span>):
    df_month = df_prod.copy()
    <span class="hljs-comment"># Shift increases each month</span>
    df_month[<span class="hljs-string">&quot;petal length (cm)&quot;</span>] += month * <span class="hljs-number">0.3</span>
    stat, p = ks_2samp(df_train[<span class="hljs-string">&quot;petal length (cm)&quot;</span>],
                        df_month[<span class="hljs-string">&quot;petal length (cm)&quot;</span>])
    months.append({<span class="hljs-string">&quot;month&quot;</span>: month, <span class="hljs-string">&quot;ks_stat&quot;</span>: stat, <span class="hljs-string">&quot;p_value&quot;</span>: p})

pd.DataFrame(months).plot(x=<span class="hljs-string">&quot;month&quot;</span>, y=<span class="hljs-string">&quot;ks_stat&quot;</span>,
                           title=<span class="hljs-string">&quot;Drift Gets Worse Over Time&quot;</span>)
</code></pre>
<p><strong>The KS statistic grows month by month.</strong> This is what real drift looks like — a slow slide, not a sudden break.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" lang="en-IN" data-marpit-pagination="45" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="experiment-5-impact-on-model-performance">Experiment 5: Impact on Model Performance</h1>
<p><strong>The big question:</strong> Does drift actually hurt predictions?</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sklearn.ensemble <span class="hljs-keyword">import</span> RandomForestClassifier
<span class="hljs-keyword">from</span> sklearn.metrics <span class="hljs-keyword">import</span> accuracy_score

<span class="hljs-comment"># Train on original data</span>
model = RandomForestClassifier(random_state=<span class="hljs-number">42</span>)
model.fit(df_train.drop(<span class="hljs-string">&quot;target&quot;</span>, axis=<span class="hljs-number">1</span>), df_train[<span class="hljs-string">&quot;target&quot;</span>])

<span class="hljs-comment"># Test on original production data</span>
acc_original = accuracy_score(df_prod[<span class="hljs-string">&quot;target&quot;</span>],
    model.predict(df_prod.drop(<span class="hljs-string">&quot;target&quot;</span>, axis=<span class="hljs-number">1</span>)))

<span class="hljs-comment"># Test on shifted production data</span>
acc_shifted = accuracy_score(df_prod[<span class="hljs-string">&quot;target&quot;</span>],
    model.predict(df_prod_shifted.drop(<span class="hljs-string">&quot;target&quot;</span>, axis=<span class="hljs-number">1</span>)))

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Accuracy (no drift):   <span class="hljs-subst">{acc_original:<span class="hljs-number">.1</span>%}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Accuracy (with drift): <span class="hljs-subst">{acc_shifted:<span class="hljs-number">.1</span>%}</span>&quot;</span>)
</code></pre>
<p><strong>This is the slide that motivates everything.</strong> Drift isn't academic — it breaks your model.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" lang="en-IN" data-marpit-pagination="46" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="experiment-6-real-world-dataset-wine">Experiment 6: Real-World Dataset (Wine)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Wine quality dataset — imagine training on red wine, deploying on white</span>
<span class="hljs-keyword">from</span> sklearn.datasets <span class="hljs-keyword">import</span> load_wine
wine = load_wine()
df_wine = pd.DataFrame(wine.data, columns=wine.feature_names)
df_wine[<span class="hljs-string">&quot;target&quot;</span>] = wine.target

<span class="hljs-comment"># &quot;Training&quot; = class 0 and 1, &quot;Production&quot; = class 2</span>
df_ref = df_wine[df_wine[<span class="hljs-string">&quot;target&quot;</span>].isin([<span class="hljs-number">0</span>, <span class="hljs-number">1</span>])].drop(<span class="hljs-string">&quot;target&quot;</span>, axis=<span class="hljs-number">1</span>)
df_cur = df_wine[df_wine[<span class="hljs-string">&quot;target&quot;</span>] == <span class="hljs-number">2</span>].drop(<span class="hljs-string">&quot;target&quot;</span>, axis=<span class="hljs-number">1</span>)

report = Report(metrics=[DataDriftPreset()])
report.run(reference_data=df_ref, current_data=df_cur)
report
</code></pre>
<p><strong>Discussion:</strong> &quot;This simulates deploying a model trained on one population and testing on another — a very common real-world scenario.&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-class="lead" lang="en-IN" class="lead" data-marpit-pagination="47" style="--paginate:true;--class:lead;" data-marpit-pagination-total="64">
<h1 id="part-5-real-world-drift-stories">Part 5: Real-World Drift Stories</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" lang="en-IN" data-marpit-pagination="48" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="case-1-covid-broke-everything-2020">Case 1: COVID Broke Everything (2020)</h1>
<p><strong>Uber/Ola ride demand prediction:</strong></p>
<ul>
<li>Model trained on 2019 data: commute patterns, weekend spikes, festival surges</li>
<li>March 2020: rides drop 90% overnight</li>
<li>Model keeps predicting &quot;high demand Monday 9 AM&quot; — nobody's commuting</li>
</ul>
<p><strong>Type:</strong> Data drift (inputs changed) + Concept drift (relationship changed)</p>
<p><strong>Lesson:</strong> Black swan events cause catastrophic drift. No model survives.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" lang="en-IN" data-marpit-pagination="49" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="case-2-spam-evolves-adversarial-drift">Case 2: Spam Evolves (Adversarial Drift)</h1>
<p><strong>Gmail spam filter:</strong></p>
<ul>
<li>2020 spam: &quot;CONGRATULATIONS! You WON $1,000,000!!!&quot;</li>
<li>2026 spam: &quot;Hi, following up on our conversation about the Q3 report...&quot;</li>
</ul>
<p>Spammers use ChatGPT to write emails that look like normal business communication.</p>
<p><strong>Type:</strong> Concept drift — the <em>definition</em> of spam changed.</p>
<p><strong>Lesson:</strong> In adversarial settings, drift is intentional. The attacker is actively trying to fool your model.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" lang="en-IN" data-marpit-pagination="50" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="case-3-upi-fraud-in-india">Case 3: UPI Fraud in India</h1>
<p><strong>Fraud detection model trained on 2022 UPI data:</strong></p>
<ul>
<li>2022: Fraud rate ~0.1%, mostly SIM swap attacks</li>
<li>2025: Fraud rate ~0.5%, new tactics (QR code scams, fake UPI apps)</li>
</ul>
<table>
<thead>
<tr>
<th style="text-align:left">What changed</th>
<th style="text-align:left">Type</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Fraud rate 0.1% → 0.5%</td>
<td style="text-align:left">Label drift</td>
</tr>
<tr>
<td style="text-align:left">New scam methods</td>
<td style="text-align:left">Concept drift</td>
</tr>
<tr>
<td style="text-align:left">More rural users on UPI</td>
<td style="text-align:left">Data drift</td>
</tr>
</tbody>
</table>
<p><strong>All three types at once.</strong> This is typical in production.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" lang="en-IN" data-marpit-pagination="51" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="case-4-college-admission-predictor">Case 4: College Admission Predictor</h1>
<p><strong>Relatable example for students:</strong></p>
<ul>
<li>Model trained on 5 years of admission data</li>
<li>Predicts acceptance probability based on: GPA, test scores, extracurriculars</li>
<li>2025: College drops SAT requirement</li>
</ul>
<table>
<thead>
<tr>
<th style="text-align:left">Before</th>
<th style="text-align:left">After</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">SAT score is top predictor</td>
<td style="text-align:left">SAT score is missing/irrelevant</td>
</tr>
<tr>
<td style="text-align:left">GPA distribution: 3.0–4.0</td>
<td style="text-align:left">GPA distribution: 2.5–4.0 (more applicants)</td>
</tr>
<tr>
<td style="text-align:left">Acceptance rate: 15%</td>
<td style="text-align:left">Acceptance rate: 12% (more applicants)</td>
</tr>
</tbody>
</table>
<p><strong>The features lost their meaning.</strong> The model is useless.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-class="lead" lang="en-IN" class="lead" data-marpit-pagination="52" style="--paginate:true;--class:lead;" data-marpit-pagination-total="64">
<h1 id="part-6-what-to-do-about-drift">Part 6: What To Do About Drift</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" lang="en-IN" data-marpit-pagination="53" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="the-drift-response-pipeline">The Drift Response Pipeline</h1>
<p><img src="images/week10/drift_response_pipeline.png" alt="" style="width:850px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" lang="en-IN" data-marpit-pagination="54" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="step-1-monitor">Step 1: Monitor</h1>
<p><strong>Set up dashboards that track feature distributions over time.</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Run Evidently weekly on production data</span>
<span class="hljs-keyword">import</span> datetime

report = Report(metrics=[DataDriftPreset()])
report.run(reference_data=df_train, current_data=df_this_week)
report.save_html(<span class="hljs-string">f&quot;reports/drift_<span class="hljs-subst">{datetime.date.today()}</span>.html&quot;</span>)
</code></pre>
<p>Compare this week's data to training data. Automate with a cron job or GitHub Actions.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" lang="en-IN" data-marpit-pagination="55" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="step-2-detect--alert">Step 2: Detect &amp; Alert</h1>
<p><strong>Set thresholds. Alert when drift crosses them.</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> evidently.test_suite <span class="hljs-keyword">import</span> TestSuite
<span class="hljs-keyword">from</span> evidently.tests <span class="hljs-keyword">import</span> TestShareOfDriftedColumns

<span class="hljs-comment"># PASS if fewer than 30% of columns drifted, FAIL otherwise</span>
suite = TestSuite(tests=[TestShareOfDriftedColumns(lt=<span class="hljs-number">0.3</span>)])
suite.run(reference_data=df_train, current_data=df_this_week)

<span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> suite.as_dict()[<span class="hljs-string">&quot;summary&quot;</span>][<span class="hljs-string">&quot;all_passed&quot;</span>]:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;ALERT: Significant drift detected!&quot;</span>)
    <span class="hljs-comment"># Send Slack/email alert</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" lang="en-IN" data-marpit-pagination="56" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="step-3-diagnose">Step 3: Diagnose</h1>
<p>Before retraining, understand <strong>why</strong> drift happened:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Cause</th>
<th style="text-align:left">Action</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Bug in data pipeline</td>
<td style="text-align:left">Fix the pipeline, not the model</td>
</tr>
<tr>
<td style="text-align:left">Seasonal pattern (summer → winter)</td>
<td style="text-align:left">Expected — maybe use separate models</td>
</tr>
<tr>
<td style="text-align:left">New user segment</td>
<td style="text-align:left">Collect labels for new segment, retrain</td>
</tr>
<tr>
<td style="text-align:left">World actually changed (COVID, new regulation)</td>
<td style="text-align:left">Major retrain with new data</td>
</tr>
</tbody>
</table>
<p><strong>Not all drift is bad.</strong> Sometimes the data legitimately expanded (more users = good!).</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" lang="en-IN" data-marpit-pagination="57" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="step-4-act--retrain">Step 4: Act — Retrain</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Combine old training data with new labeled production data</span>
df_combined = pd.concat([df_train, df_new_labeled])

<span class="hljs-comment"># Retrain</span>
model_v2 = RandomForestClassifier(random_state=<span class="hljs-number">42</span>)
model_v2.fit(df_combined.drop(<span class="hljs-string">&quot;target&quot;</span>, axis=<span class="hljs-number">1</span>), df_combined[<span class="hljs-string">&quot;target&quot;</span>])

<span class="hljs-comment"># Package in Docker (Week 9!) for reproducibility</span>
<span class="hljs-comment"># Track with TrackIO (Week 8!) for comparison</span>
</code></pre>
<p><strong>Connection to previous weeks:</strong></p>
<ul>
<li><strong>Docker</strong> → same environment for retraining</li>
<li><strong>TrackIO</strong> → compare v1 vs v2 metrics</li>
<li><strong>Seeds</strong> → reproducible retraining</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" lang="en-IN" data-marpit-pagination="58" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="retraining-the-recovery">Retraining: The Recovery</h1>
<p><img src="images/week10/retrain_recovery.png" alt="" style="width:800px;" /></p>
<p><strong>Each retrain boosts accuracy back up.</strong> Without monitoring, you don't even know it dropped.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" lang="en-IN" data-marpit-pagination="59" style="--paginate:true;" data-marpit-pagination-total="64">
<h1 id="drift-in-your-course-project">Drift in Your Course Project</h1>
<p><strong>How to apply this in your CS 203 project:</strong></p>
<ol>
<li><strong>Split your data by time</strong> if possible (train on older, test on newer)</li>
<li><strong>Run KS test</strong> on each feature between train and test</li>
<li><strong>Generate an Evidently report</strong> — include it in your project submission</li>
<li><strong>If drift exists:</strong> document it! This is a <strong>finding</strong>, not a failure</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Minimum viable monitoring for your project</span>
<span class="hljs-keyword">from</span> evidently.report <span class="hljs-keyword">import</span> Report
<span class="hljs-keyword">from</span> evidently.metric_preset <span class="hljs-keyword">import</span> DataDriftPreset

report = Report(metrics=[DataDriftPreset()])
report.run(reference_data=df_train, current_data=df_test)
report.save_html(<span class="hljs-string">&quot;drift_report.html&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Open drift_report.html to see results&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-class="lead" lang="en-IN" class="lead" data-marpit-pagination="60" style="--paginate:true;--class:lead;" data-marpit-pagination-total="64">

<h1 id="the-complete-picture">The Complete Picture</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Week 7:  Evaluate properly          (is the model good?)
Week 8:  Track experiments           (which model is best?)
Week 9:  Reproduce everything        (can someone else run it?)

<h1 id="key-takeaways">Key Takeaways</h1>
<ol>
<li>
<p><strong>Models rot</strong> because the world changes — data drift, concept drift, label drift</p>
</li>
<li>
<p><strong>Detection is simple:</strong> plot histograms, run KS test (<code>scipy.stats.ks_2samp</code>), or use Evidently (4 lines)</p>
</li>
<li>
<p><strong>Not all drift is bad</strong> — diagnose before reacting</p>
</li>
<li>
<p><strong>The response:</strong> Monitor → Detect → Diagnose → Retrain</p>
</li>
<li>
<p><strong>Everything connects:</strong> Docker (same env), Seeds (same results), TrackIO (track versions)</p>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" lang="en-IN" data-marpit-pagination="63" style="--paginate:true;" data-marpit-pagination-total="64">

<h1 id="reading--references">Reading &amp; References</h1>
<p><strong>Books:</strong></p>
<ul>
