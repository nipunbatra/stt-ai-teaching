<h1 id="data-drift-and-model-monitoring">Data Drift and Model Monitoring</h1>
<h2 id="week-10-cs-203---software-tools-and-techniques-for-ai">Week 10: CS 203 - Software Tools and Techniques for AI</h2>
<p><strong>Prof. Nipun Batra</strong><br />
<em>IIT Gandhinagar</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="2" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="by-the-end-of-this-lecture">By the End of This Lecture</h1>
<p>You should be able to explain:</p>
<ol>
<li>Why an ML model can get worse even when the code does not change</li>
<li>The difference between data drift, concept drift, and label drift</li>
<li>Why accuracy alone is not enough for monitoring</li>
<li>How the Kolmogorov-Smirnov test, chi-squared test, and Population Stability Index work at an intuitive level</li>
<li>What teams usually do after drift is detected</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="3" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="quick-recap-what-a-model-learns">Quick Recap: What a Model Learns</h1>
<p>In supervised learning:</p>
<ul>
<li><code>X</code> = input features</li>
<li><code>Y</code> = target or label</li>
<li>the model learns a rule from <code>X -&gt; Y</code></li>
</ul>
<p>Examples:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Problem</th>
<th style="text-align:left"><code>X</code></th>
<th style="text-align:left"><code>Y</code></th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">House pricing</td>
<td style="text-align:left">size, location, age</td>
<td style="text-align:left">price</td>
</tr>
<tr>
<td style="text-align:left">Spam detection</td>
<td style="text-align:left">words in email</td>
<td style="text-align:left">spam / not spam</td>
</tr>
<tr>
<td style="text-align:left">Digit recognition</td>
<td style="text-align:left">pixel values</td>
<td style="text-align:left">digit 0-9</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="4" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="train-world-vs-real-world">Train World vs Real World</h1>
<p>Every ML workflow has two worlds:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Stage</th>
<th style="text-align:left">What happens</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Training</td>
<td style="text-align:left">We learn patterns from old labeled data</td>
</tr>
<tr>
<td style="text-align:left">Deployment</td>
<td style="text-align:left">The model sees new real-world inputs</td>
</tr>
<tr>
<td style="text-align:left">Monitoring</td>
<td style="text-align:left">We check whether the new world still looks like the old one</td>
</tr>
</tbody>
</table>
<p>If the real world changes, the model may fail even if the code is unchanged.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="5" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="a-model-can-decay-without-any-code-change">A Model Can Decay Without Any Code Change</h1>
<p>You build a spam filter in January.</p>
<ul>
<li>January accuracy: <code>95%</code></li>
<li>July accuracy: <code>72%</code></li>
<li>same code</li>
<li>same model file</li>
<li>same server</li>
</ul>
<p>What changed?</p>
<p>The world around the model changed.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="what-happened-the-world-moved">What Happened: The World Moved</h1>
<p><img src="images/week10/model_accuracy_decay.png" alt="" style="width:800px;" /></p>
<p><strong>The model stayed frozen. The data arriving to it did not.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="the-mental-model-to-keep-in-mind">The Mental Model to Keep in Mind</h1>
<p>An ML model is a <strong>compressed summary of old patterns</strong>.</p>
<p>That summary is useful only when:</p>
<ul>
<li>new inputs look similar to old inputs</li>
<li>the meaning of those inputs has not changed</li>
<li>the balance of outcomes has not changed too much</li>
</ul>
<p>When one of these breaks, we call it <strong>drift</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="three-different-things-can-change">Three Different Things Can Change</h1>
<table>
<thead>
<tr>
<th style="text-align:left">What changed?</th>
<th style="text-align:left">Plain English</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Inputs changed</td>
<td style="text-align:left">the <code>X</code> values look different</td>
</tr>
<tr>
<td style="text-align:left">Rule changed</td>
<td style="text-align:left">the correct answer for the same input changed</td>
</tr>
<tr>
<td style="text-align:left">Outcome mix changed</td>
<td style="text-align:left">some labels became much more or less common</td>
</tr>
</tbody>
</table>
<p>We will add the formal <code>P(...)</code> notation later, after the intuition is clear.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="9" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="the-three-types-of-drift">The Three Types of Drift</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Type</th>
<th style="text-align:left">One-line meaning</th>
<th style="text-align:left">Ask this question</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Data drift</strong></td>
<td style="text-align:left">Inputs changed</td>
<td style="text-align:left">&quot;Do the incoming <code>X</code> values still look like training data?&quot;</td>
</tr>
<tr>
<td style="text-align:left"><strong>Concept drift</strong></td>
<td style="text-align:left">The rule changed</td>
<td style="text-align:left">&quot;For the same <code>X</code>, is the correct <code>Y</code> now different?&quot;</td>
</tr>
<tr>
<td style="text-align:left"><strong>Label drift</strong></td>
<td style="text-align:left">Outcome mix changed</td>
<td style="text-align:left">&quot;Are some labels much more common now?&quot;</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-class="lead" data-theme="iitgn-modern" lang="C" class="lead" data-marpit-pagination="10" style="--paginate:true;--class:lead;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="type-1-data-drift">Type 1: Data Drift</h1>
<h2 id="the-inputs-changed-but-the-task-stayed-the-same">The inputs changed, but the task stayed the same.</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="11" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="data-drift-first-build-the-idea-slowly">Data Drift: First Build the Idea Slowly</h1>
<p>We will use one running example:</p>
<ul>
<li><strong>Task:</strong> predict used car price</li>
<li><strong>Input <code>X</code>:</strong> kilometers driven</li>
<li><strong>Output <code>Y</code>:</strong> resale price</li>
<li><strong>Model:</strong> <code>LinearRegression</code></li>
</ul>
<p>The key question is simple:</p>
<p><strong>What if the cars seen after deployment are very different from the cars seen during training?</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="step-1-the-training-world">Step 1: The Training World</h1>
<p>Suppose the dealership mostly had relatively new cars during training:</p>
<ul>
<li>most cars between <code>5,000</code> and <code>60,000</code> km</li>
<li>low to medium mileage</li>
<li>not many very old cars</li>
</ul>
<p>Inside this limited range, a straight line works reasonably well.</p>
<p>Even if the true price curve is not perfectly linear, the model looks good on the training-like test set.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="step-2-why-the-market-changed">Step 2: Why the Market Changed</h1>
<p>Four years later, the local market changes:</p>
<ul>
<li>new car prices go up, so families keep their cars longer</li>
<li>loan rates rise, so fewer people upgrade every 2-3 years</li>
<li>a taxi fleet starts selling many old vehicles to the same dealership</li>
</ul>
<p>Nothing is wrong with the code.<br />
The <strong>market around the model moved</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="14" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="step-3-what-the-model-sees-now">Step 3: What the Model Sees Now</h1>
<p>Because of that market change, the dealership now receives:</p>
<ul>
<li>many cars between <code>80,000</code> and <code>150,000</code> km</li>
<li>much higher mileage than before</li>
<li>far fewer &quot;almost new&quot; cars than in training</li>
</ul>
<p>Important:</p>
<ul>
<li>the <strong>pricing logic</strong> of the world did not change</li>
<li>a car with high mileage is still worth less</li>
<li>only the <strong>kind of inputs arriving</strong> changed</li>
</ul>
<p>This is the core idea of data drift.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="what-stayed-the-same-what-changed">What Stayed the Same? What Changed?</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Question</th>
<th style="text-align:left">Answer</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Did the task change?</td>
<td style="text-align:left">No, still predict car price</td>
</tr>
<tr>
<td style="text-align:left">Did the correct relationship change?</td>
<td style="text-align:left">No, more km still means lower price</td>
</tr>
<tr>
<td style="text-align:left">Did the input range change?</td>
<td style="text-align:left"><strong>Yes</strong></td>
</tr>
<tr>
<td style="text-align:left">Does the model now see unfamiliar inputs?</td>
<td style="text-align:left"><strong>Yes</strong></td>
</tr>
</tbody>
</table>
<p><strong>Data drift = same task, same rule, different inputs.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="16" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="data-drift-visualization">Data Drift Visualization</h1>
<p><img src="images/week10/car_price_scatter.png" alt="" style="width:850px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="17" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="read-this-plot-slowly">Read This Plot Slowly</h1>
<p>What the figure is saying:</p>
<ol>
<li>The blue training points live mostly on the left side of the plot.</li>
<li>The orange production points appear far to the right.</li>
<li>The model learned a line mostly from the blue region.</li>
<li>That line is now being pushed into a region it hardly saw before.</li>
</ol>
<p>The model is not &quot;buggy&quot;. It is extrapolating into an unfamiliar input region.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="18" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="the-metrics-tell-the-same-story">The Metrics Tell the Same Story</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Metric</th>
<th style="text-align:left">Clean test</th>
<th style="text-align:left">Drifted test</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><code>R^2</code></td>
<td style="text-align:left"><code>0.89</code></td>
<td style="text-align:left"><code>-10.3</code></td>
</tr>
<tr>
<td style="text-align:left"><code>MAE</code></td>
<td style="text-align:left"><code>Rs 0.28L</code></td>
<td style="text-align:left"><code>Rs 2.26L</code></td>
</tr>
</tbody>
</table>
<p>How to read these:</p>
<ul>
<li><code>R^2</code> close to <code>1</code> means the model explains the variation well</li>
<li>negative <code>R^2</code> means it is doing worse than a very naive baseline</li>
<li><code>MAE</code> means average absolute error</li>
</ul>
<p>So the model went from &quot;usually close&quot; to &quot;wrong by more than 2 lakh on average&quot;.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-class="code-heavy" data-theme="iitgn-modern" lang="C" class="code-heavy" data-marpit-pagination="19" style="--paginate:true;--class:code-heavy;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="data-drift-example-code-part-1">Data Drift Example: Code, Part 1</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np
<span class="hljs-keyword">from</span> sklearn.linear_model <span class="hljs-keyword">import</span> LinearRegression

np.random.seed(<span class="hljs-number">42</span>)

<span class="hljs-comment"># Training cars are mostly low to medium mileage</span>
km_train = np.random.normal(<span class="hljs-number">25000</span>, <span class="hljs-number">10000</span>, <span class="hljs-number">500</span>).clip(<span class="hljs-number">5000</span>, <span class="hljs-number">60000</span>)

<span class="hljs-comment"># True price drops quickly at first, then more slowly</span>
price_train = <span class="hljs-number">8</span> * np.exp(-km_train / <span class="hljs-number">50000</span>) + np.random.normal(<span class="hljs-number">0</span>, <span class="hljs-number">0.3</span>, <span class="hljs-number">500</span>)

model = LinearRegression()
model.fit(km_train.reshape(-<span class="hljs-number">1</span>, <span class="hljs-number">1</span>), price_train)
</code></pre>
<p>Focus on the idea, not the syntax:</p>
<ul>
<li>create training data</li>
<li>fit a model on that range</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-class="code-heavy" data-theme="iitgn-modern" lang="C" class="code-heavy" data-marpit-pagination="20" style="--paginate:true;--class:code-heavy;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="data-drift-example-code-part-2">Data Drift Example: Code, Part 2</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sklearn.metrics <span class="hljs-keyword">import</span> r2_score, mean_absolute_error

km_clean = np.random.normal(<span class="hljs-number">25000</span>, <span class="hljs-number">10000</span>, <span class="hljs-number">200</span>).clip(<span class="hljs-number">5000</span>, <span class="hljs-number">60000</span>)
price_clean = <span class="hljs-number">8</span> * np.exp(-km_clean / <span class="hljs-number">50000</span>) + np.random.normal(<span class="hljs-number">0</span>, <span class="hljs-number">0.3</span>, <span class="hljs-number">200</span>)

km_drift = np.random.normal(<span class="hljs-number">80000</span>, <span class="hljs-number">20000</span>, <span class="hljs-number">200</span>).clip(<span class="hljs-number">30000</span>, <span class="hljs-number">150000</span>)
price_drift = <span class="hljs-number">8</span> * np.exp(-km_drift / <span class="hljs-number">50000</span>) + np.random.normal(<span class="hljs-number">0</span>, <span class="hljs-number">0.3</span>, <span class="hljs-number">200</span>)

pred_clean = model.predict(km_clean.reshape(-<span class="hljs-number">1</span>, <span class="hljs-number">1</span>))
pred_drift = model.predict(km_drift.reshape(-<span class="hljs-number">1</span>, <span class="hljs-number">1</span>))

<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Clean  R^2:&quot;</span>, r2_score(price_clean, pred_clean))
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Drift  R^2:&quot;</span>, r2_score(price_drift, pred_drift))
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Clean MAE:&quot;</span>, mean_absolute_error(price_clean, pred_clean))
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Drift MAE:&quot;</span>, mean_absolute_error(price_drift, pred_drift))
</code></pre>
<p>Expected output from this run:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Clean  R^2: 0.908
Drift  R^2: -10.675
Clean MAE: 0.241
Drift MAE: 2.366
</code></pre>
<p>Only one thing changed between the two evaluations:</p>
<p><strong>the distribution of <code>km</code> values.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="21" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="the-same-idea-appears-in-images">The Same Idea Appears in Images</h1>
<p><img src="images/week10/image_drift_example.png" alt="" style="width:800px;" /></p>
<p>Train on clean scanned digits.<br />
Deploy on darker, noisier phone-camera images.</p>
<p>The label is still the same digit.<br />
But the <strong>pixel values</strong> fed to the model are different.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="22" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="images-are-still-input-features">Images Are Still Input Features</h1>
<p><img src="images/week10/image_drift_pixels.png" alt="" style="width:800px;" /></p>
<p>At an introductory level, an image is still a large numeric input.</p>
<p>We can already detect useful drift by comparing simple signals such as:</p>
<ul>
<li>average brightness</li>
<li>pixel spread</li>
<li>amount of noise</li>
</ul>
<p>So image drift is still just <strong>input drift</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="23" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="modern-ml-note-embeddings-can-drift-too">Modern ML Note: Embeddings Can Drift Too</h1>
<p>In modern ML systems, we may not monitor only raw pixels.</p>
<p>A CNN or ViT often converts each image into a <strong>feature vector</strong> or <strong>embedding</strong>.</p>
<p>If those embedding vectors shift over time, that is also evidence that the input distribution changed.</p>
<p>So there are two common views of the same idea:</p>
<ul>
<li><strong>pixel-level drift</strong>: low-level changes such as lighting, blur, contrast, noise</li>
<li><strong>embedding drift</strong>: higher-level feature changes seen by a learned representation</li>
</ul>
<p>For this course, keep the main idea simple:</p>
<p><strong>the inputs changed</strong>.<br />
The representation we use to measure that change can be raw pixels or learned features.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="24" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="the-same-idea-appears-in-text">The Same Idea Appears in Text</h1>
<p><img src="images/week10/text_drift_example.png" alt="" style="width:800px;" /></p>
<p>Train on formal office emails.<br />
Deploy on short chat messages.</p>
<p>What changes?</p>
<ul>
<li>vocabulary</li>
<li>sentence length</li>
<li>abbreviations</li>
<li>writing style</li>
</ul>
<p>Spam is still spam, but the <strong>input text distribution</strong> is different.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="25" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="modern-ml-note-text-embeddings-can-drift-too">Modern ML Note: Text Embeddings Can Drift Too</h1>
<p>In modern NLP systems, we may not monitor only raw words.</p>
<p>A language model or sentence encoder often converts text into an <strong>embedding vector</strong>.</p>
<p>If those embeddings shift over time, that is also evidence that the incoming text distribution changed.</p>
<p>So there are two common views of the same idea:</p>
<ul>
<li><strong>word-level drift</strong>: vocabulary, spelling, sentence length, writing style</li>
<li><strong>embedding drift</strong>: changes in the higher-level features learned from text</li>
</ul>
<p>For this course, keep the main idea simple:</p>
<p><strong>the inputs changed</strong>.<br />
We may measure that change using words, counts, or learned embeddings.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="26" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="text-drift-what-training-looked-like">Text Drift: What Training Looked Like</h1>
<p>What the model mostly saw during training:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Training message</th>
<th style="text-align:left">Likely label</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">&quot;Dear team, please find the invoice attached.&quot;</td>
<td style="text-align:left">not spam</td>
</tr>
<tr>
<td style="text-align:left">&quot;Reminder: meeting moved to 3 PM.&quot;</td>
<td style="text-align:left">not spam</td>
</tr>
<tr>
<td style="text-align:left">&quot;Congratulations, you won a free iPhone. Click now.&quot;</td>
<td style="text-align:left">spam</td>
</tr>
</tbody>
</table>
<p>The vocabulary is formal and office-like.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="27" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="text-drift-what-production-looks-like-now">Text Drift: What Production Looks Like Now</h1>
<p>What the model now sees in production:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Production message</th>
<th style="text-align:left">Why this is tricky</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">&quot;send ppt asap&quot;</td>
<td style="text-align:left">short, informal, almost no familiar office words</td>
</tr>
<tr>
<td style="text-align:left">&quot;bro claim reward fast&quot;</td>
<td style="text-align:left">slang-heavy, different spam style</td>
</tr>
<tr>
<td style="text-align:left">&quot;meeting at 3? send loc&quot;</td>
<td style="text-align:left">same intent as email, very different wording</td>
</tr>
</tbody>
</table>
<p>So the problem is not only &quot;new words&quot;. It is a whole new <strong>style of writing</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="28" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="real-world-data-drift-examples">Real-World Data Drift Examples</h1>
<p>These are common across very different ML systems:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Domain</th>
<th style="text-align:left">Training world</th>
<th style="text-align:left">Production world</th>
<th style="text-align:left">What changed in <code>X</code>?</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">OCR / document AI</td>
<td style="text-align:left">flat scanned forms</td>
<td style="text-align:left">phone photos of folded forms</td>
<td style="text-align:left">lighting, blur, perspective</td>
</tr>
<tr>
<td style="text-align:left">Speech recognition</td>
<td style="text-align:left">quiet office audio</td>
<td style="text-align:left">classroom or railway-station audio</td>
<td style="text-align:left">noise, echo, microphone quality</td>
</tr>
<tr>
<td style="text-align:left">Retail demand forecasting</td>
<td style="text-align:left">normal weekdays</td>
<td style="text-align:left">festival season</td>
<td style="text-align:left">basket size, time-of-day, product mix</td>
</tr>
<tr>
<td style="text-align:left">Loan scoring</td>
<td style="text-align:left">salaried urban users</td>
<td style="text-align:left">rural self-employed users</td>
<td style="text-align:left">income pattern, transaction pattern, document quality</td>
</tr>
</tbody>
</table>
<p>Same task. Different incoming input style.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="29" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="why-data-drift-happens-in-practice">Why Data Drift Happens in Practice</h1>
<p>Most data drift comes from a few common causes:</p>
<ol>
<li><strong>New users</strong>: your app expands to a different age group, city, or customer segment</li>
<li><strong>New devices</strong>: new phone cameras, microphones, scanners, or sensors</li>
<li><strong>Seasonality</strong>: festivals, monsoon, exam season, holiday traffic</li>
<li><strong>Business or collection changes</strong>: a new sales channel, pricing change, or mobile-upload workflow</li>
</ol>
<p>So drift is not rare or artificial. It is what happens when real systems survive long enough.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="30" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="not-every-feature-has-to-drift">Not Every Feature Has To Drift</h1>
<p>In real systems, drift often affects <strong>some features</strong>, not all of them.</p>
<p>Example: used-car pricing</p>
<table>
<thead>
<tr>
<th style="text-align:left">Feature</th>
<th style="text-align:left">Drifted?</th>
<th style="text-align:left">Why?</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">mileage</td>
<td style="text-align:left">Yes</td>
<td style="text-align:left">more older cars are arriving</td>
</tr>
<tr>
<td style="text-align:left">car age</td>
<td style="text-align:left">Yes</td>
<td style="text-align:left">the dealership now receives older models</td>
</tr>
<tr>
<td style="text-align:left">brand</td>
<td style="text-align:left">Maybe not</td>
<td style="text-align:left">the same brands may still dominate</td>
</tr>
<tr>
<td style="text-align:left">fuel type</td>
<td style="text-align:left">Maybe not</td>
<td style="text-align:left">petrol vs diesel mix may stay similar</td>
</tr>
</tbody>
</table>
<p>So data drift does <strong>not</strong> mean &quot;everything changed.&quot;</p>
<p>It often means:</p>
<blockquote>
<p>&quot;Some important parts of the input moved enough to matter.&quot;</p>
</blockquote>
<p>That is why teams usually check drift <strong>feature by feature</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-class="lead" data-theme="iitgn-modern" lang="C" class="lead" data-marpit-pagination="31" style="--paginate:true;--class:lead;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="type-2-concept-drift">Type 2: Concept Drift</h1>
<h2 id="the-meaning-of-the-input-changed">The meaning of the input changed.</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="32" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="concept-drift-the-key-difference">Concept Drift: The Key Difference</h1>
<p>With concept drift:</p>
<ul>
<li>the model may see inputs that look normal</li>
<li>but the <strong>correct answer for those inputs has changed</strong></li>
</ul>
<p>So this time the problem is not &quot;new kind of <code>X</code>&quot;.</p>
<p>The problem is that the old rule <code>X -&gt; Y</code> is no longer correct.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="33" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="example-setup-premium-customers-in-january">Example Setup: Premium Customers in January</h1>
<p>Suppose a food-delivery company defines:</p>
<ul>
<li><code>X = (orders per week, average spend)</code></li>
<li><code>Y = premium customer or regular customer</code></li>
</ul>
<p>In January:</p>
<ul>
<li>people ordering <code>4</code> times per week and spending <code>Rs 500</code> are unusual</li>
<li>the company labels them as <strong>premium</strong></li>
</ul>
<p>The model learns this boundary from historical data.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="34" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="same-inputs-new-labels-later">Same Inputs, New Labels Later</h1>
<p>A few months later, the company launches a free-delivery subscription plan.</p>
<p>Now many ordinary users order <code>4</code> times per week.</p>
<p>So for the <strong>same input</strong>:</p>
<ul>
<li><code>orders = 4</code></li>
<li><code>spend = Rs 500</code></li>
</ul>
<p>the correct label may now be <strong>regular</strong>, not premium.</p>
<p>That is concept drift.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="35" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="concept-drift-visualization">Concept Drift Visualization</h1>
<p><img src="images/week10/concept_drift_detailed.png" alt="" style="width:850px;" /></p>
<p>The important point is not the exact geometry.</p>
<p>The important point is: <strong>the old decision boundary no longer matches the new world.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="36" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="more-real-concept-drift-examples">More Real Concept Drift Examples</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Domain</th>
<th style="text-align:left">Same input</th>
<th style="text-align:left">Old label</th>
<th style="text-align:left">New label</th>
<th style="text-align:left">What changed in the world?</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Customer scoring</td>
<td style="text-align:left">4 orders/week, <code>Rs 500</code> spend</td>
<td style="text-align:left">premium</td>
<td style="text-align:left">regular</td>
<td style="text-align:left">subscription launch changed user behavior</td>
</tr>
<tr>
<td style="text-align:left">Fraud detection</td>
<td style="text-align:left">late-night purchase at a new merchant</td>
<td style="text-align:left">suspicious</td>
<td style="text-align:left">often normal</td>
<td style="text-align:left">quick-commerce habits became common</td>
</tr>
<tr>
<td style="text-align:left">Review helpfulness</td>
<td style="text-align:left">&quot;delivery in 2 days&quot;</td>
<td style="text-align:left">not helpful</td>
<td style="text-align:left">helpful</td>
<td style="text-align:left">delays changed what users valued</td>
</tr>
</tbody>
</table>
<p>The important pattern is the same in all three cases:<br />
<strong>same <code>X</code>, different correct <code>Y</code>.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="37" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="concept-drift-cases-visual-summary">Concept Drift Cases: Visual Summary</h1>
<p><img src="images/week10/concept_drift_cases.png" alt="" style="width:900px;" /></p>
<p>Three different domains, one pattern:<br />
<strong>same input, new correct label</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="38" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="why-concept-drift-is-the-hardest">Why Concept Drift Is the Hardest</h1>
<p>If you only look at inputs, concept drift can hide from you.</p>
<p>Why?</p>
<ul>
<li>incoming <code>X</code> values may still look normal</li>
<li>feature histograms may look stable</li>
<li>but predictions are wrong because the rule changed</li>
</ul>
<p>So for concept drift, teams need:</p>
<ul>
<li>fresh labeled production data</li>
<li>delayed evaluation</li>
<li>periodic accuracy / precision / recall checks</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-class="lead" data-theme="iitgn-modern" lang="C" class="lead" data-marpit-pagination="39" style="--paginate:true;--class:lead;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="type-3-label-drift">Type 3: Label Drift</h1>
<h2 id="the-outcome-mix-changed">The outcome mix changed.</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="40" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="label-drift-what-it-means">Label Drift: What It Means</h1>
<p>Label drift does <strong>not</strong> mean the task changed.</p>
<p>It means the <strong>proportion of outcomes</strong> changed.</p>
<p>Examples:</p>
<ul>
<li>fraud used to be <code>1%</code>, now it is <code>5%</code></li>
<li>positive reviews used to be <code>30%</code>, now they are <code>65%</code></li>
<li>dog images used to be <code>40%</code>, now they are <code>75%</code></li>
</ul>
<p>The rule can stay the same, but the balance changes.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="41" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="a-visual-way-to-think-about-label-drift">A Visual Way to Think About Label Drift</h1>
<p><img src="images/week10/label_drift_example.png" alt="" style="width:750px;" /></p>
<p>The classes are the same.<br />
Their frequencies are not.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="42" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="example-fraud-detection-with-a-score">Example: Fraud Detection with a Score</h1>
<p>Suppose a logistic-regression model outputs:</p>
<p><code>p = probability that this transaction is fraud</code></p>
<p>Think of <code>p</code> as a <strong>suspicion score</strong>:</p>
<ul>
<li>low <code>p</code> -&gt; looks normal</li>
<li>high <code>p</code> -&gt; looks risky</li>
</ul>
<p>Then the company uses a simple rule:</p>
<ul>
<li>if <code>p &gt; 0.80</code>, send the transaction for manual review</li>
<li>otherwise, approve it automatically</li>
</ul>
<p>Why such a high threshold?</p>
<ul>
<li>in training data, fraud was only <code>1%</code></li>
<li>so the team tuned the system for a world where fraud is very rare</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="43" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="same-model-new-fraud-rate">Same Model, New Fraud Rate</h1>
<p>Now suppose the fraud rate rises:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Quantity</th>
<th style="text-align:left">Training</th>
<th style="text-align:left">Production</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Fraud rate</td>
<td style="text-align:left"><code>1%</code></td>
<td style="text-align:left"><code>5%</code></td>
</tr>
<tr>
<td style="text-align:left">Non-fraud rate</td>
<td style="text-align:left"><code>99%</code></td>
<td style="text-align:left"><code>95%</code></td>
</tr>
</tbody>
</table>
<p>The data balance changed, even if the model code did not.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="44" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="same-model-new-fraud-rate-what-goes-wrong">Same Model, New Fraud Rate: What Goes Wrong?</h1>
<p>Imagine four transactions today:</p>
<table>
<thead>
<tr>
<th style="text-align:left">Score <code>p</code></th>
<th style="text-align:left">Old action with cutoff <code>0.80</code></th>
<th style="text-align:left">Plain reading</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><code>0.92</code></td>
<td style="text-align:left">review</td>
<td style="text-align:left">clearly risky</td>
</tr>
<tr>
<td style="text-align:left"><code>0.78</code></td>
<td style="text-align:left">auto-approve</td>
<td style="text-align:left">suspicious, but below the old cutoff</td>
</tr>
<tr>
<td style="text-align:left"><code>0.71</code></td>
<td style="text-align:left">auto-approve</td>
<td style="text-align:left">suspicious, but below the old cutoff</td>
</tr>
<tr>
<td style="text-align:left"><code>0.30</code></td>
<td style="text-align:left">auto-approve</td>
<td style="text-align:left">probably normal</td>
</tr>
</tbody>
</table>
<p>What is the problem?</p>
<ul>
<li>the model may still rank cases sensibly: <code>0.92</code> looks riskier than <code>0.78</code>, and <code>0.78</code> looks riskier than <code>0.30</code></li>
<li>but the old rule only reviews scores above <code>0.80</code></li>
<li>in the new <code>5%</code> fraud world, there are now many more truly risky cases in the <code>0.60</code> to <code>0.80</code> region</li>
<li>so the system misses too many risky transactions, even though the score itself is still useful</li>
</ul>
<p>This is why label drift often forces teams to:</p>
<ul>
<li>lower or retune the review threshold</li>
<li>recalibrate probabilities if needed</li>
<li>rethink review capacity, because more transactions may now need a human check</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="45" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="label-drift-read-it-slowly">Label Drift: Read It Slowly</h1>
<p>What stayed the same?</p>
<ul>
<li>the task</li>
<li>the input features</li>
<li>often even the basic decision rule</li>
</ul>
<p>What changed?</p>
<ul>
<li>how often each outcome occurs</li>
</ul>
<p>So label drift is about <strong>class balance</strong>, not a new meaning of the input.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="46" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="more-real-label-drift-examples">More Real Label Drift Examples</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Domain</th>
<th style="text-align:left">Training world</th>
<th style="text-align:left">Production world</th>
<th style="text-align:left">What became more common?</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Fraud detection</td>
<td style="text-align:left">ordinary months</td>
<td style="text-align:left">festive scam wave</td>
<td style="text-align:left">fraud cases</td>
</tr>
<tr>
<td style="text-align:left">App support triage</td>
<td style="text-align:left">stable release</td>
<td style="text-align:left">buggy payment release</td>
<td style="text-align:left">payment complaints</td>
</tr>
<tr>
<td style="text-align:left">Review sentiment</td>
<td style="text-align:left">old product version</td>
<td style="text-align:left">improved redesign</td>
<td style="text-align:left">positive reviews</td>
</tr>
<tr>
<td style="text-align:left">Medical screening</td>
<td style="text-align:left">normal district</td>
<td style="text-align:left">local outbreak zone</td>
<td style="text-align:left">positive cases</td>
</tr>
</tbody>
</table>
<p>In all four examples, the task stays the same.<br />
The <strong>mix of labels</strong> changes.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="47" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="one-more-label-drift-example">One More Label Drift Example</h1>
<p>Traffic camera AI:</p>
<ul>
<li>training city: mostly cars</li>
<li>production week: metro strike, fuel-price shock, or festival traffic</li>
<li>now two-wheelers become much more common</li>
</ul>
<p>The classifier task is still vehicle recognition.<br />
But the <strong>class proportions</strong> reaching the system changed.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="48" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="compare-the-three-types-once-more">Compare the Three Types Once More</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Type</th>
<th style="text-align:left">What changed?</th>
<th style="text-align:left">Notation</th>
<th style="text-align:left">Main signal to watch</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Data drift</td>
<td style="text-align:left">inputs <code>X</code></td>
<td style="text-align:left"><code>P(X)</code></td>
<td style="text-align:left">feature distributions</td>
</tr>
<tr>
<td style="text-align:left">Concept drift</td>
<td style="text-align:left">rule from <code>X -&gt; Y</code></td>
<td style="text-align:left"><code>P(Y given X)</code></td>
<td style="text-align:left">labeled performance</td>
</tr>
<tr>
<td style="text-align:left">Label drift</td>
<td style="text-align:left">label frequencies</td>
<td style="text-align:left"><code>P(Y)</code></td>
<td style="text-align:left">class proportions</td>
</tr>
</tbody>
</table>
<p>If you can say this table out loud, you understand the topic.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-class="lead" data-theme="iitgn-modern" lang="C" class="lead" data-marpit-pagination="49" style="--paginate:true;--class:lead;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="how-to-detect-drift">How to Detect Drift</h1>
<h2 id="start-with-intuition-then-move-to-tests">Start with intuition, then move to tests.</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="50" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="first-question-did-the-world-change-or-did-the-pipeline-break">First Question: Did the World Change, or Did the Pipeline Break?</h1>
<p>When model behavior gets worse, two very different things may be happening:</p>
<ul>
<li><strong>drift</strong>: the real world changed, so the model is seeing new patterns</li>
<li><strong>bug</strong>: the data pipeline, preprocessing, or logging broke</li>
</ul>
<p>Simple intuition:</p>
<ul>
<li>if the <strong>world changed</strong>, think drift</li>
<li>if the <strong>numbers suddenly look impossible</strong>, think bug</li>
</ul>
<p>Example:</p>
<ul>
<li>more older cars arriving over months -&gt; drift</li>
<li>mileage suddenly becomes <code>0</code> for every car -&gt; bug</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="51" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="first-question-quick-clues">First Question: Quick Clues</h1>
<table>
<thead>
<tr>
<th style="text-align:left">Symptom</th>
<th style="text-align:left">More likely drift</th>
<th style="text-align:left">More likely bug</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">feature mean moves slowly over weeks</td>
<td style="text-align:left">Yes</td>
<td style="text-align:left">No</td>
</tr>
<tr>
<td style="text-align:left">new kinds of users appear gradually</td>
<td style="text-align:left">Yes</td>
<td style="text-align:left">No</td>
</tr>
<tr>
<td style="text-align:left">a feature suddenly becomes all zeros</td>
<td style="text-align:left">No</td>
<td style="text-align:left">Yes</td>
</tr>
<tr>
<td style="text-align:left">a currency value becomes 100x larger overnight</td>
<td style="text-align:left">No</td>
<td style="text-align:left">Yes</td>
</tr>
</tbody>
</table>
<p>So before running tests, first ask:</p>
<blockquote>
<p>&quot;Did the world change, or did our data pipeline break?&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="52" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="step-0-always-start-with-a-plot">Step 0: Always Start With a Plot</h1>
<p>For a numeric feature, start with one simple question:</p>
<blockquote>
<p>&quot;Do training and production look similar, or obviously different?&quot;</p>
</blockquote>
<p>So first compare them visually:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">plt.hist(train[<span class="hljs-string">&quot;sqft&quot;</span>], bins=<span class="hljs-number">30</span>, alpha=<span class="hljs-number">0.5</span>, label=<span class="hljs-string">&quot;train&quot;</span>)
plt.hist(prod[<span class="hljs-string">&quot;sqft&quot;</span>],  bins=<span class="hljs-number">30</span>, alpha=<span class="hljs-number">0.5</span>, label=<span class="hljs-string">&quot;prod&quot;</span>)
plt.legend()
</code></pre>
<ul>
<li>plots are fast</li>
<li>plots build intuition</li>
<li>plots catch many obvious problems</li>
</ul>
<p>But &quot;looks different&quot; is subjective.<br />
So we also want a number.</p>
<p>Companion notebook:<br />
<code>lecture-demos/week10/data_drift_visual_companion.ipynb</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="53" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="before-the-kolmogorov-smirnov-ks-test-what-are-we-trying-to-do">Before the Kolmogorov-Smirnov (KS) Test: What Are We Trying to Do?</h1>
<p>Suppose we pick <strong>one numeric feature</strong>, such as:</p>
<ul>
<li>car mileage</li>
<li>apartment size</li>
</ul>
<p>We have two groups of values:</p>
<ul>
<li>training data</li>
<li>production data</li>
</ul>
<p>Our task is simple:</p>
<blockquote>
<p>&quot;Do these two sets of numbers look like they come from the same distribution?&quot;</p>
</blockquote>
<p>We start with plots.<br />
Then we want <strong>one number</strong> that summarizes the difference.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="54" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="before-the-kolmogorov-smirnov-ks-test-what-is-a-cdf">Before the Kolmogorov-Smirnov (KS) Test: What Is a CDF?</h1>
<p><img src="images/week10/cdf_intuition.png" alt="" style="width:760px;" /></p>
<p>A CDF is a running total.</p>
<p>At any value <code>x</code>, it asks:</p>
<p><strong>&quot;What fraction of values are less than or equal to <code>x</code>?&quot;</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="55" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="why-use-a-cdf-for-the-kolmogorov-smirnov-ks-test">Why Use a CDF for the Kolmogorov-Smirnov (KS) Test?</h1>
<p>For this task, a CDF helps because:</p>
<ul>
<li>a histogram can look noisy</li>
<li>a CDF is smoother</li>
<li>two CDFs are easier to compare visually</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="56" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-first-compare-two-cases">Kolmogorov-Smirnov (KS) Test: First Compare Two Cases</h1>
<p><img src="images/week10/ks_two_cases.png" alt="" style="width:820px;" /></p>
<p>Read this figure from left to right:</p>
<ul>
<li>on the <strong>left</strong>, training and production look similar</li>
<li>on the <strong>right</strong>, they are clearly shifted</li>
</ul>
<p>The Kolmogorov-Smirnov test turns this visual idea into a number.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="57" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-what-is-d">Kolmogorov-Smirnov (KS) Test: What Is <code>D</code>?</h1>
<p><img src="images/week10/ks_test_intuition.png" alt="" style="width:700px;" /></p>
<p>The Kolmogorov-Smirnov test looks for the <strong>largest vertical gap</strong> between the two CDF curves.</p>
<p>That gap is called <strong><code>D</code></strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="58" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-how-to-read-d">Kolmogorov-Smirnov (KS) Test: How to Read <code>D</code></h1>
<ul>
<li>small <code>D</code> -&gt; the two distributions are similar</li>
<li>larger <code>D</code> -&gt; the two distributions are farther apart</li>
</ul>
<p>So <code>D</code> is just a distance between the two CDF curves.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="59" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="before-ks-p-values-the-general-idea">Before KS p-values: The General Idea</h1>
<p>A p-value is trying to answer one question:</p>
<blockquote>
<p>&quot;Could this result be explained by random chance?&quot;</p>
</blockquote>
<p>To ask that question, we imagine a starting story:</p>
<blockquote>
<p>&quot;Maybe there is <strong>no real difference</strong>. Maybe this is just sampling noise.&quot;</p>
</blockquote>
<p>Then we ask whether our observed result looks common or rare under that story.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="60" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="tiny-toy-example-for-p-values">Tiny Toy Example for p-values</h1>
<p>Suppose:</p>
<ul>
<li>Sample A: <code>24, 25, 25, 26, 24</code></li>
<li>Sample B: <code>24, 25, 26, 25, 24</code></li>
</ul>
<p>Step 1: compute the sample means</p>
<ul>
<li>mean of A = <code>(24 + 25 + 25 + 26 + 24) / 5 = 24.8</code></li>
<li>mean of B = <code>(24 + 25 + 26 + 25 + 24) / 5 = 24.8</code></li>
</ul>
<p>So the observed mean gap is:</p>
<ul>
<li><code>24.8 - 24.8 = 0.0</code></li>
</ul>
<p>That looks completely unsurprising.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="61" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="same-example-now-a-big-gap">Same Example, Now a Big Gap</h1>
<p>Keep Sample A the same:</p>
<ul>
<li>Sample A: <code>24, 25, 25, 26, 24</code></li>
</ul>
<p>Now change Sample B:</p>
<ul>
<li>Sample B: <code>31, 32, 33, 31, 32</code></li>
</ul>
<p>Step 1 again: compute the sample means</p>
<ul>
<li>mean of A = <code>24.8</code></li>
<li>mean of B = <code>(31 + 32 + 33 + 31 + 32) / 5 = 31.8</code></li>
</ul>
<p>So the observed mean gap is:</p>
<ul>
<li><code>31.8 - 24.8 = 7.0</code></li>
</ul>
<p>That feels much harder to explain as random wobble.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="62" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="how-many-re-splits-are-possible">How Many Re-splits Are Possible?</h1>
<p>Now use the <strong>different</strong> case:</p>
<ul>
<li>Sample A: <code>24, 25, 25, 26, 24</code></li>
<li>Sample B: <code>31, 32, 33, 31, 32</code></li>
</ul>
<p>Under the <strong>no real difference</strong> story, we mix all 10 values together.</p>
<p>Then we make a new Sample A by choosing <strong>any 5 of the 10 values</strong>.</p>
<p>How many choices is that?</p>
<ul>
<li><code>C(10, 5) = 252</code></li>
</ul>
<p>So there are <strong>252 exact re-splits</strong> to check.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="63" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="a-few-example-re-splits">A Few Example Re-splits</h1>
<p>Using the 10 values from the <strong>different</strong> case:</p>
<table>
<thead>
<tr>
<th style="text-align:left">New Sample A</th>
<th style="text-align:left">New Sample B</th>
<th style="text-align:left">Mean gap</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><code>24, 25, 25, 26, 24</code></td>
<td style="text-align:left"><code>31, 32, 33, 31, 32</code></td>
<td style="text-align:left"><code>7.0</code></td>
</tr>
<tr>
<td style="text-align:left"><code>24, 25, 25, 31, 32</code></td>
<td style="text-align:left"><code>26, 24, 33, 31, 32</code></td>
<td style="text-align:left"><code>1.8</code></td>
</tr>
<tr>
<td style="text-align:left"><code>24, 25, 31, 32, 33</code></td>
<td style="text-align:left"><code>25, 26, 24, 31, 32</code></td>
<td style="text-align:left"><code>1.4</code></td>
</tr>
</tbody>
</table>
<p>Most re-splits look much more mixed than the original split.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="64" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="p-value-intuition-from-all-252-re-splits">p-value Intuition from All 252 Re-splits</h1>
<p><img src="images/week10/p_value_intuition.png" alt="" style="width:920px;" /></p>
<p>Each bar shows how many of the <code>252</code> re-splits gave that mean gap.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="65" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="exact-p-value-for-the-toy-cases">Exact p-value for the Toy Cases</h1>
<p>The p-value is:</p>
<blockquote>
<p>the fraction of re-splits giving a gap this large or larger</p>
</blockquote>
<p>For the <strong>similar</strong> case:</p>
<ul>
<li>observed gap = <code>0.0</code></li>
<li>all <code>252</code> re-splits are at least <code>0.0</code></li>
<li>so <code>p = 252 / 252 = 1.0</code></li>
</ul>
<p><code>p</code> stands for <strong>probability</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="66" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="exact-p-value-for-the-different-case">Exact p-value for the Different Case</h1>
<p>Now for the <strong>different</strong> case:</p>
<ul>
<li>observed gap = <code>7.0</code></li>
<li>only <code>2</code> of <code>252</code> re-splits are at least <code>7.0</code></li>
<li>so <code>p = 2 / 252 ≈ 0.008</code></li>
</ul>
<p>Here it means:</p>
<ul>
<li>under the <strong>no real difference</strong> story</li>
<li>probability of seeing a gap this large or larger</li>
</ul>
<p>Companion notebook:<br />
<code>lecture-demos/week10/p_value_toy_companion.ipynb</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="67" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-from-samples-to-d">Kolmogorov-Smirnov (KS) Test: From Samples to <code>D</code></h1>
<p>Yes, KS still starts with <strong>samples of numbers</strong>.</p>
<p>Example:</p>
<ul>
<li>training sample: many mileage values</li>
<li>production sample: many mileage values</li>
</ul>
<p>Then KS does one extra step:</p>
<ol>
<li>turn the training sample into a CDF</li>
<li>turn the production sample into a CDF</li>
<li>measure the largest vertical gap between those two CDFs</li>
</ol>
<p>That largest gap is <strong><code>D</code></strong>.</p>
<p>So KS is:</p>
<blockquote>
<p>samples -&gt; CDFs -&gt; largest gap <code>D</code></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="68" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-same-logic-as-the-toy-example">Kolmogorov-Smirnov (KS) Test: Same Logic as the Toy Example</h1>
<p>The toy example and the KS test both start from <strong>two samples</strong>.</p>
<table>
<thead>
<tr>
<th style="text-align:left">Toy example</th>
<th style="text-align:left">KS example</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">two samples of <code>5</code> numbers</td>
<td style="text-align:left">two samples of many numbers</td>
</tr>
<tr>
<td style="text-align:left">compute one <strong>mean</strong> for each sample</td>
<td style="text-align:left">compute one <strong>CDF</strong> for each sample</td>
</tr>
<tr>
<td style="text-align:left">summarize by the <strong>mean gap</strong></td>
<td style="text-align:left">summarize by the <strong>largest CDF gap <code>D</code></strong></td>
</tr>
</tbody>
</table>
<p>So when we re-shuffle under the <strong>no-drift</strong> story:</p>
<ul>
<li>before, each re-split gave one <strong>mean gap</strong></li>
<li>now, each re-split gives one <strong><code>D</code> value</strong></li>
</ul>
<p>The re-splitting logic is the same.<br />
Only the summary number changed.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="69" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-what-is-a-p-value-here">Kolmogorov-Smirnov (KS) Test: What Is a p-value Here?</h1>
<p>Now imagine the <strong>no-drift</strong> story is true.</p>
<p>Under that story, we would:</p>
<ol>
<li>mix the training and production values together</li>
<li>re-split them into two groups again</li>
<li>build two CDFs for that re-split</li>
<li>compute <strong><code>D</code></strong> for those two CDFs</li>
<li>repeat many times</li>
</ol>
<p>So each random re-split gives one more <strong><code>D</code> value</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="70" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-the-p-value-question">Kolmogorov-Smirnov (KS) Test: The p-value Question</h1>
<p>After many such re-splits, ask:</p>
<blockquote>
<p>&quot;How often would a <code>D</code> this large or larger appear just by chance?&quot;</p>
</blockquote>
<p>Gentle reading:</p>
<ul>
<li>large p-value -&gt; a <code>D</code> this large could happen by chance</li>
<li>small p-value -&gt; a <code>D</code> this large is hard to explain by chance alone</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="71" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-how-to-read-p">Kolmogorov-Smirnov (KS) Test: How to Read <code>p</code></h1>
<ul>
<li>if <code>p = 0.20</code>, then under <strong>no real drift</strong>, a gap this large could happen about <code>20</code> times in <code>100</code> random repeats</li>
<li>if <code>p = 0.01</code>, then under <strong>no real drift</strong>, a gap this large could happen about <code>1</code> time in <code>100</code> random repeats</li>
</ul>
<p>So <code>p &lt; 0.05</code> is a common practical warning sign:</p>
<ul>
<li>&quot;this would happen fewer than 5 times in 100 repeats if there were really no drift&quot;</li>
</ul>
<p>But be careful:</p>
<ul>
<li>it does <strong>not</strong> mean &quot;there is a 95% probability that drift is real&quot;</li>
<li>it means &quot;this observed gap would be unusual if the no-drift story were true&quot;</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="72" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-in-4-steps">Kolmogorov-Smirnov (KS) Test in 4 Steps</h1>
<ol>
<li>Take one numeric feature from training data and one from production data.</li>
<li>Convert both to CDF curves.</li>
<li>Measure the largest gap between the two curves.</li>
<li>If the gap is too large to be explained by random chance, flag drift.</li>
</ol>
<p>Important:</p>
<ul>
<li>this is the <strong>conceptual idea</strong></li>
<li>software does <strong>not</strong> usually try every possible re-split by brute force</li>
<li>it computes the observed <code>D</code> from your two samples, then uses KS-test mathematics to get the p-value efficiently</li>
</ul>
<p>What the outputs mean:</p>
<ul>
<li><code>statistic</code> = how far apart the two distributions are</li>
<li><code>p-value</code> = if the distributions were actually the same, how surprising would this gap be?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-class="code-heavy" data-theme="iitgn-modern" lang="C" class="code-heavy" data-marpit-pagination="73" style="--paginate:true;--class:code-heavy;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="kolmogorov-smirnov-ks-test-code">Kolmogorov-Smirnov (KS) Test: Code</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> scipy.stats <span class="hljs-keyword">import</span> ks_2samp

stat, p = ks_2samp(train_km, prod_km)

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;KS statistic: <span class="hljs-subst">{stat:<span class="hljs-number">.3</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;p-value: <span class="hljs-subst">{p:<span class="hljs-number">.4</span>f}</span>&quot;</span>)
</code></pre>
<p>How to read it:</p>
<ul>
<li><code>stat</code> near <code>0</code> means very similar</li>
<li>larger <code>stat</code> means more separation</li>
<li>small <code>p-value</code> means the difference is unlikely to be random</li>
</ul>
<p>In practice, teams run this <strong>feature by feature</strong>.</p>
<p>Companion notebook:<br />
<code>lecture-demos/week10/ks_test_tiny_companion.ipynb</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="74" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="categorical-features-need-a-different-test">Categorical Features Need a Different Test</h1>
<p>Suppose the feature is <code>city</code>, not a numeric value.</p>
<table>
<thead>
<tr>
<th style="text-align:left">City</th>
<th style="text-align:left">Train count</th>
<th style="text-align:left">Production count</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Ahmedabad</td>
<td style="text-align:left">400</td>
<td style="text-align:left">200</td>
</tr>
<tr>
<td style="text-align:left">Rajkot</td>
<td style="text-align:left">350</td>
<td style="text-align:left">200</td>
</tr>
<tr>
<td style="text-align:left">Surat</td>
<td style="text-align:left">250</td>
<td style="text-align:left">600</td>
</tr>
</tbody>
</table>
<p>This is not a job for KS test.</p>
<p>Here we compare <strong>category counts</strong>.<br />
The usual tool is the <strong>chi-squared (<code>chi^2</code>) test</strong>.</p>
<p>Use it when the thing you compare is:</p>
<ul>
<li>a categorical input feature, such as <code>city</code>, <code>device</code>, or <code>plan type</code></li>
</ul>
<p>For label counts, we will come back to the same idea later.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="75" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="chi-squared-chi2-test-what-is-the-task">Chi-Squared (<code>chi^2</code>) Test: What Is the Task?</h1>
<p>For numeric features, KS compared <strong>distributions of numbers</strong>.</p>
<p>Here the feature is categorical, so we do not compare:</p>
<ul>
<li>means</li>
<li>histograms of numeric values</li>
<li>CDF curves</li>
</ul>
<p>Instead we ask:</p>
<blockquote>
<p>&quot;Did the counts in each category change so much that it is hard to explain by chance?&quot;</p>
</blockquote>
<p>So chi-squared is the natural choice when the input is:</p>
<ul>
<li>a name</li>
<li>a type</li>
<li>a category</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="76" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="chi-squared-chi2-test-what-would-no-change-look-like">Chi-Squared (<code>chi^2</code>) Test: What Would &quot;No Change&quot; Look Like?</h1>
<p>Observed counts:</p>
<table>
<thead>
<tr>
<th style="text-align:left">City</th>
<th style="text-align:left">Train</th>
<th style="text-align:left">Production</th>
<th style="text-align:left">Total</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">Ahmedabad</td>
<td style="text-align:left"><code>400</code></td>
<td style="text-align:left"><code>200</code></td>
<td style="text-align:left"><code>600</code></td>
</tr>
<tr>
<td style="text-align:left">Rajkot</td>
<td style="text-align:left"><code>350</code></td>
<td style="text-align:left"><code>200</code></td>
<td style="text-align:left"><code>550</code></td>
</tr>
<tr>
<td style="text-align:left">Surat</td>
<td style="text-align:left"><code>250</code></td>
<td style="text-align:left"><code>600</code></td>
<td style="text-align:left"><code>850</code></td>
</tr>
</tbody>
</table>
<p>If there were <strong>no real change</strong>, training and production should split each city more similarly.</p>
<p>Because both columns total <code>1000</code>, the no-change expectation is:</p>
<ul>
<li>Ahmedabad: <code>300</code> and <code>300</code></li>
<li>Rajkot: <code>275</code> and <code>275</code></li>
<li>Surat: <code>425</code> and <code>425</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-class="compact" data-theme="iitgn-modern" lang="C" class="compact" data-marpit-pagination="77" style="--paginate:true;--class:compact;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="chi-squared-chi2-test-where-does-the-score-come-from">Chi-Squared (<code>chi^2</code>) Test: Where Does the Score Come From?</h1>
<p>For each cell:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">contribution = (observed - expected)^2 / expected
</code></pre>
<p>Using the city example:</p>
<ul>
<li>Ahmedabad: <code>33.3 + 33.3</code></li>
<li>Rajkot: <code>20.5 + 20.5</code></li>
<li>Surat: <code>72.1 + 72.1</code></li>
</ul>
<p>Now add them:</p>
<p><code>chi^2 ≈ 33.3 + 33.3 + 20.5 + 20.5 + 72.1 + 72.1 = 251.7</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-class="code-heavy" data-theme="iitgn-modern" lang="C" class="code-heavy" data-marpit-pagination="78" style="--paginate:true;--class:code-heavy;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="chi-squared-chi2-test-code">Chi-Squared (<code>chi^2</code>) Test: Code</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> pandas <span class="hljs-keyword">as</span> pd
<span class="hljs-keyword">from</span> scipy.stats <span class="hljs-keyword">import</span> chi2_contingency

table = pd.DataFrame(
    {
        <span class="hljs-string">&quot;train&quot;</span>: [<span class="hljs-number">400</span>, <span class="hljs-number">350</span>, <span class="hljs-number">250</span>],
        <span class="hljs-string">&quot;prod&quot;</span>:  [<span class="hljs-number">200</span>, <span class="hljs-number">200</span>, <span class="hljs-number">600</span>],
    },
    index=[<span class="hljs-string">&quot;Ahmedabad&quot;</span>, <span class="hljs-string">&quot;Rajkot&quot;</span>, <span class="hljs-string">&quot;Surat&quot;</span>],
)

chi2, p, _, _ = chi2_contingency(table)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;chi2 = <span class="hljs-subst">{chi2:<span class="hljs-number">.2</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;p = <span class="hljs-subst">{p:<span class="hljs-number">.2</span>e}</span>&quot;</span>)
</code></pre>
<p>Expected output:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">chi2 = 251.69
p = 2.22e-55
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="79" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="chi-squared-chi2-test-how-to-read-it">Chi-Squared (<code>chi^2</code>) Test: How to Read It</h1>
<ul>
<li>if category counts changed only a little, <code>p</code> stays larger</li>
<li>if category counts changed a lot, <code>p</code> becomes small</li>
<li>so this is mainly a tool for <strong>categorical count changes</strong></li>
</ul>
<p>Quick rule:</p>
<ul>
<li>numeric feature -&gt; KS or PSI</li>
<li>categorical feature -&gt; chi-squared (<code>chi^2</code>)</li>
<li>labels are also categories, so the same test can also compare old vs new label counts</li>
</ul>
<p>Companion notebook:<br />
<code>lecture-demos/week10/chi_squared_tiny_companion.ipynb</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" data-paginate="true" data-theme="iitgn-modern" lang="C" data-marpit-pagination="80" style="--paginate:true;--theme:iitgn-modern;" data-marpit-pagination-total="99">
<h1 id="population-stability-index-psi-what-is-the-task-here">Population Stability Index (PSI): What Is the Task Here?</h1>
<p>PSI stands for <strong>Population Stability Index</strong>.</p>
<p>It tries to answer a simple question:</p>
<blockquote>
<p>&quot;If I split this feature into bins, did the percentage in those bins change a lot?&quot;</p>
</blockquote>
<p>So PSI is useful when you want a very dashboard-friendly summary:</p>
<ul>
<li>training had one percentage in each bin</li>
<li>production has another percentage in each bin</li>
<li>PSI combines those mismatches into one score</li>
</ul>
</section>
