</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="6" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="parameters-vs-hyperparameters">Parameters vs Hyperparameters</h1>
<p>Think of baking a cake:</p>
<ul>
<li><strong>Recipe temperature</strong> (180°C) = <strong>Hyperparameter</strong> — you set this <em>before</em> baking</li>
<li><strong>How brown the top gets</strong> = <strong>Parameter</strong> — determined <em>during</em> baking by the oven</li>
</ul>
<table>
<thead>
<tr>
<th></th>
<th>Parameters</th>
<th>Hyperparameters</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Set by</strong></td>
<td>Training algorithm</td>
<td>You (the engineer)</td>
</tr>
<tr>
<td><strong>When</strong></td>
<td>During <code>model.fit()</code></td>
<td>Before <code>model.fit()</code></td>
</tr>
<tr>
<td><strong>Examples</strong></td>
<td>Weights, coefficients</td>
<td>max_depth, n_estimators</td>
</tr>
</tbody>
</table>
<p><strong>Parameters</strong> are learned from data. <strong>Hyperparameters</strong> are choices you make.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="7" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="motivating-example-which-polynomial-degree">Motivating Example: Which Polynomial Degree?</h1>
<p>Remember fitting polynomials from Week 7? Which degree should we pick?</p>
<p><img src="images/week08/polynomial_cv_scores.png" alt="" style="width:800px;" /></p>
<p>We tried degrees 1-15 and used <strong>cross-validation</strong> to evaluate each. Degree 3 or 4 wins.</p>
<p>But we had to try all 15 to find out. <strong>Can we be smarter?</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="8" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="wait--this-is-an-optimization-problem">Wait — This Is an Optimization Problem!</h1>
<p>Flip the error curve upside down → now we're <strong>maximizing</strong> a score:</p>
<p><img src="images/week08/tuning_as_optimization.png" alt="" style="width:800px;" /></p>
<p><strong>Hyperparameter tuning = finding the peak of an unknown, expensive function.</strong></p>
<p>Each evaluation requires a full cross-validation — that's expensive!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="9" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="the-gold-mining-analogy">The Gold Mining Analogy</h1>
<p>Imagine you're <strong>prospecting for gold</strong> along a 1-kilometer stretch of land.</p>
<ul>
<li>Each drill costs <strong>₹10,000</strong> (= one cross-validation run)</li>
<li>You can't see underground (the function is <strong>unknown</strong>)</li>
<li>You want to find the <strong>richest deposit</strong> with as few drills as possible</li>
</ul>
<p><strong>How would you search?</strong></p>
<p><em>Analogy from: <a href="https://distill.pub/2020/bayesian-optimization/">Exploring Bayesian Optimization</a> (Agnihotri &amp; Batra, Distill, 2020)</em></p>
<blockquote>
<p>Fun fact: One of the first uses of Gaussian Processes was by Prof. Krige to model gold concentrations in South African mines. The technique is still called <strong>&quot;kriging&quot;</strong> in geostatistics!</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="10" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="the-gold-field-whats-hidden-underground">The Gold Field (What's Hidden Underground)</h1>
<p><img src="images/week08/gold_mining_1d.png" alt="" style="width:900px;" /></p>
<p><strong>Left</strong>: The true gold deposits (hidden from us). Two rich veins exist.<br />
<strong>Middle</strong>: After 3 drills — we have some information but don't know where the peak is.<br />
<strong>Right</strong>: A smart 4th drill near the best result finds the jackpot!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="11" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="three-strategies-for-finding-gold">Three Strategies for Finding Gold</h1>
<table>
<thead>
<tr>
<th>Strategy</th>
<th>How It Works</th>
<th>Smart?</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Grid Search</strong></td>
<td>Drill every 100m, evenly spaced</td>
<td>No — wastes drills in barren areas</td>
</tr>
<tr>
<td><strong>Random Search</strong></td>
<td>Drill at random locations</td>
<td>No — but covers more ground</td>
</tr>
<tr>
<td><strong>Bayesian Optimization</strong></td>
<td>Look at past drills, build a map, drill where gold is likely</td>
<td>Yes!</td>
</tr>
</tbody>
</table>
<p>Let's explore each one.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="12" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="strategy-1-grid-search">Strategy 1: Grid Search</h1>
<p><em>Drill at evenly spaced locations</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="13" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="grid-search-the-idea">Grid Search: The Idea</h1>
<p>Try <strong>every combination</strong> of hyperparameter values on a regular grid.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">best_score, best_params = <span class="hljs-number">0</span>, {}

<span class="hljs-keyword">for</span> n_est <span class="hljs-keyword">in</span> [<span class="hljs-number">50</span>, <span class="hljs-number">100</span>, <span class="hljs-number">200</span>]:
    <span class="hljs-keyword">for</span> depth <span class="hljs-keyword">in</span> [<span class="hljs-number">5</span>, <span class="hljs-number">10</span>, <span class="hljs-number">15</span>]:
        <span class="hljs-keyword">for</span> leaf <span class="hljs-keyword">in</span> [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">5</span>]:
            model = RandomForestClassifier(
                n_estimators=n_est, max_depth=depth,
                min_samples_leaf=leaf)
            score = cross_val_score(model, X, y, cv=<span class="hljs-number">5</span>).mean()
            <span class="hljs-keyword">if</span> score &gt; best_score:
                best_score = score
                best_params = {<span class="hljs-string">&#x27;n_estimators&#x27;</span>: n_est,
                    <span class="hljs-string">&#x27;max_depth&#x27;</span>: depth, <span class="hljs-string">&#x27;min_samples_leaf&#x27;</span>: leaf}
</code></pre>
<blockquote>
<p>Notebook Part 1: Implement this manual grid search.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="14" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="grid-search-the-explosion-problem">Grid Search: The Explosion Problem</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>3 × 3 × 3 = 27 combos × 5 folds = 135 fits!
</code></pre>
<p>Every combo gets a full 5-fold CV. That's 135 times we train a model.</p>
<p><strong>Add two more parameters (5 values each):</strong></p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="15" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="grid-search-the-sklearn-way">Grid Search: The sklearn Way</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sklearn.model_selection <span class="hljs-keyword">import</span> GridSearchCV

param_grid = {
    <span class="hljs-string">&#x27;n_estimators&#x27;</span>: [<span class="hljs-number">50</span>, <span class="hljs-number">100</span>, <span class="hljs-number">200</span>],
    <span class="hljs-string">&#x27;max_depth&#x27;</span>: [<span class="hljs-number">5</span>, <span class="hljs-number">10</span>, <span class="hljs-number">15</span>, <span class="hljs-literal">None</span>],
    <span class="hljs-string">&#x27;min_samples_leaf&#x27;</span>: [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">5</span>]
}

grid = GridSearchCV(
    RandomForestClassifier(), param_grid,
    cv=<span class="hljs-number">5</span>, scoring=<span class="hljs-string">&#x27;accuracy&#x27;</span>, n_jobs=-<span class="hljs-number">1</span>)  <span class="hljs-comment"># use all CPU cores</span>
grid.fit(X, y)

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Best params: <span class="hljs-subst">{grid.best_params_}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Best score:  <span class="hljs-subst">{grid.best_score_:<span class="hljs-number">.3</span>f}</span>&quot;</span>)
</code></pre>
<p>Same nested for-loops, but sklearn handles CV, scoring, and results tracking.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="16" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="grid-search-the-big-problem">Grid Search: The Big Problem</h1>
<p><img src="images/week08/grid_vs_random_search.png" alt="" style="width:800px;" /></p>
<p>Grid search only explores <strong>5 unique values</strong> of the important parameter — even with 25 evaluations!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="17" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="strategy-2-random-search">Strategy 2: Random Search</h1>
<p><em>Drill at random locations</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="18" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="random-search-better-coverage">Random Search: Better Coverage</h1>
<p><img src="images/week08/grid_vs_random_search.png" alt="" style="width:800px;" /></p>
<p>Random search explores <strong>25 unique values</strong> of the important parameter with the same budget!</p>
<p><strong>Key insight</strong> (Bergstra &amp; Bengio, 2012): Not all hyperparameters matter equally. Grid wastes evaluations varying <em>unimportant</em> parameters.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="19" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="random-search-in-code">Random Search in Code</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sklearn.model_selection <span class="hljs-keyword">import</span> RandomizedSearchCV
<span class="hljs-keyword">from</span> scipy.stats <span class="hljs-keyword">import</span> randint, uniform

search = RandomizedSearchCV(
    RandomForestClassifier(),
    {<span class="hljs-string">&#x27;n_estimators&#x27;</span>: randint(<span class="hljs-number">50</span>, <span class="hljs-number">500</span>),
     <span class="hljs-string">&#x27;max_depth&#x27;</span>: randint(<span class="hljs-number">3</span>, <span class="hljs-number">30</span>),
     <span class="hljs-string">&#x27;min_samples_leaf&#x27;</span>: randint(<span class="hljs-number">1</span>, <span class="hljs-number">20</span>),
     <span class="hljs-string">&#x27;max_features&#x27;</span>: uniform(<span class="hljs-number">0.1</span>, <span class="hljs-number">0.8</span>)},
    n_iter=<span class="hljs-number">60</span>, cv=<span class="hljs-number">5</span>, n_jobs=-<span class="hljs-number">1</span>, random_state=<span class="hljs-number">42</span>)
search.fit(X, y)
</code></pre>
<p><strong>60 random trials often beats a full grid of 900+ combos.</strong></p>
<p><strong>Practical rule</strong>: Grid for 2-3 params, random for everything else.</p>
<blockquote>
<p>Notebook Part 1: Compare Grid vs Random search on the same budget.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="20" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="but-both-are-still-blind">But Both Are Still Blind!</h1>
<p>Grid and random search share a fundamental flaw:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Trial 1:  depth=5   → score = 78%
Trial 2:  depth=20  → score = 72%
Trial 3:  depth=10  → score = 83%    ← best so far!
Trial 4:  depth=3   → score = 70%    ← didn't learn from trial 3!
</code></pre>
<p><strong>Neither method uses past results to decide where to look next.</strong></p>
<p>Back to gold mining: if drill #3 struck gold, wouldn't you drill <strong>nearby</strong> next?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="21" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="strategy-3-bayesian-optimization">Strategy 3: Bayesian Optimization</h1>
<p><em>Use past results to decide what to try next</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="22" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="the-key-idea">The Key Idea</h1>
<p>Bayesian optimization has a simple loop:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. Drill a few random holes       (just like random search)
2. Build a MAP of the gold field   (from results so far)
3. Use the map to pick the most promising next drill spot
4. Drill, update the map, repeat
</code></pre>
<p>The map gets better with each drill → <strong>the search gets smarter over time</strong>.</p>
<p>Think of it like Battleship: you don't fire randomly after a &quot;Hit&quot; — you fire <em>near</em> the hit!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="23" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="our-initial-map-before-any-drills">Our Initial Map (Before Any Drills)</h1>
<p>Before any evaluations, we know nothing. Our map is a <strong>flat guess with wide uncertainty</strong>:</p>
<p><img src="images/week08/distill_prior.svg" alt="" style="width:700px;" /></p>
<ul>
<li><strong>Dark line</strong>: our best guess (the mean) — flat, because we have no information</li>
<li><strong>Shaded band</strong>: how unsure we are — wide everywhere</li>
</ul>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="24" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="our-updated-map-after-a-few-drills">Our Updated Map (After a Few Drills)</h1>
<p>After a few evaluations, the map <strong>learns</strong> the landscape:</p>
<p><img src="images/week08/distill_posterior.svg" alt="" style="width:700px;" /></p>
<ul>
<li>Near drill sites: uncertainty <strong>shrinks</strong> (we know what's there)</li>
<li>Far from drill sites: uncertainty <strong>stays wide</strong> (unexplored territory)</li>
</ul>
<p>The map gives us both a <strong>best guess</strong> and <strong>how confident</strong> we are at every point.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="25" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="the-map-a-curve-with-error-bars">The Map: A Curve with Error Bars</h1>
<p>The map (technically called a <strong>Gaussian Process</strong>) is simple:</p>
<ul>
<li><strong>Best guess</strong> (mean, μ): &quot;I think there's <em>this much</em> gold here&quot;</li>
<li><strong>Confidence</strong> (uncertainty, σ): &quot;But I could be off by <em>this much</em>&quot;</li>
</ul>
<p>Where we've drilled → small error bars (confident).<br />
Where we haven't → large error bars (uncertain).</p>
<p><strong>You don't need to understand the math</strong> — just think of it as a curve with error bars that gets more accurate with each data point.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="26" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="where-should-we-drill-next">Where Should We Drill Next?</h1>
<p>We want to drill where gold is likely <strong>richest</strong>. But we must balance:</p>
<p><strong>Exploitation</strong>: drill near the current best hit</p>
<ul>
<li><em>&quot;The richest vein might be right next to our best drill!&quot;</em></li>
</ul>
<p><strong>Exploration</strong>: drill where we're most uncertain</p>
<ul>
<li><em>&quot;There might be an even richer vein somewhere we haven't looked!&quot;</em></li>
</ul>
<p>Think of <strong>Battleship</strong>: after a hit at C4, do you fire at C5 (exploit) or try the far corner (explore)?</p>
<p><strong>Good search = balance both.</strong> This is the <strong>exploration-exploitation tradeoff</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="27" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="expected-improvement-how-promising-is-this-spot">Expected Improvement: &quot;How Promising Is This Spot?&quot;</h1>
<p>BayesOpt uses a scoring function called <strong>Expected Improvement (EI)</strong> to decide where to drill next:</p>
<blockquote>
<p>&quot;On average, how much better than our current best could this point be?&quot;</p>
</blockquote>
<p>Think of it as combining two questions:</p>
<ul>
<li><strong>&quot;Is there likely gold here?&quot;</strong> (high mean → probably yes)</li>
<li><strong>&quot;Could there be a surprise?&quot;</strong> (high uncertainty → maybe!)</li>
</ul>
<p>EI is highest where both answers are &quot;yes&quot; — that's where we drill next.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="28" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="watching-bayesopt-work-iteration-0">Watching BayesOpt Work: Iteration 0</h1>
<p><img src="images/week08/distill_ei_0.png" alt="" style="width:700px;" /></p>
<p><strong>Top</strong>: Our map (best guess ± uncertainty) with a few initial drill results.<br />
<strong>Bottom</strong>: Expected Improvement — the peak shows <strong>where to drill next</strong>.</p>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="29" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="watching-bayesopt-work-iteration-3">Watching BayesOpt Work: Iteration 3</h1>
<p><img src="images/week08/distill_ei_3.png" alt="" style="width:700px;" /></p>
<p>After 3 more drills, the map is <strong>zeroing in</strong> on the rich vein. Uncertainty shrinks where we've drilled, and EI shifts to new areas.</p>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="30" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="watching-bayesopt-work-iteration-9">Watching BayesOpt Work: Iteration 9</h1>
<p><img src="images/week08/distill_ei_9.png" alt="" style="width:700px;" /></p>
<p>After 9 drills, we've <strong>found the richest deposit</strong>! The map closely matches reality near the peak. EI is nearly zero — we're confident we've found the best.</p>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="31" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="going-to-2d-and-beyond">Going to 2D (and Beyond)</h1>
<p><em>Real gold fields — and hyperparameter spaces — have multiple dimensions</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="32" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="gold-mining-in-2d">Gold Mining in 2D</h1>
<p>Real tuning has <strong>multiple hyperparameters</strong> — like searching a 2D gold field:</p>
<p><img src="images/week08/gold_mining_2d.png" alt="" style="width:900px;" /></p>
<p><strong>Left</strong>: Grid search — regular spacing, misses peaks between grid points.<br />
<strong>Middle</strong>: Random search — better coverage, but still blind.<br />
<strong>Right</strong>: Bayesian optimization — learns to focus on promising regions.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="33" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="bayesopt-in-2d-starting-out">BayesOpt in 2D: Starting Out</h1>
<p><img src="images/week08/distill_ei3d_0.png" alt="" style="width:500px;" /></p>
<p>The map and EI work the same way in 2D — just harder to visualize. The EI surface shows a <strong>landscape of promising regions</strong> to explore.</p>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="34" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="bayesopt-in-2d-after-9-iterations">BayesOpt in 2D: After 9 Iterations</h1>
<p><img src="images/week08/distill_ei3d_9.png" alt="" style="width:500px;" /></p>
<p>After 9 drills, the map has explored the field and focused on the peak. The EI surface has flattened — the search is converging.</p>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="35" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="what-about-5-10-or-20-dimensions">What About 5, 10, or 20 Dimensions?</h1>
<p>In real ML, you might tune many knobs at once:</p>
<ul>
<li><strong>Random Forest</strong>: 4-6 knobs (n_estimators, max_depth, min_samples_leaf, max_features, ...)</li>
<li><strong>Gradient Boosting</strong>: 6-8 knobs (learning_rate, n_estimators, max_depth, subsample, ...)</li>
<li><strong>Neural Network</strong>: 10-20+ knobs (lr, batch_size, layers, dropout, optimizer, ...)</li>
</ul>
<p>The same BayesOpt idea works — we just can't visualize it. That's why we use <strong>libraries like Optuna</strong> that handle the math for us.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="36" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="bayesopt-vs-active-learning">BayesOpt vs Active Learning</h1>
<p><em>Same tool, different goal</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="37" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="you-already-know-something-like-this">You Already Know Something Like This!</h1>
<p>Remember <strong>active learning</strong> from Weeks 4-5? It also picks &quot;where to sample next&quot; using uncertainty.</p>
<p>Both use a <strong>map with uncertainty</strong>. But their <strong>goals differ</strong>:</p>
<table>
<thead>
<tr>
<th></th>
<th>Active Learning (Weeks 4-5)</th>
<th>Bayesian Optimization (Today)</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Goal</strong></td>
<td>Learn the function <strong>everywhere</strong></td>
<td>Find the <strong>maximum</strong></td>
</tr>
<tr>
<td><strong>Strategy</strong></td>
<td>Sample where <strong>most uncertain</strong></td>
<td>Sample where score likely <strong>highest</strong></td>
</tr>
<tr>
<td><strong>Use case</strong></td>
<td>Pick the most informative data to label</td>
<td>Find the best hyperparameters</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="38" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="active-learning-spreading-out-evenly">Active Learning: Spreading Out Evenly</h1>
<p><img src="images/week08/distill_active_gp_0.png" alt="" style="width:500px;" /></p>
<p>Active learning picks the point with the <strong>widest uncertainty band</strong> — it wants to reduce uncertainty everywhere, not just near the peak.</p>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="39" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="active-learning-after-5-samples">Active Learning: After 5 Samples</h1>
<p><img src="images/week08/distill_active_gp_5.png" alt="" style="width:500px;" /></p>
<p>After 5 samples, uncertainty is <strong>evenly reduced everywhere</strong>. Active learning has learned the function broadly — but hasn't focused on the peak.</p>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="40" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="active-learning-after-9-samples">Active Learning: After 9 Samples</h1>
<p><img src="images/week08/distill_active_gp_9.png" alt="" style="width:500px;" /></p>
<p>After 9 samples, active learning knows the function well <strong>everywhere</strong> — but it spent samples in boring flat regions too.</p>
<p><strong>BayesOpt would have spent those samples near the peak instead!</strong></p>
<p><em>Source: <a href="https://distill.pub/2020/bayesian-optimization/">distill.pub/2020/bayesian-optimization</a></em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="41" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="side-by-side-al-vs-bayesopt">Side by Side: AL vs BayesOpt</h1>
<p><strong>Same underlying map (GP with uncertainty), different question asked.</strong></p>
<ul>
<li>
<p>Active Learning asks: <em>&quot;Where am I most uncertain?&quot;</em><br />
→ Great for <strong>labeling data</strong> (want diverse coverage)</p>
</li>
<li>
<p>BayesOpt asks: <em>&quot;Where might the score be highest?&quot;</em><br />
→ Great for <strong>tuning hyperparameters</strong> (want the best)</p>
</li>
</ul>
<p>The connection: what you learned in Weeks 4-5 about smart data labeling is the <strong>same math</strong> that powers smart hyperparameter tuning!</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="42" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="using-bayesopt-in-practice-optuna">Using BayesOpt in Practice: Optuna</h1>
<p><em>BayesOpt you can actually use</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="43" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="optuna-the-concept">Optuna: The Concept</h1>
<p>You define the knobs. Optuna picks smart values based on past trials.</p>
<table>
<thead>
<tr>
<th>Gold mining concept</th>
<th>Optuna equivalent</th>
</tr>
</thead>
<tbody>
<tr>
<td>One drill location</td>
<td><code>trial</code></td>
</tr>
<tr>
<td>How much gold found</td>
<td><code>objective(trial)</code> — you write this</td>
</tr>
<tr>
<td>The map of all drills</td>
<td><code>study</code></td>
</tr>
<tr>
<td>Richest spot found</td>
<td><code>study.best_params</code></td>
</tr>
</tbody>
</table>
<blockquote>
<p>Notebook Part 2: Visualize how Optuna learns from past trials.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="44" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="optuna-code">Optuna: Code</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> optuna

<span class="hljs-keyword">def</span> <span class="hljs-title function_">objective</span>(<span class="hljs-params">trial</span>):
    params = {
        <span class="hljs-string">&#x27;n_estimators&#x27;</span>: trial.suggest_int(<span class="hljs-string">&#x27;n_estimators&#x27;</span>, <span class="hljs-number">50</span>, <span class="hljs-number">500</span>),
        <span class="hljs-string">&#x27;max_depth&#x27;</span>: trial.suggest_int(<span class="hljs-string">&#x27;max_depth&#x27;</span>, <span class="hljs-number">3</span>, <span class="hljs-number">30</span>),
        <span class="hljs-string">&#x27;min_samples_leaf&#x27;</span>: trial.suggest_int(<span class="hljs-string">&#x27;min_samples_leaf&#x27;</span>, <span class="hljs-number">1</span>, <span class="hljs-number">20</span>),
    }
    model = RandomForestClassifier(**params)
    <span class="hljs-keyword">return</span> cross_val_score(model, X, y, cv=<span class="hljs-number">5</span>).mean()

study = optuna.create_study(direction=<span class="hljs-string">&#x27;maximize&#x27;</span>)
study.optimize(objective, n_trials=<span class="hljs-number">100</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Best: <span class="hljs-subst">{study.best_value:<span class="hljs-number">.3</span>f}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Params: <span class="hljs-subst">{study.best_params}</span>&quot;</span>)
</code></pre>
<blockquote>
<p>Notebook Part 2: Full Optuna tuning with visualization.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="45" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="optuna-pruning-stop-bad-trials-early">Optuna: Pruning (Stop Bad Trials Early)</h1>
<p>Some trials are clearly losing early — <strong>stop them and move on</strong>.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> step <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(max_steps):
    score = train_one_step_and_validate()
    trial.report(score, step)      <span class="hljs-comment"># tell Optuna how it&#x27;s going</span>
    <span class="hljs-keyword">if</span> trial.should_prune():
        <span class="hljs-keyword">raise</span> optuna.TrialPruned() <span class="hljs-comment"># give up on this trial</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Trial 1:  step 1=72%, step 2=75%, step 3=78% ... step 50=84%  ✓
Trial 2:  step 1=45%, step 2=46%  ← PRUNED (clearly bad)
Trial 3:  step 1=70%, step 2=74%, step 3=77% ... step 50=83%  ✓
</code></pre>
<p><strong>Saved 48 steps of compute on Trial 2!</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="46" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="comparison-all-three-strategies">Comparison: All Three Strategies</h1>
<table>
<thead>
<tr>
<th></th>
<th>Grid</th>
<th>Random</th>
<th>BayesOpt (Optuna)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Uses past results?</td>
<td>No</td>
<td>No</td>
<td><strong>Yes</strong></td>
</tr>
<tr>
<td>Intelligence</td>
<td>None</td>
<td>None</td>
<td>High</td>
</tr>
<tr>
<td>Efficiency</td>
<td>Low</td>
<td>Medium</td>
<td><strong>High</strong></td>
</tr>
<tr>
<td>Scales to many params</td>
<td>No</td>
<td>Yes</td>
<td>Yes</td>
</tr>
<tr>
<td>Pruning support</td>
<td>No</td>
<td>No</td>
<td><strong>Yes</strong></td>
</tr>
</tbody>
</table>
<p><strong>When to use what:</strong></p>
<ul>
<li><strong>Grid</strong>: 2-3 params, quick exploration</li>
<li><strong>Random</strong>: 4+ params, you want simplicity</li>
<li><strong>Optuna</strong>: serious tuning, expensive evaluations</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="47" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="a-note-on-best_score_">A Note on <code>best_score_</code></h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">grid = GridSearchCV(model, params, cv=<span class="hljs-number">5</span>)
grid.fit(X, y)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Best score: <span class="hljs-subst">{grid.best_score_:<span class="hljs-number">.3</span>f}</span>&quot;</span>)  <span class="hljs-comment"># Slightly optimistic!</span>
</code></pre>
<p><strong>Why optimistic?</strong> You tried many configs and picked the best. By definition, it's the luckiest.</p>
<p>In practice, this bias is small. Just be aware: <strong><code>best_score_</code> is a bit better than reality.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="48" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="optional-advanced-nested-cross-validation">Optional Advanced: Nested Cross-Validation</h1>
<p>For research papers, separate tuning from evaluation using <strong>nested CV</strong>:</p>
<p><img src="images/week07/nested_cross_validation.png" alt="" style="width:550px;" /></p>
<ul>
<li><strong>Inner loop</strong> (3-fold): Tunes hyperparameters</li>
<li><strong>Outer loop</strong> (5-fold): Evaluates the tuning process on truly held-out data</li>
</ul>
<p><em>Not required for course projects — just good to know exists.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="49" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="we-just-generated-100-experiments">We Just Generated 100+ Experiments...</h1>
<p>After running Grid Search, Random Search, and Optuna, you might have <strong>hundreds of results</strong>.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Trial  1: n_est=50,  depth=5,  leaf=1   → 78.2%
Trial  2: n_est=200, depth=10, leaf=5   → 83.1%
...
Trial 99: n_est=150, depth=12, leaf=2   → 85.7%
Trial 100: Wait, which one was the best again??
</code></pre>
<p>We need a way to <strong>track</strong> all these experiments. And we need to <strong>reproduce</strong> the best one.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="50" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="part-2-experiment-tracking">Part 2: Experiment Tracking</h1>
<p><em>Taming the chaos of 100+ experiments</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="51" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="the-problem-which-run-was-that">The Problem: &quot;Which Run Was That?&quot;</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Monday:  lr=0.01, depth=10  → 83.2%</span>
<span class="hljs-comment"># Tuesday: lr=0.001, depth=15 → 84.1%</span>
<span class="hljs-comment"># Wednesday: ... was Tuesday depth=15 or 20?</span>
<span class="hljs-comment"># Thursday: &quot;I think the best was Tuesday&#x27;s run. Probably.&quot;</span>
</code></pre>
<p>Sound familiar? You need a system that <strong>automatically records</strong> every experiment.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="52" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="what-should-be-tracked">What Should Be Tracked?</h1>
<table>
<thead>
<tr>
<th>Category</th>
<th>Examples</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Config</strong></td>
<td>Hyperparameters, model type, dataset version</td>
</tr>
<tr>
<td><strong>Metrics</strong></td>
<td>Accuracy, loss, F1 — per step and final</td>
</tr>
<tr>
<td><strong>Artifacts</strong></td>
<td>Model weights, plots, confusion matrices</td>
</tr>
<tr>
<td><strong>Environment</strong></td>
<td>Python version, package versions, git hash</td>
</tr>
<tr>
<td><strong>Metadata</strong></td>
<td>Run name, tags, notes, timestamp</td>
</tr>
</tbody>
</table>
<p>Tracking this manually in a spreadsheet breaks down after 10 runs.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="53" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="trackio-local-first-experiment-tracking">Trackio: Local-First Experiment Tracking</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> trackio

trackio.init(project=<span class="hljs-string">&quot;netflix-predictor&quot;</span>, config={
    <span class="hljs-string">&quot;learning_rate&quot;</span>: <span class="hljs-number">0.01</span>,
    <span class="hljs-string">&quot;n_estimators&quot;</span>: <span class="hljs-number">100</span>,
    <span class="hljs-string">&quot;seed&quot;</span>: <span class="hljs-number">42</span>})

model = train(trackio.config)           <span class="hljs-comment"># your training code</span>
trackio.log({<span class="hljs-string">&quot;accuracy&quot;</span>: accuracy,      <span class="hljs-comment"># log final metrics</span>
             <span class="hljs-string">&quot;f1&quot;</span>: f1_score})

trackio.finish()
</code></pre>
<p><strong>Trackio</strong> (Hugging Face): free, local-first, W&amp;B-compatible API. Three calls: <code>init</code>, <code>log</code>, <code>finish</code>.</p>
<blockquote>
<p>Notebook Part 8: Log your first sklearn experiment.</p>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="54" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="trackio-logging-over-time">Trackio: Logging Over Time</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">trackio.init(project=<span class="hljs-string">&quot;tuning-demo&quot;</span>, config={
    <span class="hljs-string">&quot;model&quot;</span>: <span class="hljs-string">&quot;RandomForest&quot;</span>, <span class="hljs-string">&quot;n_estimators_range&quot;</span>: <span class="hljs-string">&quot;50-300&quot;</span>})

<span class="hljs-keyword">for</span> n_est <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">50</span>, <span class="hljs-number">301</span>, <span class="hljs-number">10</span>):
    model = RandomForestClassifier(n_estimators=n_est)
    score = cross_val_score(model, X, y, cv=<span class="hljs-number">5</span>).mean()
    trackio.log({<span class="hljs-string">&quot;n_estimators&quot;</span>: n_est, <span class="hljs-string">&quot;cv_accuracy&quot;</span>: score})

trackio.finish()
</code></pre>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="57" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="experiment-tracking-best-practices">Experiment Tracking Best Practices</h1>
<ol>
<li><strong>Log everything</strong> — storage is cheap, hindsight is expensive</li>
<li><strong>Use meaningful run names</strong> — <code>lr0.01_depth10</code> not <code>run_42</code></li>
<li><strong>Tag experiments</strong> — <code>baseline</code>, <code>augmented</code>, <code>final</code></li>
<li><strong>Save the model file</strong> — not just the metrics</li>
<li><strong>Record the git hash</strong> — know which code produced results</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="58" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="59" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="part-2-%E2%86%92-part-3-tracking-tells-you-what-happened-but-can-you-redo-it">Part 2 → Part 3: Tracking Tells You <em>What</em> Happened. But Can You <em>Redo</em> It?</h1>
<p>Experiment tracking records all your runs. But what if you re-run the best one and get a <strong>different result</strong>?</p>
<table>
<thead>
<tr>
<th>Part 2: Tracking</th>
<th>Part 3: Reproducibility</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;Which run had 85.7%?&quot;</td>
<td>&quot;Can I get 85.7% again?&quot;</td>
</tr>
<tr>
<td>Records the <em>what</em></td>
<td>Ensures the <em>how</em> is repeatable</td>
</tr>
</tbody>
</table>
<p>Both are about <strong>trust</strong> — tracking trusts your records, reproducibility trusts the process.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="60" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="part-3-reproducibility">Part 3: Reproducibility</h1>
<p><em>Making experiments repeatable</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="61" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="why-reproducibility-matters">Why Reproducibility Matters</h1>
<p>Without it:</p>
<ul>
<li><em>&quot;I got 92% accuracy but can't reproduce it&quot;</em></li>
<li><em>&quot;My colleague gets different results on the same code&quot;</em></li>
<li><em>&quot;It worked yesterday but not today&quot;</em></li>
</ul>
<p>With it:</p>
<ul>
<li>Every experiment can be <strong>exactly reproduced</strong></li>
<li>Results are <strong>trustworthy</strong> and verifiable</li>
<li>Papers and reports are <strong>credible</strong></li>
</ul>
<p>Reproducibility is <strong>not optional</strong> — it's what separates engineering from guessing.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="62" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="sklearn-easy-reproducibility">sklearn: Easy Reproducibility</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># One parameter is enough</span>
model = RandomForestClassifier(n_estimators=<span class="hljs-number">100</span>, random_state=<span class="hljs-number">42</span>)
</code></pre>
<p>Every run with <code>random_state=42</code> gives the <strong>exact same result</strong>.</p>
<p>sklearn uses NumPy's random number generator, which is fully deterministic given a seed.</p>
<p><strong>That's it for sklearn!</strong> Set the seed, and you're done.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="63" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="optional-pytorch-seeds-arent-enough">Optional: PyTorch Seeds Aren't Enough</h1>
<p>PyTorch has <strong>many sources of randomness</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> torch, random, numpy <span class="hljs-keyword">as</span> np, os

<span class="hljs-keyword">def</span> <span class="hljs-title function_">set_seed</span>(<span class="hljs-params">seed=<span class="hljs-number">42</span></span>):
    random.seed(seed)                          <span class="hljs-comment"># Python</span>
    np.random.seed(seed)                       <span class="hljs-comment"># NumPy</span>
    torch.manual_seed(seed)                    <span class="hljs-comment"># PyTorch CPU</span>
    torch.cuda.manual_seed_all(seed)           <span class="hljs-comment"># PyTorch GPU</span>
    torch.backends.cudnn.deterministic = <span class="hljs-literal">True</span>  <span class="hljs-comment"># cuDNN</span>
    torch.backends.cudnn.benchmark = <span class="hljs-literal">False</span>     <span class="hljs-comment"># cuDNN</span>
    torch.use_deterministic_algorithms(<span class="hljs-literal">True</span>)   <span class="hljs-comment"># Error if non-deterministic op used</span>
    os.environ[<span class="hljs-string">&quot;CUBLAS_WORKSPACE_CONFIG&quot;</span>] = <span class="hljs-string">&quot;:4096:8&quot;</span>
</code></pre>
<p><strong>Miss any one of these → non-reproducible results.</strong></p>
<blockquote>
<p>Notebook Part 7: Test what happens when you skip each seed setting.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="64" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="multi-seed-reporting">Multi-Seed Reporting</h1>
<p>Full determinism is not always practical. Report variance instead:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">results = []
<span class="hljs-keyword">for</span> seed <span class="hljs-keyword">in</span> [<span class="hljs-number">42</span>, <span class="hljs-number">123</span>, <span class="hljs-number">456</span>, <span class="hljs-number">789</span>, <span class="hljs-number">1024</span>]:
    set_seed(seed)
    acc = train_and_evaluate()
    results.append(acc)

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Accuracy: <span class="hljs-subst">{np.mean(results):<span class="hljs-number">.3</span>f}</span> ± <span class="hljs-subst">{np.std(results):<span class="hljs-number">.3</span>f}</span>&quot;</span>)
</code></pre>
<p><strong>More informative than a single deterministic result.</strong></p>
<p>Papers increasingly require multi-seed results (NeurIPS, ICML checklist).</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="65" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="part-3-%E2%86%92-part-4-now-that-we-can-trust-our-results">Part 3 → Part 4: Now That We Can Trust Our Results...</h1>
<p>We can now <strong>find</strong> the best hyperparameters (Part 1), <strong>track</strong> all experiments (Part 2), and <strong>reproduce</strong> the best one (Part 3).</p>
<p>But we still manually chose Random Forest and tuned it. What if the best model was actually Gradient Boosting? Or SVM?</p>
<p><strong>What if we automated the entire model selection + tuning process?</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="66" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="part-4-automl">Part 4: AutoML</h1>
<p><em>What if the computer did all of this for you?</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="67" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="the-automl-idea">The AutoML Idea</h1>
<p>Instead of manually choosing one model and tuning it:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>For each model family (LogReg, KNN, SVM, RF, GB, ...):
    For each hyperparameter combination:
        Run cross-validation
    Keep the best config

Return the overall best model + hyperparameters
</code></pre>
<p><strong>AutoML = try everything, keep the winner.</strong></p>
<p>Tools like AutoGluon, FLAML, and auto-sklearn automate this entire process.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="68" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="diy-automl-pure-sklearn">DIY AutoML (Pure sklearn)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">model_configs = {
    <span class="hljs-string">&#x27;LogReg&#x27;</span>: (LogisticRegression(), {<span class="hljs-string">&#x27;C&#x27;</span>: [<span class="hljs-number">0.01</span>, <span class="hljs-number">0.1</span>, <span class="hljs-number">1</span>, <span class="hljs-number">10</span>]}),
    <span class="hljs-string">&#x27;KNN&#x27;</span>:    (KNeighborsClassifier(), {<span class="hljs-string">&#x27;n_neighbors&#x27;</span>: [<span class="hljs-number">3</span>, <span class="hljs-number">5</span>, <span class="hljs-number">11</span>]}),
    <span class="hljs-string">&#x27;SVM&#x27;</span>:    (SVC(), {<span class="hljs-string">&#x27;C&#x27;</span>: [<span class="hljs-number">0.1</span>, <span class="hljs-number">1</span>, <span class="hljs-number">10</span>], <span class="hljs-string">&#x27;kernel&#x27;</span>: [<span class="hljs-string">&#x27;rbf&#x27;</span>, <span class="hljs-string">&#x27;poly&#x27;</span>]}),
    <span class="hljs-string">&#x27;RF&#x27;</span>:     (RandomForestClassifier(), {<span class="hljs-string">&#x27;n_estimators&#x27;</span>: [<span class="hljs-number">100</span>, <span class="hljs-number">200</span>]}),
    <span class="hljs-string">&#x27;GB&#x27;</span>:     (GradientBoostingClassifier(), {<span class="hljs-string">&#x27;learning_rate&#x27;</span>: [<span class="hljs-number">0.01</span>, <span class="hljs-number">0.1</span>]}),
    <span class="hljs-string">&#x27;ET&#x27;</span>:     (ExtraTreesClassifier(), {<span class="hljs-string">&#x27;n_estimators&#x27;</span>: [<span class="hljs-number">100</span>, <span class="hljs-number">200</span>]}),
}

results = {}
<span class="hljs-keyword">for</span> name, (model, params) <span class="hljs-keyword">in</span> model_configs.items():
    gs = GridSearchCV(model, params, cv=<span class="hljs-number">5</span>, n_jobs=-<span class="hljs-number">1</span>)
    gs.fit(X, y)
    results[name] = gs.best_score_
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{name:12s}</span>  Best CV = <span class="hljs-subst">{gs.best_score_:<span class="hljs-number">.4</span>f}</span>&quot;</span>)
</code></pre>
<blockquote>
<p>Notebook Part 5: Full DIY AutoML with multiple model families.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="69" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="diy-automl-what-you-get">DIY AutoML: What You Get</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Model               Combos  Best CV   Time
==============================================
Logistic Regression      4   0.8575   0.3s
KNN                      3   0.9050   0.5s
SVM                      6   0.9325   1.2s
Random Forest            2   0.9338   4.1s

<p><strong>No extra packages.</strong> Just loop over model families with their grids.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="70" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="the-complete-tuning-workflow">The Complete Tuning Workflow</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Step 1: Know your floor (dummy baseline)</span>
dummy = cross_val_score(DummyClassifier(), X, y, cv=<span class="hljs-number">5</span>).mean()

<span class="hljs-comment"># Step 2: Simple interpretable model</span>
lr = cross_val_score(LogisticRegression(), X, y, cv=<span class="hljs-number">5</span>).mean()

<span class="hljs-comment"># Step 3: Strong model with tuning</span>
search = RandomizedSearchCV(
    RandomForestClassifier(), rf_params, n_iter=<span class="hljs-number">60</span>, cv=<span class="hljs-number">5</span>, n_jobs=-<span class="hljs-number">1</span>)
search.fit(X, y)

<span class="hljs-comment"># Step 4: AutoML ceiling — loop over model families (see DIY AutoML)</span>
</code></pre>
<p><strong>If LogReg is close to the best → deploy LogReg (interpretable, fast).</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="71" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="when-to-use-automl">When to Use AutoML</h1>
<table>
<thead>
<tr>
<th>Good for</th>
<th>Be careful when</th>
</tr>
</thead>
<tbody>
<tr>
<td>Tabular data (CSVs)</td>
<td>Model must be interpretable</td>
</tr>
<tr>
<td>Quick baselines</td>
<td>Latency matters (real-time serving)</td>
</tr>
<tr>
<td>Lack time or ML expertise</td>
<td>Model must fit on edge device</td>
</tr>
<tr>
<td>Kaggle competitions</td>
<td>Non-tabular data (images, text)</td>
</tr>
</tbody>
</table>
<p><strong>Use AutoML to find the ceiling, then manually build an interpretable model that gets close.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="72" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="project-tuning-checklist">Project Tuning Checklist</h1>
<ol>
<li>Pick your <strong>metric</strong> before tuning (accuracy? F1? RMSE?)</li>
<li>Put preprocessing inside a <strong>Pipeline</strong> (prevents data leakage!)</li>
<li>Start with <strong>2-4 important hyperparameters</strong> — don't tune everything</li>
<li>Use <strong>log scale</strong> for learning rate, regularization — <code>[0.001, 0.01, 0.1]</code> not <code>[0.1, 0.2, 0.3]</code></li>
<li>Set a <strong>budget</strong>: 20-50 random trials is often enough</li>
<li>Retrain the best config on <strong>all data</strong> (as per Week 7 protocol)</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sklearn.pipeline <span class="hljs-keyword">import</span> Pipeline
pipe = Pipeline([(<span class="hljs-string">&quot;scale&quot;</span>, StandardScaler()), (<span class="hljs-string">&quot;model&quot;</span>, LogisticRegression())])
search = GridSearchCV(pipe, {<span class="hljs-string">&quot;model__C&quot;</span>: [<span class="hljs-number">0.01</span>, <span class="hljs-number">0.1</span>, <span class="hljs-number">1</span>, <span class="hljs-number">10</span>]}, cv=<span class="hljs-number">5</span>)
search.fit(X, y)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" data-marpit-pagination="73" style="--paginate:true;--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="summary--key-takeaways">Summary &amp; Key Takeaways</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="74" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">

  └─────────────────────┘              └──────────────────────────┘
              │
              ▼

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="75" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="summary-12-tuning-strategies">Summary (1/2): Tuning Strategies</h1>
<table>
<thead>
<tr>
<th>Strategy</th>
<th>Key Idea</th>
<th>When to Use</th>
</tr>
</thead>
<tbody>
<tr>
<td>Grid search</td>
<td>Try every combination</td>
<td>2-3 params, small grid</td>
</tr>
<tr>
<td>Random search</td>
<td>Sample randomly, better coverage</td>
<td>Quick exploration, 4+ params</td>
</tr>
<tr>
<td>Bayesian (Optuna)</td>
<td>Learn from past results, focus on promising areas</td>
<td>Serious tuning, expensive evaluations</td>
</tr>
<tr>
<td>AutoML</td>
<td>Loop over model families + tuning</td>
<td>Find the performance ceiling</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="76" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="summary-22-supporting-practices">Summary (2/2): Supporting Practices</h1>
<table>
<thead>
<tr>
<th>Practice</th>
<th>Key Idea</th>
</tr>
</thead>
<tbody>
<tr>
<td>Experiment tracking</td>
<td>Log every run with Trackio (<code>init</code>, <code>log</code>, <code>finish</code>)</td>
</tr>
<tr>
<td>sklearn reproducibility</td>
<td><code>random_state=42</code> is enough</td>
</tr>
<tr>
<td>Multi-seed reporting</td>
<td>Report mean ± std across 5 seeds</td>
</tr>
<tr>
<td>Pipeline</td>
<td>Put preprocessing inside to prevent leakage</td>
</tr>
<tr>
<td>AL vs BayesOpt</td>
<td>Same GP model, different goal (learn everywhere vs find the max)</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="77" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="exam-questions-14">Exam Questions (1/4)</h1>
<p><strong>Q1</strong>: Why does random search often beat grid search?</p>
<blockquote>
<p>Not all hyperparameters are equally important. Grid wastes evaluations varying unimportant params. Random covers each dimension more uniformly. (Bergstra &amp; Bengio, JMLR 2012)</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="78" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="exam-questions-24">Exam Questions (2/4)</h1>
<p><strong>Q2</strong>: Explain how Bayesian optimization uses past results to decide where to evaluate next.</p>
<blockquote>
<p>It builds a map (surrogate model) from past evaluations that predicts both the expected score and uncertainty at every point. An acquisition function (e.g., Expected Improvement) scores each candidate by balancing exploitation (high expected score) and exploration (high uncertainty). The highest-scoring point is evaluated next.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="79" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="exam-questions-34">Exam Questions (3/4)</h1>
<p><strong>Q3</strong>: How are Bayesian optimization and active learning similar, and how do they differ?</p>
<blockquote>
<p>Both use a model with uncertainty to decide where to sample next. Active learning samples where uncertainty is highest (to learn the function everywhere). Bayesian optimization samples where the score is likely highest (to find the maximum). Same tool, different goal.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" data-paginate="true" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" data-marpit-pagination="80" style="--paginate:true;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;" data-marpit-pagination-total="81">
<h1 id="exam-questions-44">Exam Questions (4/4)</h1>
<p><strong>Q4</strong>: Why should you put preprocessing (e.g., <code>StandardScaler</code>) inside a <code>Pipeline</code> when tuning?</p>
<blockquote>
<p>If you scale before splitting, the scaler sees test/validation data — that's data leakage. Putting it inside a Pipeline ensures scaling happens independently within each CV fold.</p>
</blockquote>
<p><strong>Q5</strong>: Why should you track experiments programmatically instead of in a spreadsheet?</p>
<blockquote>
<p>Spreadsheets don't scale and can't automatically capture configs or metrics. Tools like Trackio automate logging; MLflow and W&amp;B add artifacts and model registry.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" data-class="lead" data-theme="cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves" lang="en-IN" class="lead" style="--class:lead;--theme:cdfepyf9uwtvgo5dsjxqei43he2ox9xxv5t7lwves;">
<h1 id="questions">Questions?</h1>
<blockquote>
<p>Tune systematically (random or Bayesian, not manual).<br />
Track everything. Reproduce the best. Then automate it all.<br />
Same GP model powers both BayesOpt and Active Learning — different goals.</p>
</blockquote>

</section>
