<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#c44536"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#333333">Docker Layer Caching</text>

  <!-- Layer 5 (bottom) - FROM -->
  <rect x="80" y="330" width="400" height="50" rx="5" fill="#2d8a4e" opacity="0.12" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="100" y="360" font-family="monospace" font-size="13" fill="#333333" font-weight="bold">FROM python:3.10-slim</text>
  <rect x="492" y="340" width="72" height="26" rx="4" fill="#2d8a4e" opacity="0.15" stroke="#2d8a4e" stroke-width="1"/>
  <text x="528" y="358" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#2d8a4e">CACHED</text>

  <!-- Layer 4 - WORKDIR -->
  <rect x="80" y="270" width="400" height="50" rx="5" fill="#2d8a4e" opacity="0.12" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="100" y="300" font-family="monospace" font-size="13" fill="#333333" font-weight="bold">WORKDIR /app</text>
  <rect x="492" y="280" width="72" height="26" rx="4" fill="#2d8a4e" opacity="0.15" stroke="#2d8a4e" stroke-width="1"/>
  <text x="528" y="298" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#2d8a4e">CACHED</text>

  <!-- Layer 3 - COPY requirements -->
  <rect x="80" y="210" width="400" height="50" rx="5" fill="#2d8a4e" opacity="0.12" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="100" y="240" font-family="monospace" font-size="13" fill="#333333" font-weight="bold">COPY requirements.txt .</text>
  <rect x="492" y="220" width="72" height="26" rx="4" fill="#2d8a4e" opacity="0.15" stroke="#2d8a4e" stroke-width="1"/>
  <text x="528" y="238" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#2d8a4e">CACHED</text>

  <!-- Layer 2 - RUN pip install -->
  <rect x="80" y="150" width="400" height="50" rx="5" fill="#2d8a4e" opacity="0.12" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="100" y="180" font-family="monospace" font-size="13" fill="#333333" font-weight="bold">RUN pip install -r requirements.txt</text>
  <rect x="492" y="160" width="72" height="26" rx="4" fill="#2d8a4e" opacity="0.15" stroke="#2d8a4e" stroke-width="1"/>
  <text x="528" y="178" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#2d8a4e">CACHED</text>

  <!-- Layer 1 (top) - COPY app.py - REBUILT -->
  <rect x="80" y="90" width="400" height="50" rx="5" fill="#c44536" opacity="0.12" stroke="#c44536" stroke-width="2"/>
  <text x="100" y="120" font-family="monospace" font-size="13" fill="#c44536" font-weight="bold">COPY app.py .</text>
  <rect x="492" y="100" width="82" height="26" rx="4" fill="#c44536" opacity="0.15" stroke="#c44536" stroke-width="1.5"/>
  <text x="533" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#c44536">REBUILT</text>

  <!-- Side annotation arrow -->
  <line x1="620" y1="100" x2="620" y2="370" stroke="#c44536" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="630" y="180" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#c44536" font-weight="bold">Changed?</text>
  <text x="630" y="196" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#c44536">Only rebuild</text>
  <text x="630" y="212" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#c44536">from here</text>
  <text x="630" y="228" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#c44536">down</text>

  <!-- Separator line between rebuilt and cached -->
  <line x1="70" y1="145" x2="580" y2="145" stroke="#c44536" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Build direction label -->
  <text x="40" y="225" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#999" transform="rotate(-90, 40, 225)">Build order</text>
  <!-- Small up arrow -->
  <line x1="40" y1="175" x2="40" y2="100" stroke="#999" stroke-width="1"/>
  <polygon points="35,105 40,90 45,105" fill="#999"/>
</svg>