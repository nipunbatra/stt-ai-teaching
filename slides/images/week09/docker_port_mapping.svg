<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- Your Laptop box -->
  <rect x="30" y="40" width="300" height="220" rx="8" fill="#f8f9fa" stroke="#333333" stroke-width="2"/>
  <text x="180" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#333333">Your Laptop</text>

  <!-- Browser -->
  <rect x="80" y="100" width="200" height="100" rx="6" fill="white" stroke="#333333" stroke-width="1.5"/>
  <!-- Browser top bar -->
  <rect x="80" y="100" width="200" height="28" rx="6" fill="#e9ecef" stroke="#333333" stroke-width="1.5"/>
  <rect x="80" y="118" width="200" height="10" fill="#e9ecef"/>
  <!-- Browser dots -->
  <circle cx="96" cy="114" r="4" fill="#c44536"/>
  <circle cx="110" cy="114" r="4" fill="#e9b44c"/>
  <circle cx="124" cy="114" r="4" fill="#2d8a4e"/>
  <!-- URL bar -->
  <rect x="140" y="106" width="130" height="16" rx="3" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="205" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#666">localhost:7861</text>
  <!-- Browser content -->
  <text x="180" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333333">Browser</text>
  <text x="180" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666">localhost:7861</text>

  <!-- Docker Container box (dashed border) -->
  <rect x="470" y="40" width="300" height="220" rx="8" fill="white" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="620" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#333333">Docker Container</text>
  <!-- Isolated label -->
  <text x="620" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#999" font-style="italic">isolated environment</text>

  <!-- Gradio Server -->
  <rect x="520" y="105" width="200" height="90" rx="6" fill="#c44536" opacity="0.1" stroke="#c44536" stroke-width="1.5"/>
  <text x="620" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#c44536">Gradio Server</text>
  <text x="620" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c44536">listening on :7860</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#333333"/>
    </marker>
  </defs>

  <!-- Connection arrows -->
  <line x1="335" y1="142" x2="465" y2="142" stroke="#333333" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="335" y1="158" x2="465" y2="158" stroke="#333333" stroke-width="2" marker-start="url(#arrowLeft)"/>

  <!-- Port label -->
  <rect x="356" y="122" width="98" height="44" rx="4" fill="white" stroke="#e9ecef" stroke-width="1"/>
  <text x="405" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333333" font-weight="bold">-p 7861:7860</text>
  <text x="405" y="158" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#666">port mapping</text>
</svg>