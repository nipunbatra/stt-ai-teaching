<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <!-- VM Side -->
  <text x="225" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#333333">Virtual Machines</text>

  <!-- VM Hardware -->
  <rect x="50" y="340" width="350" height="40" rx="4" fill="#e9ecef" stroke="#333333" stroke-width="1.5"/>
  <text x="225" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333333">Hardware</text>

  <!-- VM Host OS -->
  <rect x="50" y="295" width="350" height="40" rx="4" fill="#e9ecef" stroke="#333333" stroke-width="1.5"/>
  <text x="225" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333333">Host OS</text>

  <!-- VM Hypervisor -->
  <rect x="50" y="250" width="350" height="40" rx="4" fill="#dbe4f0" stroke="#333333" stroke-width="1.5"/>
  <text x="225" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#333333">Hypervisor</text>

  <!-- VM 1 -->
  <rect x="60" y="45" width="160" height="200" rx="4" fill="none" stroke="#c44536" stroke-width="2"/>
  <!-- Guest OS 1 -->
  <rect x="68" y="145" width="144" height="90" rx="3" fill="#c44536" opacity="0.15" stroke="#c44536" stroke-width="1.5"/>
  <text x="140" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c44536" font-weight="bold">Guest OS</text>
  <text x="140" y="202" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#c44536">(~2 GB)</text>
  <!-- Libs 1 -->
  <rect x="68" y="100" width="144" height="40" rx="3" fill="#f8f9fa" stroke="#333333" stroke-width="1"/>
  <text x="140" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#333333">Libs / Deps</text>
  <!-- App 1 -->
  <rect x="68" y="55" width="144" height="40" rx="3" fill="#f8f9fa" stroke="#333333" stroke-width="1"/>
  <text x="140" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333">App A</text>

  <!-- VM 2 -->
  <rect x="230" y="45" width="160" height="200" rx="4" fill="none" stroke="#c44536" stroke-width="2"/>
  <!-- Guest OS 2 -->
  <rect x="238" y="145" width="144" height="90" rx="3" fill="#c44536" opacity="0.15" stroke="#c44536" stroke-width="1.5"/>
  <text x="310" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c44536" font-weight="bold">Guest OS</text>
  <text x="310" y="202" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#c44536">(~2 GB)</text>
  <!-- Libs 2 -->
  <rect x="238" y="100" width="144" height="40" rx="3" fill="#f8f9fa" stroke="#333333" stroke-width="1"/>
  <text x="310" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#333333">Libs / Deps</text>
  <!-- App 2 -->
  <rect x="238" y="55" width="144" height="40" rx="3" fill="#f8f9fa" stroke="#333333" stroke-width="1"/>
  <text x="310" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333">App B</text>

  <!-- Divider -->
  <line x1="450" y1="20" x2="450" y2="390" stroke="#e9ecef" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Container Side -->
  <text x="675" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#333333">Containers</text>

  <!-- Container Hardware -->
  <rect x="500" y="340" width="350" height="40" rx="4" fill="#e9ecef" stroke="#333333" stroke-width="1.5"/>
  <text x="675" y="365" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333333">Hardware</text>

  <!-- Container Host OS -->
  <rect x="500" y="295" width="350" height="40" rx="4" fill="#e9ecef" stroke="#333333" stroke-width="1.5"/>
  <text x="675" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333333">Host OS</text>

  <!-- Docker Engine -->
  <rect x="500" y="250" width="350" height="40" rx="4" fill="#dbe4f0" stroke="#333333" stroke-width="1.5"/>
  <text x="675" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#333333">Docker Engine</text>

  <!-- Container 1 -->
  <rect x="510" y="130" width="160" height="115" rx="4" fill="none" stroke="#2d8a4e" stroke-width="2"/>
  <!-- Libs 1 -->
  <rect x="518" y="190" width="144" height="45" rx="3" fill="#f8f9fa" stroke="#333333" stroke-width="1"/>
  <text x="590" y="217" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#333333">Libs / Deps</text>
  <!-- App 1 -->
  <rect x="518" y="140" width="144" height="45" rx="3" fill="#f8f9fa" stroke="#333333" stroke-width="1"/>
  <text x="590" y="167" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333">App A</text>

  <!-- Container 2 -->
  <rect x="680" y="130" width="160" height="115" rx="4" fill="none" stroke="#2d8a4e" stroke-width="2"/>
  <!-- Libs 2 -->
  <rect x="688" y="190" width="144" height="45" rx="3" fill="#f8f9fa" stroke="#333333" stroke-width="1"/>
  <text x="760" y="217" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#333333">Libs / Deps</text>
  <!-- App 2 -->
  <rect x="688" y="140" width="144" height="45" rx="3" fill="#f8f9fa" stroke="#333333" stroke-width="1"/>
  <text x="760" y="167" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333">App B</text>

  <!-- Size labels -->
  <text x="590" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2d8a4e" font-weight="bold">~150 MB</text>
  <text x="760" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2d8a4e" font-weight="bold">~150 MB</text>

  <!-- No Guest OS label -->
  <text x="675" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#2d8a4e">No Guest OS needed!</text>
  <text x="675" y="96" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2d8a4e">Shares host kernel</text>
</svg>