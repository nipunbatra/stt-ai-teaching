<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d8a4e"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c44536"/>
    </marker>
  </defs>

  <!-- ===== Main flow: Dockerfile → Image → Container ===== -->

  <!-- Dockerfile -->
  <rect x="30" y="80" width="140" height="70" rx="6" fill="#f8f9fa" stroke="#333333" stroke-width="2"/>
  <text x="100" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#333333">Dockerfile</text>
  <text x="100" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">blueprint</text>

  <!-- Arrow: Dockerfile → Image -->
  <line x1="175" y1="115" x2="275" y2="115" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="225" y="105" text-anchor="middle" font-family="monospace" font-size="11" fill="#333333" font-weight="bold">docker</text>
  <text x="225" y="92" text-anchor="middle" font-family="monospace" font-size="11" fill="#333333" font-weight="bold">build</text>

  <!-- Image -->
  <rect x="280" y="80" width="140" height="70" rx="6" fill="#c44536" opacity="0.12" stroke="#c44536" stroke-width="2"/>
  <text x="350" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#c44536">Image</text>
  <text x="350" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#c44536">read-only template</text>

  <!-- Arrow: Image → Container -->
  <line x1="425" y1="115" x2="525" y2="115" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="105" text-anchor="middle" font-family="monospace" font-size="11" fill="#333333" font-weight="bold">docker</text>
  <text x="475" y="92" text-anchor="middle" font-family="monospace" font-size="11" fill="#333333" font-weight="bold">run</text>

  <!-- Container -->
  <rect x="530" y="70" width="170" height="90" rx="6" fill="#2d8a4e" opacity="0.12" stroke="#2d8a4e" stroke-width="2"/>
  <text x="615" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#2d8a4e">Container</text>
  <text x="615" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#2d8a4e">running instance</text>

  <!-- ===== Ports (from Container going right) ===== -->
  <line x1="705" y1="100" x2="790" y2="100" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="705" y1="130" x2="790" y2="130" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="793" y="80" width="85" height="68" rx="5" fill="#f8f9fa" stroke="#333333" stroke-width="1.5"/>
  <text x="835" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333">Ports</text>
  <text x="835" y="126" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">-p 7860</text>
  <text x="835" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">:7860</text>

  <!-- ===== Volume (below Container connecting to Host) ===== -->
  <line x1="615" y1="165" x2="615" y2="220" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="548" y="225" width="135" height="55" rx="5" fill="#f8f9fa" stroke="#333333" stroke-width="1.5"/>
  <text x="615" y="250" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333">Volume</text>
  <text x="615" y="268" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">-v host:container</text>

  <!-- Host folder -->
  <line x1="615" y1="285" x2="615" y2="320" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="615" y="338" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666">Host filesystem</text>

  <!-- ===== Docker Hub (cloud, connected to Image) ===== -->
  <!-- Cloud shape using overlapping circles -->
  <ellipse cx="350" cy="270" rx="75" ry="30" fill="#f8f9fa" stroke="#333333" stroke-width="1.5"/>
  <text x="350" y="266" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333">Docker Hub</text>
  <text x="350" y="282" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">registry</text>

  <!-- Arrow: Image ↔ Docker Hub (push/pull) -->
  <!-- push arrow (going down) -->
  <line x1="330" y1="155" x2="330" y2="237" stroke="#c44536" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="310" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#c44536" font-weight="bold">push</text>

  <!-- pull arrow (going up) -->
  <line x1="370" y1="237" x2="370" y2="155" stroke="#2d8a4e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="395" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#2d8a4e" font-weight="bold">pull</text>

  <!-- ===== Legend numbers ===== -->
  <circle cx="100" cy="56" r="12" fill="#333333"/>
  <text x="100" y="61" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">1</text>

  <circle cx="350" cy="56" r="12" fill="#c44536"/>
  <text x="350" y="61" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">2</text>

  <circle cx="615" cy="50" r="12" fill="#2d8a4e"/>
  <text x="615" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">3</text>

  <circle cx="835" cy="67" r="12" fill="#333333"/>
  <text x="835" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">4</text>

  <circle cx="615" cy="212" r="12" fill="#333333"/>
  <text x="615" y="217" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">5</text>

  <circle cx="350" cy="315" r="12" fill="#333333"/>
  <text x="350" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="white">6</text>
  <text x="350" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#666">Docker Hub</text>
</svg>